<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiderCenter | المتجر</title>

    <link rel="stylesheet" href="store.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- القائمة الجانبية -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-header">
            <img src="images/logo.png" alt="LiderCenter Logo" class="logo">
            <h2>LiderCenter</h2>
        </div>

        <nav>

            <a href="store.html" class="active">الرئيسية</a>

            <a href="categories.html">الأقسام</a>

            <a href="favorites.html">المفضلة</a>

            <a href="orders.html">طلباتي</a>

            <a href="profile.html">حسابي</a>

            <!-- يظهر للمدير فقط -->
            <a href="admin.html" id="admin-item" style="display:none;">
                لوحة التحكم
            </a>

            <a href="#" id="logoutBtn">تسجيل الخروج</a>

        </nav>

    </aside>

    <!-- المحتوى -->
    <div class="container">

        <!-- الشريط العلوي -->
        <header class="topbar">

            <button id="menuBtn">
                ☰
            </button>

            <h1>LiderCenter</h1>

            <div class="user-box">

                <img src="images/user.png" alt="User">

            </div>

        </header>

        <!-- المحتوى الرئيسي -->
        <main class="content">

            <section class="welcome-card">

                <h2>مرحبًا بك في LiderCenter</h2>

                <p>
                    اكتشف أحدث المنتجات والعروض داخل المتجر.
                </p>

            </section>

            <section class="products">

                <div class="product-card">
                    <img src="images/product.png" alt="">
                    <h3>اسم المنتج</h3>
                    <p>وصف مختصر للمنتج</p>
                </div>

                <div class="product-card">
                    <img src="images/product.png" alt="">
                    <h3>اسم المنتج</h3>
                    <p>وصف مختصر للمنتج</p>
                </div>

                <div class="product-card">
                    <img src="images/product.png" alt="">
                    <h3>اسم المنتج</h3>
                    <p>وصف مختصر للمنتج</p>
                </div>

            </section>

        </main>

        <!-- الشريط السفلي -->
        <footer class="bottom-nav">

            <a href="store.html">الرئيسية</a>

            <a href="categories.html">الأقسام</a>

            <a href="favorites.html">المفضلة</a>

            <a href="profile.html">حسابي</a>

        </footer>

    </div>

    <script type="module" src="store.js"></script>

</body>

</html>
