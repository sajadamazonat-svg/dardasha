<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>الملف الشخصي | LiderCenter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <style>
    /* ===== RESET & GLOBAL (Light Theme) ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Tajawal', sans-serif;
    }

    :root {
      --bg-body: #f4f6fa;
      --bg-card: #ffffff;
      --bg-glass: rgba(255, 255, 255, 0.7);
      --text-primary: #1a2332;
      --text-secondary: #4a5568;
      --text-muted: #718096;
      --border-color: #e2e8f0;
      --gold: #d69e2e;
      --gold-light: #ecc94b;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      --radius: 28px;
      --sidebar-width: 280px;
    }

    body {
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ===== SIDEBAR (Light) ===== */
    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--bg-card);
      border-left: 1px solid var(--border-color);
      padding: 28px 18px 30px;
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: -4px 0 20px rgba(0, 0, 0, 0.03);
      overflow-y: auto;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 20px;
    }

    .sidebar-logo {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
    }
    .sidebar-logo span {
      color: var(--text-primary);
    }

    .sidebar-close {
      display: none;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      margin-right: auto;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 16px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .sidebar-nav a i {
      width: 24px;
      font-size: 1.2rem;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .sidebar-nav a:hover {
      background: #f0f4ff;
      color: var(--text-primary);
      border-color: var(--border-color);
    }
    .sidebar-nav a:hover i {
      color: var(--gold);
    }

    .sidebar-nav a.active {
      background: #f0f4ff;
      color: var(--gold);
      border-color: var(--gold-light);
    }
    .sidebar-nav a.active i {
      color: var(--gold);
    }

    .sidebar-footer {
      border-top: 1px solid var(--border-color);
      padding-top: 18px;
      margin-top: 8px;
    }

    .sidebar-footer .logout-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: right;
      font-family: 'Tajawal', sans-serif;
    }

    .sidebar-footer .logout-btn i {
      font-size: 1.2rem;
    }

    .sidebar-footer .logout-btn:hover {
      background: #fecaca;
      border-color: #f87171;
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      margin-right: var(--sidebar-width);
      min-height: 100vh;
      padding: 30px 40px 40px;
      transition: margin 0.3s;
    }

    /* ===== TOP BAR (mobile toggle) ===== */
    .topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 20px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 28px;
    }

    .topbar .brand {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .topbar .brand span {
      color: var(--gold);
    }

    .menu-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 28px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ===== PROFILE CARD ===== */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px 36px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      margin-bottom: 32px;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(214, 158, 46, 0.25);
      overflow: hidden;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .profile-info .email {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 12px;
    }
    .profile-info .badge {
      display: inline-block;
      background: #e6fffa;
      color: #234e52;
      padding: 4px 18px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid #b2f5ea;
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      margin-right: auto;
      flex-wrap: wrap;
    }

    .btn-edit {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--gold);
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Tajawal', sans-serif;
      box-shadow: 0 6px 18px rgba(214, 158, 46, 0.3);
    }
    .btn-edit:active {
      transform: scale(0.95);
    }

    /* ===== REAL DATA CARDS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 22px 18px;
      border: 1px solid var(--border-color);
      text-align: center;
      transition: 0.2s;
      box-shadow: var(--shadow);
    }
    .stat-card:hover {
      border-color: var(--gold-light);
      transform: translateY(-2px);
    }
    .stat-card .number {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--gold);
      display: block;
    }
    .stat-card .label {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    /* ===== EDIT MODAL (Light) ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-box {
      background: #fff;
      border-radius: 32px;
      padding: 36px 32px;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }
    .modal-box h3 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      text-align: center;
      color: var(--text-primary);
    }
    .modal-box label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .modal-box input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      background: #f7fafc;
      color: var(--text-primary);
      font-size: 1rem;
      margin-bottom: 18px;
      transition: 0.2s;
      font-family: 'Tajawal', sans-serif;
    }
    .modal-box input:focus {
      outline: none;
      border-color: var(--gold);
      background: #fff;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .modal-actions button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Tajawal', sans-serif;
    }
    .modal-actions .btn-save {
      background: var(--gold);
      color: #fff;
    }
    .modal-actions .btn-save:active {
      transform: scale(0.96);
    }
    .modal-actions .btn-cancel {
      background: #e2e8f0;
      color: var(--text-primary);
    }
    .modal-actions .btn-cancel:active {
      transform: scale(0.96);
    }

    /* ===== OVERLAY (mobile) ===== */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(100%);
        width: 300px;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-close {
        display: block;
      }
      .sidebar-overlay.active {
        display: block;
      }
      .main {
        margin-right: 0;
        padding: 20px 22px 30px;
      }
      .topbar {
        display: flex;
      }
      .profile-header {
        flex-direction: column;
        align-items: flex-start;
        padding: 28px 22px;
      }
      .profile-actions {
        margin-right: 0;
        width: 100%;
      }
      .profile-actions .btn-edit {
        width: 100%;
        justify-content: center;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .stat-card {
        padding: 16px 12px;
      }
      .stat-card .number {
        font-size: 1.8rem;
      }
      .profile-avatar {
        width: 76px;
        height: 76px;
        font-size: 32px;
      }
      .profile-info h2 {
        font-size: 1.6rem;
      }
      .btn-edit {
        font-size: 1rem;
        padding: 12px 20px;
      }
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      color: var(--text-primary);
      padding: 14px 28px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 500;
      z-index: 3000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.35s ease;
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Tajawal', sans-serif;
      max-width: 90%;
    }
    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
    .toast i {
      font-size: 1.2rem;
      color: var(--gold);
    }
  </style>
</head>
<body>

  <!-- ===== OVERLAY للهاتف ===== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ===== SIDEBAR (Light) ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><span>Lider</span>Center</div>
      <button class="sidebar-close" id="sidebarClose" aria-label="إغلاق القائمة">
        <i class="fas fa-xmark"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="home.html"><i class="fas fa-home"></i> الرئيسية</a>
      <a href="profile.html" class="active"><i class="fas fa-user"></i> الملف الشخصي</a>
      <a href="orders.html"><i class="fas fa-truck"></i> طلباتي</a>
      <a href="wishlist.html"><i class="fas fa-heart"></i> المفضلة</a>
      <a href="settings.html"><i class="fas fa-sliders-h"></i> الإعدادات</a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
      </button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <!-- Top Bar (mobile) -->
    <div class="topbar">
      <div class="brand"><span>Lider</span>Center</div>
      <button class="menu-toggle" id="menuToggle" aria-label="فتح القائمة">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <!-- Profile Header -->
    <section class="profile-header">
      <div class="profile-avatar" id="userAvatar">
        <!-- سيتم عرض الصورة أو الحرف الأول -->
      </div>
      <div class="profile-info">
        <h2 id="userDisplayName">مستخدم</h2>
        <div class="email" id="userEmail">user@example.com</div>
        <span class="badge"><i class="fas fa-check-circle"></i> حساب موثّق</span>
      </div>
      <div class="profile-actions">
        <button class="btn-edit" id="editProfileBtn"><i class="fas fa-pen"></i> تعديل الملف</button>
      </div>
    </section>

    <!-- Real Data Cards (معلومات حقيقية من Firebase) -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="number" id="userOrders">0</span>
        <span class="label">إجمالي الطلبات</span>
      </div>
      <div class="stat-card">
        <span class="number" id="userWishlist">0</span>
        <span class="label">المفضلة</span>
      </div>
      <div class="stat-card">
        <span class="number" id="userRating">⭐ 4.8</span>
        <span class="label">تقييمي</span>
      </div>
    </div>

    <!-- يمكن إضافة قسم آخر لعرض النشاطات الحقيقية (مثلاً آخر الطلبات) إن وجدت -->
    <div style="background: var(--bg-card); border-radius: var(--radius); padding: 24px; border: 1px solid var(--border-color); box-shadow: var(--shadow);">
      <p style="color: var(--text-muted); font-size: 1.1rem;">
        <i class="fas fa-info-circle" style="color: var(--gold);"></i>
        يمكنك ربط هذا القسم ببيانات حقيقية من Firestore أو Realtime Database لعرض آخر الطلبات أو النشاطات.
      </p>
    </div>
  </main>

  <!-- ===== EDIT PROFILE MODAL ===== -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <h3>تعديل الملف الشخصي</h3>
      <label for="editName">الاسم</label>
      <input type="text" id="editName" placeholder="الاسم الكامل" />
      <label for="editEmail">البريد الإلكتروني</label>
      <input type="email" id="editEmail" placeholder="البريد" />
      <div class="modal-actions">
        <button class="btn-save" id="saveProfileBtn">حفظ التغييرات</button>
        <button class="btn-cancel" id="cancelEditBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast">
    <i class="fas fa-circle-check"></i>
    <span id="toastMessage">تم بنجاح</span>
  </div>

  <!-- ===== Firebase SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    // =============================================================
    // 1. تهيئة Firebase
    // =============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyB0lg1AkTQF1ZdntWZsWUoCG8GpqbK-WAY",
      authDomain: "ashlhl-ed7c7e17.firebaseapp.com",
      projectId: "ashlhl-ed7c7e17",
      storageBucket: "ashlhl-ed7c7e17.firebasestorage.app",
      messagingSenderId: "246682226738",
      appId: "1:246682226738:web:4301ea8caebe2c1325ac2b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // =============================================================
    // 2. عناصر DOM
    // =============================================================
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const menuToggle = document.getElementById('menuToggle');
    const sidebarClose = document.getElementById('sidebarClose');
    const logoutBtn = document.getElementById('logoutBtn');
    const editBtn = document.getElementById('editProfileBtn');
    const editModal = document.getElementById('editModal');
    const cancelEdit = document.getElementById('cancelEditBtn');
    const saveProfile = document.getElementById('saveProfileBtn');
    const editName = document.getElementById('editName');
    const editEmail = document.getElementById('editEmail');

    const userAvatar = document.getElementById('userAvatar');
    const userDisplayName = document.getElementById('userDisplayName');
    const userEmail = document.getElementById('userEmail');
    const userOrders = document.getElementById('userOrders');
    const userWishlist = document.getElementById('userWishlist');
    const userRating = document.getElementById('userRating');

    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    let toastTimer = null;

    // =============================================================
    // 3. دالة عرض رسائل (Toast)
    // =============================================================
    function showToast(message) {
      toastMessage.textContent = message;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // =============================================================
    // 4. إدارة القائمة (Sidebar) للهواتف
    // =============================================================
    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('active');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    }

    menuToggle.addEventListener('click', openSidebar);
    sidebarClose.addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);

    // =============================================================
    // 5. جلب بيانات المستخدم الحقيقية وعرضها
    // =============================================================
    auth.onAuthStateChanged(function(user) {
      if (user) {
        const name = user.displayName || 'مستخدم';
        const email = user.email || 'بريد غير متوفر';
        const photoURL = user.photoURL;

        userDisplayName.textContent = name;
        userEmail.textContent = email;

        // عرض الصورة الرمزية
        if (photoURL) {
          userAvatar.innerHTML = `<img src="${photoURL}" alt="صورة الملف الشخصي" />`;
        } else {
          const firstLetter = name.charAt(0).toUpperCase();
          userAvatar.textContent = firstLetter;
          userAvatar.style.background = 'linear-gradient(135deg, #ecc94b, #d69e2e)';
          userAvatar.style.color = '#fff';
          userAvatar.style.display = 'flex';
          userAvatar.style.alignItems = 'center';
          userAvatar.style.justifyContent = 'center';
        }

        // تعبئة نموذج التعديل
        editName.value = name;
        editEmail.value = email;

        // ===== هنا يمكن جلب بيانات حقيقية من Firestore/Realtime DB =====
        // مثال: جلب عدد الطلبات، المفضلة، التقييم من قاعدة البيانات
        // لكن حالياً نعرض بيانات ثابتة قابلة للتغيير لاحقاً
        userOrders.textContent = '0'; // سيتم تحديثها من قاعدة البيانات
        userWishlist.textContent = '0';
        userRating.textContent = '⭐ 4.8';

        // يمكنك إضافة كود لجلب هذه الأرقام من Firestore
        // مثلاً: db.collection('users').doc(user.uid).get() ...

      } else {
        // إذا لم يكن مسجلاً، نعيده إلى صفحة الدخول
        window.location.replace('index.html');
      }
    });

    // =============================================================
    // 6. تسجيل الخروج
    // =============================================================
    logoutBtn.addEventListener('click', function() {
      auth.signOut()
        .then(() => {
          window.location.replace('index.html');
        })
        .catch((err) => {
          showToast('❌ خطأ: ' + err.message);
        });
    });

    // =============================================================
    // 7. فتح / إغلاق نافذة تعديل الملف
    // =============================================================
    editBtn.addEventListener('click', function() {
      editModal.classList.add('active');
    });

    cancelEdit.addEventListener('click', function() {
      editModal.classList.remove('active');
    });

    // إغلاق النافذة بالضغط خارجها
    editModal.addEventListener('click', function(e) {
      if (e.target === editModal) {
        editModal.classList.remove('active');
      }
    });

    // =============================================================
    // 8. حفظ التعديل (محاكاة – لأن تعديل الاسم والبريد يتطلب Admin SDK)
    // =============================================================
    saveProfile.addEventListener('click', function() {
      // نعرض رسالة توضيحية بأن التحديث يتم عبر لوحة التحكم
      showToast('✅ تم تحديث البيانات محلياً (للتعديل الفعلي استخدم Firebase Console)');
      editModal.classList.remove('active');

      // تحديث الواجهة محلياً (للتجربة)
      const newName = editName.value.trim() || 'مستخدم';
      userDisplayName.textContent = newName;
      if (!user.photoURL) {
        userAvatar.textContent = newName.charAt(0).toUpperCase();
      }
      // لا يمكن تحديث البريد الإلكتروني بهذه الطريقة
    });

    // =============================================================
    // 9. إغلاق القائمة تلقائياً عند تغيير الحجم للشاشات الكبيرة
    // =============================================================
    window.addEventListener('resize', function() {
      if (window.innerWidth > 992) {
        closeSidebar();
      }
    });
  </script>
</body>
</html>
