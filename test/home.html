<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>الملف الشخصي | LiderCenter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <style>
    /* ============================================
       RESET & GLOBAL – ثيم فاتح مع خلفية ناعمة
    ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Tajawal', sans-serif;
    }

    :root {
      --bg-body: #f0f2f7;
      --bg-card: #ffffff;
      --bg-cover: linear-gradient(135deg, #f7f0e6 0%, #f0e6d8 100%);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-light: #e9edf4;
      --gold: #c99a2b;
      --gold-light: #e8c86a;
      --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.06);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --sidebar-width: 280px;
    }

    body {
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ============================================
       SIDEBAR – فاتح مع ظل خفيف
    ============================================ */
    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--bg-card);
      border-left: 1px solid var(--border-light);
      padding: 28px 20px 30px;
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: var(--shadow-sm);
      overflow-y: auto;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 20px;
    }

    .sidebar-logo {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
    }
    .sidebar-logo span {
      color: var(--text-primary);
    }

    .sidebar-close {
      display: none;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      margin-right: auto;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .sidebar-nav a i {
      width: 24px;
      font-size: 1.2rem;
      color: var(--text-muted);
    }

    .sidebar-nav a:hover {
      background: #f8faff;
      color: var(--text-primary);
      border-color: var(--border-light);
    }
    .sidebar-nav a:hover i {
      color: var(--gold);
    }

    .sidebar-nav a.active {
      background: #f8faff;
      color: var(--gold);
      border-color: var(--gold-light);
    }
    .sidebar-nav a.active i {
      color: var(--gold);
    }

    .sidebar-footer {
      border-top: 1px solid var(--border-light);
      padding-top: 18px;
      margin-top: 8px;
    }

    .sidebar-footer .logout-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      background: #fee9e9;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: right;
      font-family: 'Tajawal', sans-serif;
    }
    .sidebar-footer .logout-btn i {
      font-size: 1.2rem;
    }
    .sidebar-footer .logout-btn:hover {
      background: #fdd8d8;
    }

    /* ============================================
       MAIN CONTENT
    ============================================ */
    .main {
      flex: 1;
      margin-right: var(--sidebar-width);
      min-height: 100vh;
      padding: 0 40px 40px;
      transition: margin 0.3s;
    }

    /* ===== TOP BAR (mobile) ===== */
    .topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 20px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border-light);
    }
    .topbar .brand {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .topbar .brand span {
      color: var(--gold);
    }
    .menu-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 28px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ============================================
       COVER + AVATAR – تصميم الصورة الفاتح
    ============================================ */
    .profile-cover {
      position: relative;
      margin-top: 30px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: var(--bg-cover);
      min-height: 180px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: flex-end;
      padding: 30px 36px 24px;
    }

    /* خلفية زخرفية (صورة فاتحة) */
    .profile-cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.06"><path d="M20 20 L80 20 L80 80 L20 80 Z" stroke="%23c99a2b" stroke-width="2" fill="none"/><circle cx="50" cy="50" r="30" stroke="%23c99a2b" stroke-width="2" fill="none"/></svg>');
      background-size: 120px 120px;
      pointer-events: none;
    }

    .profile-avatar-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      width: 100%;
    }

    .profile-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 8px 30px rgba(201, 154, 43, 0.25);
      flex-shrink: 0;
      overflow: hidden;
      border: 4px solid #fff;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      flex: 1;
    }
    .profile-info h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 2px;
      color: var(--text-primary);
    }
    .profile-info .email {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-bottom: 8px;
    }
    .profile-info .badge {
      display: inline-block;
      background: #e6fffa;
      color: #234e52;
      padding: 4px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid #b2f5ea;
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      margin-right: auto;
      flex-wrap: wrap;
      z-index: 2;
    }

    .btn-edit {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--gold);
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Tajawal', sans-serif;
      box-shadow: 0 6px 18px rgba(201, 154, 43, 0.3);
    }
    .btn-edit:active {
      transform: scale(0.95);
    }

    /* ============================================
       STATS CARDS – بيانات حقيقية من Firebase
    ============================================ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin: 32px 0 36px;
    }

    .stat-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 22px 18px;
      border: 1px solid var(--border-light);
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: 0.2s;
    }
    .stat-card:hover {
      border-color: var(--gold-light);
      transform: translateY(-3px);
    }
    .stat-card .number {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--gold);
      display: block;
    }
    .stat-card .label {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    /* ============================================
       EDIT MODAL (فاتح)
    ============================================ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-box {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-md);
    }
    .modal-box h3 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      text-align: center;
      color: var(--text-primary);
    }
    .modal-box label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .modal-box input {
      width: 100%;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      background: #f8fafc;
      color: var(--text-primary);
      font-size: 1rem;
      margin-bottom: 18px;
      transition: 0.2s;
      font-family: 'Tajawal', sans-serif;
    }
    .modal-box input:focus {
      outline: none;
      border-color: var(--gold);
      background: #fff;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .modal-actions button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Tajawal', sans-serif;
    }
    .modal-actions .btn-save {
      background: var(--gold);
      color: #fff;
    }
    .modal-actions .btn-save:active {
      transform: scale(0.96);
    }
    .modal-actions .btn-cancel {
      background: #e9edf4;
      color: var(--text-primary);
    }
    .modal-actions .btn-cancel:active {
      transform: scale(0.96);
    }

    /* ============================================
       OVERLAY للهواتف
    ============================================ */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
      z-index: 999;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    /* ============================================
       TOAST
    ============================================ */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      color: var(--text-primary);
      padding: 14px 28px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 500;
      z-index: 3000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.35s ease;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 90%;
    }
    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
    .toast i {
      font-size: 1.2rem;
      color: var(--gold);
    }

    /* ============================================
       RESPONSIVE
    ============================================ */
    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(100%);
        width: 300px;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-close {
        display: block;
      }
      .sidebar-overlay.active {
        display: block;
      }
      .main {
        margin-right: 0;
        padding: 0 22px 30px;
      }
      .topbar {
        display: flex;
      }
      .profile-cover {
        padding: 24px 20px 20px;
        min-height: 150px;
        margin-top: 16px;
      }
      .profile-avatar-wrapper {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .profile-actions {
        margin-right: 0;
        width: 100%;
      }
      .profile-actions .btn-edit {
        width: 100%;
        justify-content: center;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .profile-avatar {
        width: 80px;
        height: 80px;
        font-size: 36px;
      }
      .profile-info h2 {
        font-size: 1.6rem;
      }
      .stats-grid {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .stat-card .number {
        font-size: 1.8rem;
      }
      .btn-edit {
        font-size: 1rem;
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== OVERLAY للهاتف ===== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><span>Lider</span>Center</div>
      <button class="sidebar-close" id="sidebarClose" aria-label="إغلاق القائمة">
        <i class="fas fa-xmark"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="home.html"><i class="fas fa-home"></i> الرئيسية</a>
      <a href="profile.html" class="active"><i class="fas fa-user"></i> الملف الشخصي</a>
      <a href="orders.html"><i class="fas fa-truck"></i> طلباتي</a>
      <a href="wishlist.html"><i class="fas fa-heart"></i> المفضلة</a>
      <a href="settings.html"><i class="fas fa-sliders-h"></i> الإعدادات</a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
      </button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <!-- Top Bar (mobile) -->
    <div class="topbar">
      <div class="brand"><span>Lider</span>Center</div>
      <button class="menu-toggle" id="menuToggle" aria-label="فتح القائمة">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <!-- ===== COVER + AVATAR (تصميم فاتح مع صورة) ===== -->
    <div class="profile-cover">
      <div class="profile-avatar-wrapper">
        <div class="profile-avatar" id="userAvatar">
          <!-- سيتم عرض الصورة أو الحرف الأول -->
        </div>
        <div class="profile-info">
          <h2 id="userDisplayName">مستخدم</h2>
          <div class="email" id="userEmail">user@example.com</div>
          <span class="badge"><i class="fas fa-check-circle"></i> حساب موثّق</span>
        </div>
        <div class="profile-actions">
          <button class="btn-edit" id="editProfileBtn"><i class="fas fa-pen"></i> تعديل الملف</button>
        </div>
      </div>
    </div>

    <!-- ===== STATS (بيانات حقيقية من Firebase) ===== -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="number" id="userOrders">0</span>
        <span class="label">إجمالي الطلبات</span>
      </div>
      <div class="stat-card">
        <span class="number" id="userWishlist">0</span>
        <span class="label">المفضلة</span>
      </div>
      <div class="stat-card">
        <span class="number" id="userRating">⭐ 4.8</span>
        <span class="label">تقييمي</span>
      </div>
    </div>

    <!-- ===== قسم إضافي توضيحي ===== -->
    <div style="background: var(--bg-card); border-radius: var(--radius-lg); padding: 24px; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);">
      <p style="color: var(--text-secondary); font-size: 1.05rem;">
        <i class="fas fa-info-circle" style="color: var(--gold);"></i>
        يمكنك ربط هذا القسم بقاعدة بيانات Firebase Firestore لعرض آخر الطلبات أو النشاطات الحقيقية.
      </p>
    </div>
  </main>

  <!-- ===== EDIT MODAL ===== -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <h3>تعديل الملف الشخصي</h3>
      <label for="editName">الاسم</label>
      <input type="text" id="editName" placeholder="الاسم الكامل" />
      <label for="editEmail">البريد الإلكتروني</label>
      <input type="email" id="editEmail" placeholder="البريد" />
      <div class="modal-actions">
        <button class="btn-save" id="saveProfileBtn">حفظ التغييرات</button>
        <button class="btn-cancel" id="cancelEditBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast">
    <i class="fas fa-circle-check"></i>
    <span id="toastMessage">تم بنجاح</span>
  </div>

  <!-- ===== Firebase SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    // =============================================================
    // 1. تهيئة Firebase
    // =============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyB0lg1AkTQF1ZdntWZsWUoCG8GpqbK-WAY",
      authDomain: "ashlhl-ed7c7e17.firebaseapp.com",
      projectId: "ashlhl-ed7c7e17",
      storageBucket: "ashlhl-ed7c7e17.firebasestorage.app",
      messagingSenderId: "246682226738",
      appId: "1:246682226738:web:4301ea8caebe2c1325ac2b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // =============================================================
    // 2. عناصر DOM
    // =============================================================
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const menuToggle = document.getElementById('menuToggle');
    const sidebarClose = document.getElementById('sidebarClose');
    const logoutBtn = document.getElementById('logoutBtn');
    const editBtn = document.getElementById('editProfileBtn');
    const editModal = document.getElementById('editModal');
    const cancelEdit = document.getElementById('cancelEditBtn');
    const saveProfile = document.getElementById('saveProfileBtn');
    const editName = document.getElementById('editName');
    const editEmail = document.getElementById('editEmail');

    const userAvatar = document.getElementById('userAvatar');
    const userDisplayName = document.getElementById('userDisplayName');
    const userEmail = document.getElementById('userEmail');
    const userOrders = document.getElementById('userOrders');
    const userWishlist = document.getElementById('userWishlist');
    const userRating = document.getElementById('userRating');

    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    let toastTimer = null;

    function showToast(msg) {
      toastMessage.textContent = msg;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // =============================================================
    // 3. Sidebar toggles
    // =============================================================
    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('active');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    }
    menuToggle.addEventListener('click', openSidebar);
    sidebarClose.addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);

    // =============================================================
    // 4. عرض بيانات المستخدم الحقيقية من Firebase Auth
    // =============================================================
    auth.onAuthStateChanged(function(user) {
      if (user) {
        const name = user.displayName || 'مستخدم';
        const email = user.email || 'بريد غير متوفر';
        const photoURL = user.photoURL;

        userDisplayName.textContent = name;
        userEmail.textContent = email;

        // الصورة الرمزية
        if (photoURL) {
          userAvatar.innerHTML = `<img src="${photoURL}" alt="صورة المستخدم" />`;
        } else {
          userAvatar.textContent = name.charAt(0).toUpperCase();
          userAvatar.style.background = 'linear-gradient(135deg, #e8c86a, #c99a2b)';
          userAvatar.style.color = '#fff';
          userAvatar.style.display = 'flex';
          userAvatar.style.alignItems = 'center';
          userAvatar.style.justifyContent = 'center';
        }

        // تعبئة نموذج التعديل
        editName.value = name;
        editEmail.value = email;

        // ===== هنا نضع أرقاماً حقيقية من Firebase (مثال: من Firestore) =====
        // لكن حالياً نعرض أصفاراً، ويمكنك استبدالها بجلب من قاعدة البيانات
        userOrders.textContent = '0';
        userWishlist.textContent = '0';
        userRating.textContent = '⭐ 4.8';

        // مثال لجلب عدد الطلبات من Firestore:
        // db.collection('users').doc(user.uid).get().then(doc => {
        //   if(doc.exists) {
        //     userOrders.textContent = doc.data().ordersCount || 0;
        //     userWishlist.textContent = doc.data().wishlistCount || 0;
        //   }
        // });

      } else {
        window.location.replace('index.html');
      }
    });

    // =============================================================
    // 5. تسجيل الخروج
    // =============================================================
    logoutBtn.addEventListener('click', function() {
      auth.signOut().then(() => window.location.replace('index.html'))
        .catch(err => showToast('❌ خطأ: ' + err.message));
    });

    // =============================================================
    // 6. تعديل الملف (واجهة فقط)
    // =============================================================
    editBtn.addEventListener('click', () => editModal.classList.add('active'));
    cancelEdit.addEventListener('click', () => editModal.classList.remove('active'));
    editModal.addEventListener('click', function(e) {
      if (e.target === editModal) editModal.classList.remove('active');
    });

    saveProfile.addEventListener('click', function() {
      showToast('✅ تم تحديث البيانات محلياً (للتعديل الفعلي استخدم Firebase Console)');
      editModal.classList.remove('active');
      const newName = editName.value.trim() || 'مستخدم';
      userDisplayName.textContent = newName;
      if (!auth.currentUser?.photoURL) {
        userAvatar.textContent = newName.charAt(0).toUpperCase();
      }
    });

    // =============================================================
    // 7. إغلاق القائمة عند تغيير الحجم
    // =============================================================
    window.addEventListener('resize', function() {
      if (window.innerWidth > 992) closeSidebar();
    });
  </script>
</body>
</html>
