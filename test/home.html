<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الرئيسية | LiderCenter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #050b14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: min(92%, 580px);
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(30px);
      border-radius: 44px;
      padding: clamp(2.5rem, 7vw, 4.5rem) clamp(1.8rem, 5vw, 3.5rem);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7);
    }
    .welcome-icon {
      font-size: clamp(4rem, 12vw, 6rem);
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      margin-bottom: 12px;
    }
    h1 .highlight {
      background: linear-gradient(145deg, #f5d76e, #f1c40f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: rgba(255, 255, 255, 0.7);
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      line-height: 1.9;
      margin: 20px 0 35px;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 10px;
    }
    .btn-group .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: clamp(14px, 2vh, 20px) clamp(24px, 4vw, 40px);
      border-radius: 80px;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: clamp(1rem, 2vw, 1.2rem);
      transition: all 0.2s;
      cursor: pointer;
      width: 100%;
    }
    .btn:active {
      transform: scale(0.96);
      background: rgba(255, 255, 255, 0.15);
    }
    .btn-gold {
      background: linear-gradient(145deg, #f5d76e, #f1c40f);
      color: #050b14;
      border-color: transparent;
    }
    .btn-gold i {
      color: #050b14;
    }
    .btn-gold:active {
      background: #e6b800;
    }
    .btn-logout i {
      color: #f1c40f;
    }
    .btn-logout:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="welcome-icon">🏠</div>
    <h1><span class="highlight">Lider</span>Center</h1>
    <p style="font-size:clamp(1.4rem, 3vw, 2rem); font-weight:700; color:#f5d76e;">
      ✅ مرحباً بك في لوحة التحكم
    </p>
    <p>
      لقد تم تسجيل الدخول بنجاح.<br />
      هذه هي الصفحة الرئيسية الخاصة بك.
    </p>

    <div class="btn-group">
      <!-- أزرار إضافية (مثال) -->
      <a href="shop.html" class="btn btn-gold">
        <i class="fas fa-store"></i> المتجر
      </a>
      <a href="profile.html" class="btn">
        <i class="fas fa-user"></i> الملف الشخصي
      </a>
      <a href="orders.html" class="btn">
        <i class="fas fa-box"></i> طلباتي
      </a>
      <!-- زر تسجيل الخروج (يعمل الآن) -->
      <button id="logoutBtn" class="btn btn-logout">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
      </button>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    // =============================================================
    // 1. تهيئة Firebase (نفس إعدادات index.html)
    // =============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyB0lg1AkTQF1ZdntWZsWUoCG8GpqbK-WAY",
      authDomain: "ashlhl-ed7c7e17.firebaseapp.com",
      projectId: "ashlhl-ed7c7e17",
      storageBucket: "ashlhl-ed7c7e17.firebasestorage.app",
      messagingSenderId: "246682226738",
      appId: "1:246682226738:web:4301ea8caebe2c1325ac2b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // =============================================================
    // 2. زر تسجيل الخروج – يقوم بتسجيل الخروج فعلياً ثم التوجيه
    // =============================================================
    document.getElementById('logoutBtn').addEventListener('click', function() {
      auth.signOut()
        .then(() => {
          console.log('✅ تم تسجيل الخروج');
          window.location.replace('index.html'); // أو الصفحة التي تريدها
        })
        .catch((error) => {
          console.error('❌ خطأ أثناء تسجيل الخروج:', error);
          alert('حدث خطأ أثناء تسجيل الخروج، حاول مرة أخرى.');
        });
    });

    // =============================================================
    // 3. (اختياري) التأكد من أن المستخدم لا يزال مسجلاً، وإلا نعيده
    // =============================================================
    auth.onAuthStateChanged(function(user) {
      if (!user) {
        // إذا لم يكن مسجلاً، نوجهه إلى صفحة الدخول
        window.location.replace('index.html');
      }
    });
  </script>
</body>
</html>
