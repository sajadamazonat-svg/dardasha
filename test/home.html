<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>LiderCenter | الرئيسية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

  <style>
    /* ===== RESET & GLOBAL ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Tajawal', sans-serif;
    }

    :root {
      --bg-body: #f4f6fa;
      --bg-card: #ffffff;
      --primary: #1e3a5f;
      --primary-light: #e8edf5;
      --secondary: #c9a84c;
      --secondary-light: #f7f0e0;
      --text-primary: #1a2332;
      --text-secondary: #4a5568;
      --text-muted: #8896ab;
      --border-light: #e2e8f0;
      --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.09);
      --radius-md: 16px;
      --radius-lg: 28px;
      --radius-full: 60px;
      --transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      --sidebar-width: 280px;
    }

    body {
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 80px;
      overflow-x: hidden;
    }
    a {
      text-decoration: none;
      color: inherit;
    }

    /* ===== شريط علوي ===== */
    .topbar {
      background: var(--bg-card);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .menu-toggle {
      background: none;
      border: none;
      font-size: 22px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 12px;
      transition: var(--transition);
    }
    .menu-toggle:hover {
      background: var(--primary-light);
      color: var(--primary);
    }
    .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .logo span {
      color: var(--secondary);
    }
    .topbar-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .topbar-actions button {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 12px;
      transition: var(--transition);
      position: relative;
    }
    .topbar-actions button:hover {
      background: var(--primary-light);
      color: var(--primary);
    }
    .cart-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: var(--secondary);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(201, 168, 76, 0.4);
    }

    /* ===== القائمة الجانبية ===== */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 998;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
      backdrop-filter: blur(4px);
    }
    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--bg-card);
      border-left: 1px solid var(--border-light);
      padding: 28px 20px 30px;
      display: flex;
      flex-direction: column;
      z-index: 999;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: var(--shadow-lg);
      overflow-y: auto;
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 20px;
    }
    .sidebar-logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .sidebar-logo span {
      color: var(--secondary);
    }
    .sidebar-close {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 12px;
      transition: var(--transition);
    }
    .sidebar-close:hover {
      background: var(--border-light);
    }
    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: var(--transition);
      border: 1px solid transparent;
    }
    .sidebar-nav a i {
      width: 24px;
      font-size: 1.2rem;
      color: var(--text-muted);
      transition: var(--transition);
    }
    .sidebar-nav a:hover {
      background: var(--primary-light);
      color: var(--text-primary);
      border-color: var(--border-light);
    }
    .sidebar-nav a:hover i {
      color: var(--primary);
    }
    .sidebar-nav a.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--border-light);
    }
    .sidebar-nav a.active i {
      color: var(--primary);
    }
    .sidebar-nav a.dashboard-link {
      background: var(--secondary-light);
      border-color: var(--secondary);
      color: var(--primary);
    }
    .sidebar-nav a.dashboard-link i {
      color: var(--secondary);
    }
    .sidebar-nav a.dashboard-link.hidden {
      display: none;
    }
    .sidebar-footer {
      border-top: 1px solid var(--border-light);
      padding-top: 18px;
      margin-top: 8px;
    }
    .sidebar-footer .logout-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: #fee9e9;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: var(--transition);
      text-align: right;
      border: none;
    }
    .sidebar-footer .logout-btn i {
      font-size: 1.2rem;
    }
    .sidebar-footer .logout-btn:hover {
      background: #fdd8d8;
    }

    /* ===== المحتوى الرئيسي ===== */
    .main-content {
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }
    .main-content.shifted {
      filter: brightness(0.96);
      opacity: 0.9;
    }

    /* ===== بحث ===== */
    .search-wrapper {
      padding: 12px 24px 8px;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-full);
      padding: 4px 20px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .search-box:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.12);
    }
    .search-box i {
      color: var(--text-muted);
      font-size: 18px;
      margin-left: 14px;
    }
    .search-box input {
      border: none;
      outline: none;
      background: transparent;
      flex: 1;
      padding: 14px 0;
      font-size: 16px;
      color: var(--text-primary);
    }
    .search-box input::placeholder {
      color: var(--text-muted);
    }

    /* ===== سلايدر ===== */
    .slider-container {
      padding: 12px 24px 8px;
    }
    .slider {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      height: 190px;
      box-shadow: var(--shadow-md);
      background: var(--primary-light);
    }
    .slider-slides {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 24px 32px;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(30, 58, 95, 0.7) 0%, rgba(30, 58, 95, 0.2) 100%);
      z-index: 1;
    }
    .slide-content {
      position: relative;
      z-index: 2;
      color: #fff;
      max-width: 70%;
    }
    .slide-content h2 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .slide-content p {
      font-size: 16px;
      opacity: 0.9;
      font-weight: 400;
    }
    .slide-badge {
      display: inline-block;
      background: var(--secondary);
      color: #fff;
      padding: 4px 16px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 700;
      margin-top: 8px;
    }
    .slide-indicators {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 3;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transition: var(--transition);
      cursor: pointer;
    }
    .dot.active {
      background: #fff;
      width: 24px;
      border-radius: 6px;
    }

    /* ===== التصنيفات ===== */
    .categories-section {
      padding: 16px 24px 6px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-header h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .section-header a {
      font-size: 14px;
      color: var(--primary);
      font-weight: 500;
      transition: var(--transition);
    }
    .section-header a:hover {
      color: var(--secondary);
    }
    .categories-scroll {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    .categories-scroll::-webkit-scrollbar {
      display: none;
    }
    .category-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 72px;
      cursor: pointer;
      transition: var(--transition);
    }
    .category-item:hover {
      transform: translateY(-4px);
    }
    .category-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--primary);
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .category-item:hover .category-icon {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 20px rgba(30, 58, 95, 0.2);
    }
    .category-item span {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 6px;
      white-space: nowrap;
    }

    /* ===== أزرار الإدارة ===== */
    .admin-actions {
      display: flex;
      justify-content: center;
      padding: 16px 24px;
    }
    .admin-actions .add-product-btn {
      background: var(--secondary);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 6px 20px rgba(201, 168, 76, 0.3);
    }
    .admin-actions .add-product-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 30px rgba(201, 168, 76, 0.4);
    }
    .admin-actions .add-product-btn.hidden {
      display: none;
    }

    /* ===== شبكة المنتجات ===== */
    .products-section {
      padding: 8px 16px 16px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    /* ===== بطاقة المنتج ===== */
    .product-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      border: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
      position: relative;
    }
    .product-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-6px);
      border-color: var(--secondary-light);
    }
    .product-image {
      position: relative;
      height: 160px;
      background: var(--primary-light);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }
    .product-card:hover .product-image img {
      transform: scale(1.05);
    }
    .product-image .fav-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(255, 255, 255, 0.85);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #a0aec0;
      cursor: pointer;
      transition: var(--transition);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      z-index: 2;
    }
    .product-image .fav-btn:hover {
      background: #fff;
      transform: scale(1.1);
    }
    .product-image .fav-btn.liked {
      color: #e53e3e;
    }

    .product-image .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 0, 0, 0.85);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
      cursor: pointer;
      transition: var(--transition);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      opacity: 0;
      z-index: 5;
    }
    .product-card:hover .delete-btn {
      opacity: 1;
    }
    .product-image .delete-btn:hover {
      background: #cc0000;
      transform: scale(1.1);
    }
    .product-image .delete-btn.hidden {
      display: none;
    }

    .product-info {
      padding: 14px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .product-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--text-primary);
    }
    .product-pricing {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0 8px;
      flex-wrap: wrap;
    }
    .product-price {
      font-size: 19px;
      font-weight: 700;
      color: var(--primary);
    }
    .product-old-price {
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: line-through;
    }
    .product-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--secondary);
      margin-bottom: 10px;
    }
    .product-rating i {
      color: var(--secondary);
      letter-spacing: 1px;
    }
    .product-rating span {
      color: var(--text-muted);
      margin-right: 4px;
    }
    .add-to-cart-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      padding: 11px 0;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
      margin-top: auto;
      letter-spacing: 0.3px;
    }
    .add-to-cart-btn:hover {
      background: #15304f;
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(30, 58, 95, 0.25);
    }
    .add-to-cart-btn:active {
      transform: scale(0.96);
    }
    .add-to-cart-btn.added {
      background: var(--secondary);
    }

    /* ===== نافذة إضافة منتج ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-box {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      max-width: 480px;
      width: 100%;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-box h3 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
      color: var(--text-primary);
    }
    .modal-box label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .modal-box input,
    .modal-box textarea,
    .modal-box select {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      background: #f8fafc;
      color: var(--text-primary);
      font-size: 1rem;
      margin-bottom: 16px;
      transition: 0.2s;
      font-family: 'Tajawal', sans-serif;
    }
    .modal-box input:focus,
    .modal-box textarea:focus,
    .modal-box select:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .modal-actions button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius-full);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Tajawal', sans-serif;
    }
    .modal-actions .btn-save {
      background: var(--primary);
      color: #fff;
    }
    .modal-actions .btn-save:active {
      transform: scale(0.96);
    }
    .modal-actions .btn-cancel {
      background: #e2e8f0;
      color: var(--text-primary);
    }
    .modal-actions .btn-cancel:active {
      transform: scale(0.96);
    }

    /* ===== شريط التنقل السفلي ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border-light);
      display: flex;
      justify-content: space-around;
      padding: 6px 0 12px;
      z-index: 200;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.04);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: var(--transition);
      padding: 4px 12px;
      border: none;
      background: none;
      position: relative;
    }
    .nav-item i {
      font-size: 24px;
      transition: var(--transition);
    }
    .nav-item.active {
      color: var(--primary);
    }
    .nav-item.active i {
      transform: translateY(-2px);
    }
    .nav-item:hover {
      color: var(--text-primary);
    }
    .nav-item .nav-badge {
      position: absolute;
      top: 0;
      right: 4px;
      background: var(--secondary);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== حالة التحميل ===== */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 18px;
    }
    .loading i {
      font-size: 32px;
      color: var(--secondary);
      margin-bottom: 12px;
      display: block;
    }

    /* ===== حركات ===== */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .product-card:nth-child(1) {
      animation-delay: 0.05s;
    }
    .product-card:nth-child(2) {
      animation-delay: 0.10s;
    }
    .product-card:nth-child(3) {
      animation-delay: 0.15s;
    }
    .product-card:nth-child(4) {
      animation-delay: 0.20s;
    }
    .product-card:nth-child(5) {
      animation-delay: 0.25s;
    }
    .product-card:nth-child(6) {
      animation-delay: 0.30s;
    }
    .product-card:nth-child(7) {
      animation-delay: 0.35s;
    }
    .product-card:nth-child(8) {
      animation-delay: 0.40s;
    }

    /* ===== استجابة ===== */
    @media (max-width: 480px) {
      .topbar {
        padding: 10px 16px;
      }
      .logo {
        font-size: 20px;
      }
      .topbar-actions button {
        font-size: 18px;
        padding: 6px 8px;
      }
      .search-wrapper {
        padding: 8px 16px;
      }
      .slider-container {
        padding: 8px 16px;
      }
      .slider {
        height: 140px;
      }
      .slide {
        padding: 16px 20px;
      }
      .slide-content h2 {
        font-size: 20px;
      }
      .slide-content p {
        font-size: 14px;
      }
      .categories-section {
        padding: 12px 16px 4px;
      }
      .products-section {
        padding: 4px 12px 12px;
      }
      .product-grid {
        gap: 12px;
      }
      .product-image {
        height: 120px;
      }
      .product-name {
        font-size: 13px;
      }
      .product-price {
        font-size: 16px;
      }
      .add-to-cart-btn {
        font-size: 12px;
        padding: 9px 0;
      }
      .bottom-nav {
        padding: 4px 0 10px;
      }
      .nav-item i {
        font-size: 20px;
      }
      .nav-item span {
        font-size: 11px;
      }
      .sidebar {
        width: 280px;
      }
      .modal-box {
        padding: 24px 18px;
      }
    }

    @media (min-width: 600px) {
      .product-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    @media (min-width: 900px) {
      .product-grid {
        grid-template-columns: repeat(4, 1fr);
      }
      .slider {
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== القائمة الجانبية ===== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><span>Lider</span>Center</div>
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-xmark"></i></button>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <a href="#" class="active"><i class="fas fa-home"></i> الرئيسية</a>
      <a href="dashboard.html" class="dashboard-link hidden" id="dashboardLink"><i class="fas fa-chart-pie"></i> لوحة التحكم</a>
      <a href="#"><i class="fas fa-box"></i> الطلبات</a>
      <a href="#"><i class="fas fa-heart"></i> المفضلة</a>
      <a href="#"><i class="fas fa-sliders-h"></i> الإعدادات</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </div>
  </aside>

  <!-- ===== المحتوى الرئيسي ===== -->
  <div class="main-content" id="mainContent">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="logo"><span>Lider</span>Center</div>
      </div>
      <div class="topbar-actions">
        <button aria-label="بحث"><i class="fas fa-search"></i></button>
        <button aria-label="إشعارات"><i class="fas fa-bell"></i></button>
        <button class="cart-btn"><i class="fas fa-shopping-cart"></i><span class="cart-badge" id="cartCount">0</span></button>
      </div>
    </header>

    <div class="search-wrapper">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="ابحث عن منتجات..." id="searchInput" />
      </div>
    </div>

    <div class="slider-container">
      <div class="slider" id="slider">
        <div class="slider-slides" id="sliderSlides"></div>
        <div class="slide-indicators" id="indicators"></div>
      </div>
    </div>

    <section class="categories-section">
      <div class="section-header"><h3>التصنيفات</h3><a href="#" id="viewAllCategories">عرض الكل</a></div>
      <div class="categories-scroll" id="categoriesContainer"></div>
    </section>

    <div class="admin-actions" id="adminActions">
      <button class="add-product-btn hidden" id="addProductBtn"><i class="fas fa-plus-circle"></i> إضافة منتج جديد</button>
    </div>

    <section class="products-section">
      <div class="section-header"><h3>جميع المنتجات</h3><a href="#" id="viewAllProducts">عرض الكل</a></div>
      <div class="product-grid" id="productGrid">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المنتجات...</div>
      </div>
    </section>
  </div>

  <!-- ===== شريط سفلي ===== -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>الرئيسية</span></button>
    <button class="nav-item" data-page="categories"><i class="fas fa-th-large"></i><span>التصنيفات</span></button>
    <button class="nav-item" data-page="favorites"><i class="fas fa-heart"></i><span>المفضلة</span><span class="nav-badge" id="favCount">0</span></button>
    <button class="nav-item" data-page="cart"><i class="fas fa-shopping-cart"></i><span>السلة</span><span class="nav-badge" id="cartBadge">0</span></button>
    <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>الحساب</span></button>
  </nav>

  <!-- ===== نافذة إضافة منتج ===== -->
  <div class="modal-overlay" id="addProductModal">
    <div class="modal-box">
      <h3><i class="fas fa-plus-circle" style="color: var(--secondary);"></i> إضافة منتج جديد</h3>
      <form id="addProductForm">
        <label for="productName">اسم المنتج</label>
        <input type="text" id="productName" placeholder="أدخل اسم المنتج" required />
        <label for="productPrice">السعر (ر.س)</label>
        <input type="number" id="productPrice" placeholder="مثال: 199" required />
        <label for="productOldPrice">السعر القديم (اختياري)</label>
        <input type="number" id="productOldPrice" placeholder="مثال: 299" />
        <label for="productImage">رابط الصورة</label>
        <input type="url" id="productImage" placeholder="https://example.com/image.jpg" required />
        <label for="productCategory">التصنيف</label>
        <select id="productCategory" required>
          <option value="featured">مميز</option>
          <option value="bestseller">الأكثر مبيعاً</option>
          <option value="new">وصل حديثاً</option>
        </select>
        <label for="productRating">التقييم (من 0 إلى 5)</label>
        <input type="number" id="productRating" placeholder="مثال: 4.5" step="0.1" min="0" max="5" value="4.5" />
        <label for="productReviews">عدد التقييمات</label>
        <input type="number" id="productReviews" placeholder="مثال: 120" value="0" />
        <div class="modal-actions">
          <button type="submit" class="btn-save"><i class="fas fa-save"></i> حفظ المنتج</button>
          <button type="button" class="btn-cancel" id="cancelAddProduct">إلغاء</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== Firebase ===== -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getDatabase, ref, set, push, onValue, remove } from 'firebase/database';

    const firebaseConfig = {
      apiKey: "AIzaSyDDb5kAoZCOLGqVvzKZ9q-wB1FZrdqyVH8",
      authDomain: "sample-firebase-ai-app-c5b33.firebaseapp.com",
      databaseURL: "https://sample-firebase-ai-app-c5b33-default-rtdb.firebaseio.com",
      projectId: "sample-firebase-ai-app-c5b33",
      storageBucket: "sample-firebase-ai-app-c5b33.firebasestorage.app",
      messagingSenderId: "183057738013",
      appId: "1:183057738013:web:649fc47c465a23da1959f4",
      measurementId: "G-1SCGVCM2WW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);
    const ALLOWED_EMAIL = "ashlhl.iq@gmail.com";

    // عناصر DOM
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const mainContent = document.getElementById('mainContent');
    const menuToggle = document.getElementById('menuToggle');
    const sidebarClose = document.getElementById('sidebarClose');
    const dashboardLink = document.getElementById('dashboardLink');
    const logoutBtn = document.getElementById('logoutBtn');
    const productGrid = document.getElementById('productGrid');
    const sliderSlides = document.getElementById('sliderSlides');
    const indicators = document.getElementById('indicators');
    const categoriesContainer = document.getElementById('categoriesContainer');
    const addProductBtn = document.getElementById('addProductBtn');
    const addProductModal = document.getElementById('addProductModal');
    const cancelAddProduct = document.getElementById('cancelAddProduct');
    const addProductForm = document.getElementById('addProductForm');
    const searchInput = document.getElementById('searchInput');

    let isAdmin = false;

    // ===== دالة عرض رسائل =====
    function showToast(msg, type = 'info') {
      const existing = document.querySelector('.toast-message');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast-message';
      toast.style.cssText = `
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
        background: ${type === 'success' ? '#38a169' : type === 'error' ? '#e53e3e' : '#2b6cb0'};
        color: #fff; padding: 12px 28px; border-radius: 60px; font-size: 16px; font-weight: 500;
        z-index: 3000; box-shadow: 0 8px 30px rgba(0,0,0,0.2); font-family: 'Tajawal', sans-serif;
        animation: fadeUp 0.3s ease; direction: rtl;
      `;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(20px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // ===== تحميل المنتجات =====
    function loadProducts() {
      const productsRef = ref(database, 'products');
      onValue(productsRef, (snapshot) => {
        const data = snapshot.val();
        const products = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
        renderProducts(products);
      });
    }

    function renderProducts(products) {
      if (!products || products.length === 0) {
        productGrid.innerHTML = `<div class="loading"><i class="fas fa-box-open"></i> لا توجد منتجات</div>`;
        return;
      }
      productGrid.innerHTML = '';
      products.forEach((product, index) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.style.animationDelay = `${index * 0.05}s`;

        const imageDiv = document.createElement('div');
        imageDiv.className = 'product-image';
        const img = document.createElement('img');
        img.src = product.image || 'https://via.placeholder.com/300x300?text=No+Image';
        img.alt = product.name || 'منتج';
        img.loading = 'lazy';
        imageDiv.appendChild(img);

        // زر المفضلة
        const favBtn = document.createElement('button');
        favBtn.className = 'fav-btn';
        favBtn.innerHTML = '<i class="fas fa-heart"></i>';
        favBtn.dataset.liked = 'false';
        favBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          this.dataset.liked = this.dataset.liked === 'true' ? 'false' : 'true';
          this.classList.toggle('liked');
          updateFavCount();
        });
        imageDiv.appendChild(favBtn);

        // زر حذف (للمشرف)
        const deleteBtn = document.createElement('button');
        deleteBtn.className = `delete-btn ${isAdmin ? '' : 'hidden'}`;
        deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
        deleteBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (confirm(`حذف "${product.name}"؟`)) {
            remove(ref(database, `products/${product.id}`))
              .then(() => showToast('تم الحذف', 'success'))
              .catch(err => showToast('فشل الحذف: ' + err.message, 'error'));
          }
        });
        imageDiv.appendChild(deleteBtn);

        const info = document.createElement('div');
        info.className = 'product-info';
        const name = document.createElement('div');
        name.className = 'product-name';
        name.textContent = product.name || 'بدون اسم';
        const pricing = document.createElement('div');
        pricing.className = 'product-pricing';
        const priceSpan = document.createElement('span');
        priceSpan.className = 'product-price';
        priceSpan.textContent = (product.price || 0) + ' ر.س';
        pricing.appendChild(priceSpan);
        if (product.oldPrice) {
          const old = document.createElement('span');
          old.className = 'product-old-price';
          old.textContent = product.oldPrice + ' ر.س';
          pricing.appendChild(old);
        }
        const rating = document.createElement('div');
        rating.className = 'product-rating';
        const rate = product.rating || 0;
        let stars = '';
        for (let i = 0; i < 5; i++) {
          stars += i < Math.floor(rate) ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
        }
        rating.innerHTML = stars + ` <span>(${product.reviews || 0})</span>`;

        const addBtn = document.createElement('button');
        addBtn.className = 'add-to-cart-btn';
        addBtn.textContent = 'إضافة إلى السلة';
        addBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          this.classList.toggle('added');
          this.textContent = this.classList.contains('added') ? '✓ أضيفت' : 'إضافة إلى السلة';
          updateCartCount();
        });

        info.appendChild(name);
        info.appendChild(pricing);
        info.appendChild(rating);
        info.appendChild(addBtn);
        card.appendChild(imageDiv);
        card.appendChild(info);
        productGrid.appendChild(card);
      });
    }

    // ===== السلايدر =====
    function loadSlides() {
      const slidesRef = ref(database, 'slides');
      onValue(slidesRef, (snapshot) => {
        const data = snapshot.val();
        const slides = data ? Object.values(data) : [];
        sliderSlides.innerHTML = '';
        indicators.innerHTML = '';
        if (!slides.length) {
          sliderSlides.innerHTML = `<div class="slide" style="background:linear-gradient(135deg,#1e3a5f,#2a4b7a);">
            <div class="slide-content"><h2>مرحباً</h2><p>أضف عروضك</p><span class="slide-badge">ابدأ</span></div>
          </div>`;
          indicators.innerHTML = `<span class="dot active"></span>`;
          return;
        }
        slides.forEach((s, i) => {
          const div = document.createElement('div');
          div.className = 'slide';
          div.style.background = `linear-gradient(135deg, ${s.bgColor || '#1e3a5f'}, ${s.bgColor2 || '#2a4b7a'})`;
          div.innerHTML = `<div class="slide-content"><h2>${s.title || 'عرض'}</h2><p>${s.subtitle || ''}</p><span class="slide-badge">${s.badge || 'عرض'}</span></div>`;
          sliderSlides.appendChild(div);
          const dot = document.createElement('span');
          dot.className = `dot ${i === 0 ? 'active' : ''}`;
          dot.dataset.index = i;
          dot.addEventListener('click', () => goToSlide(i));
          indicators.appendChild(dot);
        });
        let current = 0;
        const total = slides.length;
        const goToSlide = (index) => {
          if (index < 0) index = total - 1;
          if (index >= total) index = 0;
          current = index;
          sliderSlides.style.transform = `translateX(-${index * 100}%)`;
          document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === index));
        };
        let interval = setInterval(() => goToSlide(current + 1), 4500);
        document.querySelectorAll('.dot').forEach((d, i) => d.addEventListener('click', () => {
          goToSlide(i);
          clearInterval(interval);
          interval = setInterval(() => goToSlide(current + 1), 4500);
        }));
      });
    }

    // ===== التصنيفات =====
    function loadCategories() {
      const catRef = ref(database, 'categories');
      onValue(catRef, (snapshot) => {
        const data = snapshot.val();
        const cats = data ? Object.values(data) : [];
        categoriesContainer.innerHTML = '';
        if (!cats.length) {
          ['إلكترونيات', 'ملابس', 'أحذية', 'مستحضرات', 'منزل', 'كتب'].forEach(c => {
            const item = document.createElement('div');
            item.className = 'category-item';
            item.innerHTML = `<div class="category-icon"><i class="fas fa-tag"></i></div><span>${c}</span>`;
            categoriesContainer.appendChild(item);
          });
          return;
        }
        cats.forEach(c => {
          const item = document.createElement('div');
          item.className = 'category-item';
          item.innerHTML = `<div class="category-icon"><i class="fas ${c.icon || 'fa-tag'}"></i></div><span>${c.name}</span>`;
          categoriesContainer.appendChild(item);
        });
      });
    }

    // ===== عدادات =====
    function updateCartCount() {
      const el = document.getElementById('cartCount');
      const badge = document.getElementById('cartBadge');
      const val = parseInt(el.textContent) + 1;
      el.textContent = val;
      badge.textContent = val;
    }
    function updateFavCount() {
      document.getElementById('favCount').textContent = document.querySelectorAll('.fav-btn.liked').length;
    }

    // ===== إدارة القائمة الجانبية =====
    menuToggle.addEventListener('click', () => { sidebar.classList.add('open');
      overlay.classList.add('active');
      mainContent.classList.add('shifted');
      document.body.style.overflow = 'hidden'; });
    sidebarClose.addEventListener('click', () => { sidebar.classList.remove('open');
      overlay.classList.remove('active');
      mainContent.classList.remove('shifted');
      document.body.style.overflow = ''; });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open');
      overlay.classList.remove('active');
      mainContent.classList.remove('shifted');
      document.body.style.overflow = ''; });

    // ===== تسجيل الخروج =====
    logoutBtn.addEventListener('click', function() {
      if (confirm('تسجيل الخروج؟')) {
        signOut(auth)
          .then(() => {
            showToast('تم تسجيل الخروج', 'success');
            window.location.reload();
          })
          .catch(err => showToast('خطأ: ' + err.message, 'error'));
      }
    });

    // ===== إضافة منتج =====
    addProductBtn.addEventListener('click', () => {
      if (!isAdmin) { showToast('غير مصرح', 'error'); return; }
      addProductModal.classList.add('active');
    });
    cancelAddProduct.addEventListener('click', () => addProductModal.classList.remove('active'));
    addProductModal.addEventListener('click', (e) => { if (e.target === e.currentTarget) addProductModal.classList.remove(
        'active'); });

    addProductForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      if (!isAdmin) { showToast('غير مصرح', 'error'); return; }
      const name = document.getElementById('productName').value.trim();
      const price = parseFloat(document.getElementById('productPrice').value);
      const oldPrice = parseFloat(document.getElementById('productOldPrice').value) || null;
      const image = document.getElementById('productImage').value.trim();
      const category = document.getElementById('productCategory').value;
      const rating = parseFloat(document.getElementById('productRating').value) || 0;
      const reviews = parseInt(document.getElementById('productReviews').value) || 0;
      if (!name || !price || !image) { showToast('املأ الحقول المطلوبة', 'error'); return; }
      try {
        await set(push(ref(database, 'products')), { name, price, oldPrice, image, category, rating, reviews,
          createdAt: Date.now() });
        showToast('تمت الإضافة', 'success');
        this.reset();
        addProductModal.classList.remove('active');
      } catch (err) {
        showToast('فشل: ' + err.message, 'error');
      }
    });

    // ===== البحث =====
    searchInput.addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      document.querySelectorAll('.product-card').forEach(card => {
        const name = card.querySelector('.product-name')?.textContent?.toLowerCase() || '';
        card.style.display = name.includes(q) ? '' : 'none';
      });
    });

    // ===== أزرار الشريط السفلي =====
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        const page = this.dataset.page;
        if (page === 'home') window.scrollTo({ top: 0, behavior: 'smooth' });
        else if (page === 'categories') alert('التصنيفات');
        else if (page === 'favorites') alert('المفضلة: ' + document.querySelectorAll('.fav-btn.liked').length);
        else if (page === 'cart') alert('السلة: ' + document.getElementById('cartCount').textContent);
        else if (page === 'profile') alert('الحساب');
      });
    });

    // ===== مراقبة حالة المستخدم =====
    onAuthStateChanged(auth, (user) => {
      isAdmin = user && user.email === ALLOWED_EMAIL;

      if (isAdmin) {
        dashboardLink.classList.remove('hidden');
        addProductBtn.classList.remove('hidden');
        document.querySelectorAll('.delete-btn').forEach(btn => btn.classList.remove('hidden'));
      } else {
        dashboardLink.classList.add('hidden');
        addProductBtn.classList.add('hidden');
        document.querySelectorAll('.delete-btn').forEach(btn => btn.classList.add('hidden'));
      }
      if (!user) {
        dashboardLink.classList.add('hidden');
        addProductBtn.classList.add('hidden');
        document.querySelectorAll('.delete-btn').forEach(btn => btn.classList.add('hidden'));
      }
    });

    // ===== تحميل البيانات =====
    loadProducts();
    loadSlides();
    loadCategories();
    document.addEventListener('DOMContentLoaded', () => {
      updateFavCount();
      document.getElementById('cartBadge').textContent = '0';
    });

    document.querySelectorAll('.sidebar-nav a:not(#dashboardLink)').forEach(link => {
      link.addEventListener('click', function(e) {
        if (this.getAttribute('href') === '#') e.preventDefault();
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
        mainContent.classList.remove('shifted');
        document.body.style.overflow = '';
      });
    });
  </script>
</body>
</html>
