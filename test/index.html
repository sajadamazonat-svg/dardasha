<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lidercenter - تحميل</title>
    <style>
        /* ---------- إعدادات عامة ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff; /* خلفية بيضاء بالكامل */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            direction: rtl;
        }

        /* ---------- بطاقة التحميل ---------- */
        .loader-card {
            background: #ffffff;
            padding: 50px 40px 40px;
            text-align: center;
            width: 380px;
            max-width: 90%;
            border: 1px solid #e0e0e0; /* حدود رمادية خفيفة جداً */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* ظل خفيف جداً */
            transition: opacity 0.5s ease;
        }

        /* ---------- اسم المتجر (أسود صريح) ---------- */
        .store-name {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: #000000; /* أسود */
            margin-bottom: 5px;
        }

        .sub-title {
            color: #666666; /* رمادي متوسط */
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 35px;
            border-bottom: 1px solid #eeeeee;
            padding-bottom: 15px;
        }

        /* ---------- مؤشر التقدم الدائري (Spinner) ---------- */
        .progress-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .spinner-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 5px solid #eaeaea; /* رمادي فاتح جداً */
            border-top: 5px solid #000000; /* الخط العلوي أسود */
            animation: spin 1s linear infinite; /* حركة الدوران */
            transition: border-color 0.3s;
        }

        /* عند اكتمال التحميل، نوقف الحركة ونغير اللون */
        .spinner-circle.done {
            border: 5px solid #000000;
            animation: none;
        }

        /* حركة الدوران */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* النسبة المئوية في منتصف الدائرة */
        .percentage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 700;
            color: #000000; /* أسود */
        }

        .percentage-text span {
            font-size: 1.2rem;
            color: #888888;
        }

        /* ---------- علامة الصح (✔) عند الانتهاء ---------- */
        .checkmark {
            display: none;
            font-size: 3.5rem;
            color: #000000;
            margin: 5px auto 15px;
            font-weight: 300;
        }

        .checkmark.show {
            display: block;
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ---------- شريط التقدم السفلي (خط أفقي بسيط) ---------- */
        .progress-bar {
            width: 100%;
            height: 3px;
            background: #eeeeee;
            border-radius: 10px;
            margin: 15px auto 10px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: #000000; /* أسود */
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        /* ---------- نص الحالة (أسفل كل شيء) ---------- */
        .status-text {
            color: #555555;
            font-size: 0.9rem;
            min-height: 25px;
            margin-top: 10px;
            font-weight: 400;
        }

        .status-text .highlight {
            color: #000000;
            font-weight: 600;
        }

        /* تأثير تلاشي عند التوجيه */
        .fade-out {
            opacity: 0;
            transform: scale(0.96);
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>

    <!-- ====== بطاقة التحميل ====== -->
    <div class="loader-card" id="loaderCard">

        <!-- اسم المتجر -->
        <div class="store-name">lidercenter</div>
        <div class="sub-title">● متجرك الإلكتروني ●</div>

        <!-- الدائرة + النسبة -->
        <div class="progress-wrapper">
            <div class="spinner-circle" id="spinnerCircle"></div>
            <div class="percentage-text" id="percentageDisplay">
                0<span>%</span>
            </div>
        </div>

        <!-- علامة الصح -->
        <div class="checkmark" id="checkmark">✔</div>

        <!-- شريط التقدم الأفقي -->
        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>

        <!-- نص الحالة المتغير -->
        <div class="status-text" id="statusText">
            جاري تحميل <span class="highlight">lidercenter</span> ...
        </div>
    </div>

    <!-- ====== كود جافا سكريبت ====== -->
    <script>
        (function() {
            'use strict';

            // عناصر الصفحة
            const spinner = document.getElementById('spinnerCircle');
            const percentageDisplay = document.getElementById('percentageDisplay');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const checkmark = document.getElementById('checkmark');
            const loaderCard = document.getElementById('loaderCard');

            let currentProgress = 0;
            const DURATION = 3000; // 3 ثوانٍ كاملة
            const STEP_TIME = 30;
            const TOTAL_STEPS = DURATION / STEP_TIME;
            const INCREMENT = 100 / TOTAL_STEPS;

            // رسائل حالة بسيطة
            const messages = [
                { max: 30, text: 'جاري تهيئة المتجر ...' },
                { max: 60, text: 'تحميل المنتجات ...' },
                { max: 85, text: 'تجهيز واجهة المتجر ...' },
                { max: 99, text: 'أوشكنا على الانتهاء ...' },
                { max: 100, text: 'تم التحميل بنجاح! ✔' }
            ];

            function updateLoader(progress) {
                // تحديث النسبة المئوية
                const intProgress = Math.floor(progress);
                percentageDisplay.innerHTML = intProgress + '<span>%</span>';

                // تحديث شريط التقدم الأفقي
                progressFill.style.width = intProgress + '%';

                // تحديث نص الحالة
                let currentMsg = messages[0].text;
                for (let i = 0; i < messages.length; i++) {
                    if (progress <= messages[i].max) {
                        currentMsg = messages[i].text;
                        break;
                    }
                }
                statusText.innerHTML = currentMsg;

                // إذا اكتمل التحميل (100%)
                if (progress >= 100) {
                    // إيقاف حركة الدائرة وتغيير شكلها
                    spinner.classList.add('done');
                    
                    // إخفاء النسبة المئوية وإظهار علامة الصح
                    percentageDisplay.style.display = 'none';
                    checkmark.classList.add('show');

                    // تغيير لون النص السفلي
                    statusText.style.color = '#000000';
                    statusText.style.fontWeight = '600';

                    // إيقاف المؤقت
                    clearInterval(intervalId);

                    // الانتظار 1 ثانية ثم التوجيه إلى login.html
                    setTimeout(function() {
                        loaderCard.classList.add('fade-out');
                        setTimeout(function() {
                            window.location.href = 'login.html';
                        }, 500);
                    }, 1000);

                    return true;
                }
                return false;
            }

            // بدء العد التنازلي
            const intervalId = setInterval(function() {
                currentProgress += INCREMENT;
                if (currentProgress >= 100) {
                    currentProgress = 100;
                    updateLoader(currentProgress);
                } else {
                    updateLoader(currentProgress);
                }
            }, STEP_TIME);

            // بدء من 0
            updateLoader(0);

            // أمان إضافي: لو علق لأي سبب، ينتهي بعد 5 ثوانٍ إجبارياً
            setTimeout(function() {
                if (currentProgress < 100) {
                    currentProgress = 100;
                    updateLoader(100);
                }
            }, 5000);

        })();
    </script>

</body>
</html>
