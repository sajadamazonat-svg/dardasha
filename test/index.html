<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LiderCenter | شاشة التحميل والترحيب</title>

    <!-- الخط -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
    <!-- الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

    <style>
        /* ---------- إعادة التعيين والمتغيرات ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --navy-deep: #050b14;
            --gold-bright: #f5d76e;
            --gold-intense: #f1c40f;
            --gold-glow: rgba(241, 196, 15, 0.35);
            --white-pure: #ffffff;
            --white-muted: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-card: 32px;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --transition-speed: 0.6s;
        }

        html,
        body {
            height: 100%;
            font-family: 'Tajawal', sans-serif;
            background: var(--navy-deep);
            color: var(--white-pure);
            overflow: hidden;
            margin: 0;
        }

        /* ---------- الحاوية الرئيسية ---------- */
        .app-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 25% 20%, #1a3555 0%, var(--navy-deep) 75%);
            overflow: hidden;
        }

        /* ---------- الخلفيات (Orbs + شبكة) ---------- */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(20, 40, 80, 0.9);
            top: -120px;
            right: -100px;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--gold-glow);
            bottom: -160px;
            left: -120px;
            opacity: 0.5;
        }
        .orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(241, 196, 15, 0.12);
            top: 30%;
            left: 10%;
            filter: blur(70px);
        }
        .grid-lines {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ---------- طبقات الشاشات ---------- */
        .screen-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity var(--transition-speed) cubic-bezier(0.22, 1, 0.36, 1),
                transform var(--transition-speed) cubic-bezier(0.22, 1, 0.36, 1),
                visibility var(--transition-speed) ease;
            will-change: transform, opacity;
            padding: 20px;
        }

        #splashScreen {
            opacity: 1;
            transform: scale(1);
            z-index: 20;
            background: radial-gradient(ellipse at 30% 30%, #0b1a30, var(--navy-deep));
            visibility: visible;
        }
        #splashScreen.hide {
            opacity: 0;
            transform: scale(1.04);
            pointer-events: none;
            visibility: hidden;
        }

        #welcomeScreen {
            opacity: 0;
            transform: scale(0.96);
            pointer-events: none;
            visibility: hidden;
            z-index: 15;
            background: radial-gradient(ellipse at 30% 30%, #0b1a30, var(--navy-deep));
        }
        #welcomeScreen.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            visibility: visible;
        }

        /* ---------- محتوى شاشة التحميل ---------- */
        .splash-content {
            text-align: center;
            z-index: 3;
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        .splash-logo {
            font-size: 72px;
            font-weight: 900;
            color: var(--white-pure);
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 40px rgba(241, 196, 15, 0.2);
        }
        .splash-logo .highlight {
            background: linear-gradient(145deg, var(--gold-bright), var(--gold-intense));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(241, 196, 15, 0.3);
        }
        .splash-sub {
            font-size: 14px;
            color: var(--white-muted);
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* شريط التقدم الجديد */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            margin: 30px auto 18px;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold-bright), var(--gold-intense));
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
            transition: width 0.15s linear;
        }
        .loader-status {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 1px;
            margin-top: 6px;
        }
        .loader-status i {
            margin-left: 8px;
            color: var(--gold-bright);
        }

        /* ---------- بطاقة الترحيب ---------- */
        .welcome-card {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(1.2);
            -webkit-backdrop-filter: blur(32px) saturate(1.2);
            border-radius: var(--radius-card);
            padding: 44px 28px 36px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 0 60px rgba(241, 196, 15, 0.04);
            animation: floatIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .welcome-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-card);
            background: linear-gradient(145deg, rgba(241, 196, 15, 0.15), transparent 30%, transparent 70%,
                    rgba(241, 196, 15, 0.08));
            z-index: -1;
            filter: blur(8px);
        }
        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 16px;
            background: linear-gradient(145deg, var(--gold-bright), var(--gold-intense));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            color: var(--navy-deep);
            box-shadow: 0 16px 48px rgba(241, 196, 15, 0.35);
            font-family: 'Tajawal', sans-serif;
            position: relative;
        }
        .brand-icon::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1.5px solid rgba(241, 196, 15, 0.2);
        }

        .welcome-card h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 2px;
            color: var(--white-pure);
        }
        .welcome-card h1 .highlight {
            background: linear-gradient(145deg, var(--gold-bright), var(--gold-intense));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(241, 196, 15, 0.2);
        }
        .welcome-card .tagline {
            font-size: 13px;
            font-weight: 500;
            color: var(--gold-bright);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0.9;
        }
        .welcome-card .sub-text {
            color: var(--white-muted);
            font-size: 15px;
            font-weight: 400;
            line-height: 1.7;
            margin: 14px 0 32px;
            padding: 0 4px;
        }

        /* الأزرار */
        .btn-primary-gold,
        .btn-secondary-glass {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 0;
            border: none;
            border-radius: 60px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.3px;
            text-decoration: none;
        }
        .btn-primary-gold {
            background: linear-gradient(145deg, var(--gold-bright), var(--gold-intense));
            color: var(--navy-deep);
            box-shadow: 0 8px 32px rgba(241, 196, 15, 0.35);
        }
        .btn-primary-gold:active {
            transform: scale(0.95);
            box-shadow: 0 4px 16px rgba(241, 196, 15, 0.2);
        }
        .btn-secondary-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            color: var(--white-pure);
            backdrop-filter: blur(4px);
            font-weight: 600;
            font-size: 15px;
        }
        .btn-secondary-glass:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .footer-links-welcome {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            gap: 28px;
            font-size: 13px;
            font-weight: 500;
        }
        .footer-links-welcome a {
            color: var(--white-muted);
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.2px;
        }
        .footer-links-welcome a:active {
            color: var(--gold-bright);
        }

        .bottom-bar-global {
            position: absolute;
            bottom: calc(24px + var(--safe-bottom));
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 1px;
            z-index: 1;
            font-weight: 300;
        }
        .bottom-bar-global i {
            margin-left: 8px;
            color: rgba(241, 196, 15, 0.25);
        }

        /* ---------- استجابة للشاشات الصغيرة ---------- */
        @media (max-width: 400px) {
            .splash-logo {
                font-size: 56px;
            }
            .welcome-card {
                padding: 32px 18px 28px;
            }
            .welcome-card h1 {
                font-size: 26px;
            }
            .brand-icon {
                width: 72px;
                height: 72px;
                font-size: 32px;
            }
        }
        @media (min-width: 600px) {
            .welcome-card {
                padding: 56px 48px 44px;
            }
            .welcome-card h1 {
                font-size: 38px;
            }
            .brand-icon {
                width: 104px;
                height: 104px;
                font-size: 48px;
            }
            .splash-logo {
                font-size: 88px;
            }
        }

        /* تفضيل تقليل الحركة */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">

        <!-- العناصر البصرية -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-lines"></div>

        <!-- ========================================================= -->
        <!-- 1. شاشة التحميل                                            -->
        <!-- ========================================================= -->
        <div id="splashScreen" class="screen-layer" role="status" aria-live="polite">
            <div class="splash-content">
                <div class="splash-logo">
                    <span class="highlight">Lider</span>Center
                </div>
                <div class="splash-sub">مركز القيادة للتسوق</div>

                <!-- شريط التقدم -->
                <div class="progress-container" aria-hidden="true">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="loader-status" id="loaderStatus">
                    <i class="fas fa-sync-alt fa-spin"></i> جاري تحميل المتجر...
                </div>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- 2. شاشة الترحيب                                            -->
        <!-- ========================================================= -->
        <div id="welcomeScreen" class="screen-layer">
            <div class="welcome-card">
                <div class="brand-icon" aria-hidden="true">L</div>
                <h1><span class="highlight">Lider</span>Center</h1>
                <p class="tagline">مركز القيادة للتسوق</p>
                <p class="sub-text">
                    أهلاً بك في متجرنا الرقمي.<br />
                    اكتشف تشكيلة راقية من المنتجات العصرية<br />
                    بجودة استثنائية وأسعار تنافسية.
                </p>

                <div style="display:flex; flex-direction:column; gap:14px;">
                    <!-- زر المتجر -->
                    <a href="shop.html" class="btn-primary-gold" aria-label="الذهاب إلى المتجر">
                        <i class="fas fa-arrow-left"></i> ابدأ التسوق الآن
                    </a>
                    <!-- زر تسجيل الدخول -->
                    <a href="login.html" class="btn-secondary-glass" aria-label="تسجيل الدخول">
                        <i class="fas fa-user"></i> تسجيل الدخول
                    </a>
                </div>

                <div class="footer-links-welcome">
                    <a href="about.html" aria-label="من نحن">
                        <i class="fas fa-info-circle"></i> من نحن
                    </a>
                    <a href="support.html" aria-label="الدعم">
                        <i class="fas fa-headset"></i> الدعم
                    </a>
                </div>
            </div>
        </div>

        <!-- الشريط السفلي -->
        <div class="bottom-bar-global">
            <i class="fas fa-shield-alt"></i> تجربة تسوق آمنة وموثوقة
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // عناصر DOM
            const splash = document.getElementById('splashScreen');
            const welcome = document.getElementById('welcomeScreen');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('loaderStatus');

            // مدة التحميل (3 ثوانٍ)
            const LOAD_DURATION = 3000; // مللي
            const UPDATE_INTERVAL = 50; // مللي

            let startTime = performance.now();

            function updateProgress() {
                const elapsed = performance.now() - startTime;
                let progress = Math.min(elapsed / LOAD_DURATION, 1);

                // تحديث شريط التقدم
                progressBar.style.width = (progress * 100) + '%';

                // تغيير النص حسب المراحل
                if (progress < 0.3) {
                    statusText.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> جاري تجهيز المتجر...';
                } else if (progress < 0.7) {
                    statusText.innerHTML = '<i class="fas fa-cogs fa-spin"></i> تحميل العروض والمنتجات...';
                } else if (progress < 1) {
                    statusText.innerHTML = '<i class="fas fa-sparkles fa-spin"></i> أكملنا الاستعدادات!';
                } else {
                    statusText.innerHTML = '<i class="fas fa-check-circle" style="color:var(--gold-bright);"></i> جاهز!';
                }

                if (progress < 1) {
                    requestAnimationFrame(updateProgress);
                } else {
                    // انتهى التحميل، إظهار شاشة الترحيب
                    finishLoading();
                }
            }

            function finishLoading() {
                // إخفاء شاشة التحميل
                splash.classList.add('hide');

                // بعد 300 مللي لإتاحة الانتقال، نظهر الترحيب
                setTimeout(() => {
                    welcome.classList.add('show');
                    console.log('✅ تم التحميل! ظهرت شاشة الترحيب.');
                }, 300);
            }

            // بدء التحديث
            requestAnimationFrame(updateProgress);

            // في حال حدوث خطأ أو تأخر، نضمن ظهور الترحيب بعد المدة القصوى
            setTimeout(() => {
                if (!welcome.classList.contains('show')) {
                    finishLoading();
                }
            }, LOAD_DURATION + 500);

            console.log('🚀 LiderCenter: بدء التحميل...');
        })();
    </script>

</body>
</html>
