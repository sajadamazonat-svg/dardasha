<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LiderCenter | شاشة التحميل والترحيب</title>

    <!-- الخط -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
    <!-- الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

    <style>
        /* ---------- إعادة التعيين الأساسية ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --navy-deep: #050b14;
            --gold-bright: #f5d76e;
            --gold-intense: #f1c40f;
            --gold-glow: rgba(241, 196, 15, 0.35);
            --white-pure: #ffffff;
            --white-muted: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-card: 32px;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        html,
        body {
            height: 100%;
            font-family: 'Tajawal', sans-serif;
            background: var(--navy-deep);
            color: var(--white-pure);
            overflow: hidden;
            margin: 0;
        }

        /* ---------- الحاوية الرئيسية ---------- */
        .app-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 25% 20%, #1a3555 0%, var(--navy-deep) 75%);
            overflow: hidden;
        }

        /* ---------- العناصر البصرية الخلفية (Orbs) ---------- */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(20, 40, 80, 0.9);
            top: -120px;
            right: -100px;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--gold-glow);
            bottom: -160px;
            left: -120px;
            opacity: 0.5;
        }
        .orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(241, 196, 15, 0.12);
            top: 30%;
            left: 10%;
            filter: blur(70px);
        }
        .grid-lines {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ---------- الطبقات (شاشتان فقط) ---------- */
        .screen-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.7s cubic-bezier(0.22, 1, 0.36, 1),
                visibility 0.7s ease;
            will-change: transform, opacity;
            padding: 20px;
        }

        /* ----- شاشة التحميل (تظهر أولاً) ----- */
        #splashScreen {
            opacity: 1;
            transform: scale(1);
            z-index: 20;
            background: radial-gradient(ellipse at 30% 30%, #0b1a30, var(--navy-deep));
            visibility: visible;
        }
        #splashScreen.hide {
            opacity: 0;
            transform: scale(1.04);
            pointer-events: none;
            visibility: hidden;
        }

        /* ----- شاشة الترحيب (تظهر بعد التحميل) ----- */
        #welcomeScreen {
            opacity: 0;
            transform: scale(0.96);
            pointer-events: none;
            visibility: hidden;
            z-index: 15;
            background: radial-gradient(ellipse at 30% 30%, #0b1a30, var(--navy-deep));
        }
        #welcomeScreen.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            visibility: visible;
        }

        /* ---------- محتوى شاشة التحميل ---------- */
        .splash-content {
            text-align: center;
            z-index: 3;
            position: relative;
        }
        .splash-logo {
            font-size: 72px;
            font-weight: 900;
            color: var(--white-pure);
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 40px rgba(241, 196, 15, 0.2);
        }
        .splash-logo .highlight {
            background: linear-gradient(145deg, var(--gold-bright), var(--gold-intense));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(241, 196, 15, 0.3);
        }
        .splash-sub {
            font-size: 14px;
            color: var(--white-muted);
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        .ring-loader {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--gold-intense);
            border-right-color: var(--gold-bright);
            animation: spinRing 1s linear infinite;
            margin: 0 auto 30px;
            position: relative;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.1);
        }
        .ring-loader::after {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-bottom-color: rgba(255, 255, 255, 0.2);
            border-left-color: rgba(255, 255, 255, 0.05);
            animation: spinRing 1.8s linear infinite reverse;
        }
        @keyframes spinRing {
            to {
                transform: rotate(360deg);
            }
        }
        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .loader-dot {
            width: 14px;
            height: 14px;
            background: var(--gold-bright);
            border-radius: 50%;
            animation: pulseDot 1.2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }
        .loader-dot:nth-child(2) {
            animation-delay: 0.15s;
            background: var(--gold-intense);
        }
        .loader-dot:nth-child(3) {
            animation-delay: 0.3s;
            background: var(--gold-bright);
        }
        @keyframes pulseDot {
            0%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* ---------- محتوى شاشة الترحيب (البطاقة) ---------- */
        .welcome-card {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(1.2);
            -webkit-backdrop-filter: blur(32px) saturate(1.2);
            border-radius: var(--radius-card);
            padding: 44px 28px 36px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 0 60px rgba(241, 196, 15, 0.04);
            animation: floatIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .welcome-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-card);
            background: linear-gradient(145deg, rgba(241, 196, 15, 0.15), transparent 30%, transparent 70%,
                    rgba(241, 196, 15, 0.08));
            z-index: -1;
            filter: blur(8px);
        }
        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 16px;
            background: linear-gradient(145deg, var(--gold-bright), var(--gold-intense));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            color: var(--navy-deep);
            box-shadow: 0 16px 48px rgba(241, 196, 15, 0.35);
            font-family: 'Tajawal', sans-serif;
            position: relative;
        }
        .brand-icon::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1.5px solid rgba(241, 196, 15, 0.2);
        }

        .welcome-card h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 2px;
            color: var(--white-pure);
        }
        .welcome-card h1 .highlight {
            background: linear-gradient(145deg, var(--gold-bright), var(--gold-intense));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(241, 196, 15, 0.2);
        }
        .welcome-card .tagline {
            font-size: 13px;
            font-weight: 500;
            color: var(--gold-bright);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0.9;
        }
        .welcome-card .sub-text {
            color: var(--white-muted);
            font-size: 15px;
            font-weight: 400;
            line-height: 1.7;
            margin: 14px 0 32px;
            padding: 0 4px;
        }

        .btn-primary-gold {
            background: linear-gradient(145deg, var(--gold-bright), var(--gold-intense));
            color: var(--navy-deep);
            border: none;
            padding: 18px 0;
            border-radius: 60px;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            width: 100%;
            box-shadow: 0 8px 32px rgba(241, 196, 15, 0.35);
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 0.3px;
        }
        .btn-primary-gold:active {
            transform: scale(0.95);
            box-shadow: 0 4px 16px rgba(241, 196, 15, 0.2);
        }

        .btn-secondary-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            color: var(--white-pure);
            padding: 16px 0;
            border-radius: 60px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            width: 100%;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            backdrop-filter: blur(4px);
        }
        .btn-secondary-glass:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .footer-links-welcome {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            gap: 28px;
            font-size: 13px;
            font-weight: 500;
        }
        .footer-links-welcome a {
            color: var(--white-muted);
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.2px;
        }
        .footer-links-welcome a:active {
            color: var(--gold-bright);
        }

        .bottom-bar-global {
            position: absolute;
            bottom: calc(24px + var(--safe-bottom));
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 1px;
            z-index: 1;
            font-weight: 300;
        }
        .bottom-bar-global i {
            margin-left: 8px;
            color: rgba(241, 196, 15, 0.25);
        }

        @media (max-width: 400px) {
            .splash-logo {
                font-size: 56px;
            }
            .ring-loader {
                width: 64px;
                height: 64px;
            }
            .welcome-card {
                padding: 32px 18px 28px;
            }
            .welcome-card h1 {
                font-size: 26px;
            }
            .brand-icon {
                width: 72px;
                height: 72px;
                font-size: 32px;
            }
        }

        @media (min-width: 600px) {
            .welcome-card {
                padding: 56px 48px 44px;
            }
            .welcome-card h1 {
                font-size: 38px;
            }
            .brand-icon {
                width: 104px;
                height: 104px;
                font-size: 48px;
            }
            .splash-logo {
                font-size: 88px;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">

        <!-- العناصر البصرية الخلفية -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-lines"></div>

        <!-- ========================================================= -->
        <!-- 1. شاشة التحميل (تظهر أولاً لمدة 3 ثوانٍ)                   -->
        <!-- ========================================================= -->
        <div id="splashScreen" class="screen-layer">
            <div class="splash-content">
                <div class="ring-loader"></div>
                <div class="splash-logo">
                    <span class="highlight">Lider</span>Center
                </div>
                <div class="splash-sub">مركز القيادة للتسوق</div>
                <div class="loader-dots">
                    <span class="loader-dot"></span>
                    <span class="loader-dot"></span>
                    <span class="loader-dot"></span>
                </div>
                <!-- رسالة حالة التحميل -->
                <p style="color: rgba(255,255,255,0.3); font-size: 13px; margin-top: 20px;">
                    <i class="fas fa-spinner fa-pulse"></i> جاري تجهيز المتجر...
                </p>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- 2. شاشة الترحيب (تظهر تلقائياً بعد انتهاء التحميل)          -->
        <!-- ========================================================= -->
        <div id="welcomeScreen" class="screen-layer">
            <div class="welcome-card">
                <div class="brand-icon">L</div>
                <h1><span class="highlight">Lider</span>Center</h1>
                <p class="tagline">مركز القيادة للتسوق</p>

                <!-- رسائل ترحيبية واضحة -->
                <p class="sub-text">
                    أهلاً بك في متجرنا الرقمي.<br />
                    اكتشف تشكيلة راقية من المنتجات العصرية<br />
                    بجودة استثنائية وأسعار تنافسية.
                </p>

                <!-- أزرار التفاعل -->
                <div style="display:flex; flex-direction:column; gap:14px;">
                    <button class="btn-primary-gold" onclick="goToStore()">
                        <i class="fas fa-arrow-left"></i> ابدأ التسوق الآن
                    </button>
                    <button class="btn-secondary-glass" onclick="alert('سيتم توجيهك لتسجيل الدخول')">
                        <i class="fas fa-user"></i> تسجيل الدخول
                    </button>
                </div>

                <!-- روابط إضافية -->
                <div class="footer-links-welcome">
                    <a href="#" onclick="alert('سيتم فتح صفحة من نحن')"><i class="fas fa-info-circle"></i> من نحن</a>
                    <a href="#" onclick="alert('سيتم فتح صفحة الدعم')"><i class="fas fa-headset"></i> الدعم</a>
                </div>
            </div>
        </div>

        <!-- شريط سفلي موحد -->
        <div class="bottom-bar-global">
            <i class="fas fa-shield-alt"></i> تجربة تسوق آمنة وموثوقة
        </div>
    </div>

    <script>
        // =============================================================
        //  المنطق: التحكم في تسلسل ظهور الشاشات
        // =============================================================

        // 1. عند تحميل الصفحة، تظهر شاشة التحميل (هذا تلقائي).
        // 2. نضع مؤقتاً لمدة 3 ثوانٍ (3000 مللي) لإخفاء التحميل وإظهار الترحيب.

        setTimeout(function() {

            // إخفاء شاشة التحميل (بإضافة class="hide")
            const splash = document.getElementById('splashScreen');
            splash.classList.add('hide');

            // بعد 0.3 ثانية من إخفاء التحميل، نظهر شاشة الترحيب
            setTimeout(function() {
                const welcome = document.getElementById('welcomeScreen');
                welcome.classList.add('show');

                // طباعة رسالة في الكونسول للتأكد
                console.log('✅ تم التحميل! ظهرت شاشة الترحيب.');
            }, 300);

        }, 3000); // <- 3000 = 3 ثوانٍ (يمكنك تغيير الرقم لزيادة أو تقليل المدة)

        // =============================================================
        //  دالة الانتقال إلى المتجر (عند الضغط على زر "ابدأ التسوق")
        // =============================================================
        function goToStore() {
            // هنا يمكنك وضع الرابط الذي تريده، مثلاً:
            // window.location.href = 'shop.html';
            alert('سيتم نقلك إلى واجهة المتجر الرئيسية قريباً!');
            // لو كنت تريد إظهار المتجر في نفس الصفحة، يمكنك تفعيل الكود المدمج سابقاً.
        }

        // سجل بداية التطبيق
        console.log('🚀 LiderCenter: شاشة التحميل تعمل لمدة 3 ثوانٍ...');
    </script>

</body>
</html>
