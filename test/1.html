<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:35px;
    border-radius:15px;
    text-align:center;
    width:320px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#4285F4;
    color:white;
    font-size:18px;
    cursor:pointer;
}

img{
    width:80px;
    margin-bottom:20px;
}

#user{
    margin-top:20px;
}
</style>
</head>

<body>

<div class="box">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

    <h2>تسجيل الدخول</h2>

    <button id="login">
        تسجيل الدخول باستخدام Google
    </button>

    <div id="user"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDb5kAoZCOLGqVvzKZ9q-wB1FZrdqyVH8",
  authDomain: "sample-firebase-ai-app-c5b33.firebaseapp.com",
  databaseURL: "https://sample-firebase-ai-app-c5b33-default-rtdb.firebaseio.com",
  projectId: "sample-firebase-ai-app-c5b33",
  storageBucket: "sample-firebase-ai-app-c5b33.firebasestorage.app",
  messagingSenderId: "183057738013",
  appId: "1:183057738013:web:649fc47c465a23da1959f4",
  measurementId: "G-1SCGVCM2WW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

document.getElementById("login").onclick = async ()=>{

try{

const result = await signInWithPopup(auth,provider);

const user=result.user;

document.getElementById("user").innerHTML=`
<h3>${user.displayName}</h3>
<p>${user.email}</p>
<img src="${user.photoURL}" width="80" style="border-radius:50%;">
`;

}catch(e){
alert(e.message);
}

};

</script>

</body>
</html>
