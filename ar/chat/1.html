<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>غرفة صوتية - حضور ومستخدمين</title>
<style>
  body{font-family:Arial, sans-serif; max-width:720px; margin:24px auto; background:#f7f7f7; color:#111; padding:12px;}
  h1{text-align:center}
  .controls{display:flex; gap:8px; justify-content:center; margin:12px 0; flex-wrap:wrap}
  button{padding:10px 14px; font-size:16px;}
  .status{text-align:center; margin:8px 0}
  .users{background:#fff; padding:10px; border-radius:6px; border:1px solid #ddd; max-height:200px; overflow:auto;}
  .users h3{margin:0 0 8px 0; font-size:16px;}
  .user-item{padding:6px 4px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;}
  .log{background:#fff; border:1px solid #ddd; padding:8px; margin-top:12px; height:120px; overflow:auto; font-size:13px;}
</style>
</head>
<body>
  <h1>غرفة صوتية - مستخدمون نشطون</h1>

  <div class="controls">
    <button id="startAudioBtn">تشغيل الميكروفون</button>
    <button id="callBtn">اتصال</button>
    <button id="answerBtn">رد</button>
    <button id="hangupBtn">إنهاء</button>
  </div>

  <div class="status">
    <div>اسمك: <strong id="myName">—</strong></div>
    <div>حالة: <span id="status">جاهز</span></div>
  </div>

  <div class="users">
    <h3>المستخدمون النشطون</h3>
    <div id="usersList">لا يوجد مستخدمون</div>
  </div>

  <h3>سجل الأحداث</h3>
  <div class="log" id="log"></div>

<script type="module">
/* ===== إعداد Firebase (ضع إعدادات مشروعك هنا) ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, set, onValue, push, remove, onChildAdded, onChildRemoved, onDisconnect
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAG4EKrB3iLEV2hsB8b08ShpSO6PXDnGjg",
  authDomain: "zio3-8ffdd.firebaseapp.com",
  databaseURL: "https://zio3-8ffdd-default-rtdb.firebaseio.com",
  projectId: "zio3-8ffdd",
  storageBucket: "zio3-8ffdd.firebasestorage.app",
  messagingSenderId: "560939348415",
  appId: "1:560939348415:web:c854e9e214e498ad2d310a",
  measurementId: "G-CVN2B2D0RD"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== عناصر الواجهة ===== */
const startAudioBtn = document.getElementById('startAudioBtn');
const callBtn = document.getElementById('callBtn');
const answerBtn = document.getElementById('answerBtn');
const hangupBtn = document.getElementById('hangupBtn');
const usersList = document.getElementById('usersList');
const myNameEl = document.getElementById('myName');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

/* ===== متغيرات الحالة ===== */
const ROOM = 'voiceRoom'; // غرفة ثابتة واحدة
let myId = null;
let myName = null;
let localStream = null;
let pc = null;

let callerCandidatesRef = null;
let calleeCandidatesRef = null;
let roomRef = ref(db, `rooms/${ROOM}`);

/* ===== دالة تسجيل لوج بسيطة ===== */
function log(msg){
  const t = new Date().toLocaleTimeString();
  logEl.innerHTML = `<div>[${t}] ${msg}</div>` + logEl.innerHTML;
}

/* ===== توليد اسم عشوائي ===== */
function randomName(){
  const n = Math.floor(1000 + Math.random()*9000);
  return `مستخدم-${n}`;
}

/* ===== إنشاء RTCPeerConnection وإدارة الـ ICE ===== */
function createPeerConnection() {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });

  // عند استلام مسارات الصوت
  pc.addEventListener('track', event => {
    log('استلمت مسار صوتي من الطرف الآخر');
    const audio = document.createElement('audio');
    audio.autoplay = true;
    audio.srcObject = event.streams[0];
    // لا نضيف العنصر إلى DOM لابقاء الواجهة نظيفة، لكن يمكن إضافته لو أردت التحكم في مستوى الصوت.
  });

  // إرسال كل ICE candidate إلى قاعدة البيانات تحت المسارات المناسبة
  pc.addEventListener('icecandidate', event => {
    if (!event.candidate) return;
    const c = event.candidate.toJSON();
    if (callerCandidatesRef) push(callerCandidatesRef, c);
    else if (calleeCandidatesRef) push(calleeCandidatesRef, c);
    log('تم إنشاء ICE candidate محلي');
  });

  return pc;
}

/* ===== تشغيل الميكروفون (بدون فيديو) ===== */
startAudioBtn.onclick = async () => {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // لا نعرض عنصر audio محلي، لكن نضيف المسار إلى الـ RTCPeerConnection
    log('تم تفعيل الميكروفون');
    statusEl.textContent = 'الميكروفون جاهز';

    // عند أول تشغيل نعطي المستخدم معرّف واسم عشوائي ونسجل الحضور
    if (!myId) {
      myId = push(ref(db, `rooms/${ROOM}/users`)).key; // مفتاح فريد
      myName = randomName();
      myNameEl.textContent = myName;

      // سجل الحضور في DB مع onDisconnect لإزالته تلقائياً عند مغادرة الصفحة
      const myRef = ref(db, `rooms/${ROOM}/users/${myId}`);
      await set(myRef, { name: myName, ts: Date.now() });
      onDisconnect(myRef).remove();

      log('تم تسجيل الحضور باسم: ' + myName);
    }

  } catch (err) {
    console.error(err);
    log('خطأ بتشغيل الميكروفون: ' + err.message);
  }
};

/* ===== مراقبة قائمة المستخدمين النشطين وتحديث العرض ===== */
const usersRef = ref(db, `rooms/${ROOM}/users`);
onValue(usersRef, snapshot => {
  const val = snapshot.val() || {};
  const keys = Object.keys(val);
  if (keys.length === 0) {
    usersList.innerHTML = '<div>لا يوجد مستخدمون</div>';
    return;
  }
  usersList.innerHTML = '';
  keys.forEach(k => {
    const u = val[k];
    const el = document.createElement('div');
    el.className = 'user-item';
    el.innerHTML = `<div>${u.name || 'مستخدم'}</div><div style="font-size:12px;color:#666">${k === myId ? 'أنت' : 'متصل'}</div>`;
    usersList.appendChild(el);
  });
});

/* ===== زر إنشاء Call (Caller) ===== */
callBtn.onclick = async () => {
  if (!localStream) { log('شغل الميكروفون أولاً'); return; }

  pc = createPeerConnection();
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  // مراجع لحفظ المرشحين
  callerCandidatesRef = ref(db, `rooms/${ROOM}/callerCandidates`);
  calleeCandidatesRef = ref(db, `rooms/${ROOM}/calleeCandidates`);

  // إنشاء Offer
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // حفظ العرض في DB
  await set(ref(db, `rooms/${ROOM}/offer`), { type: offer.type, sdp: offer.sdp });
  log('تم إنشاء offer وحفظها في قاعدة البيانات — انتظر الرد');

  // عندما يصل Answer من DB
  onValue(ref(db, `rooms/${ROOM}/answer`), async snap => {
    const ans = snap.val();
    if (!ans) return;
    if (!pc.currentRemoteDescription) {
      await pc.setRemoteDescription(ans);
      log('تم استلام answer وتعيينها');
      statusEl.textContent = 'متصل';
    }
  });

  // استماع لمرشحي الـ callee (الطرف الذي سيجيب)
  onChildAdded(calleeCandidatesRef, snapshot => {
    const data = snapshot.val();
    if (data) {
      pc.addIceCandidate(data).catch(e => console.error('addIceCandidate', e));
      log('تم إضافة candidate وارد من المجيب');
    }
  });
};

/* ===== زر الرد (Callee) ===== */
answerBtn.onclick = async () => {
  if (!localStream) { log('شغل الميكروفون أولاً'); return; }

  // اقرأ الـ offer الموجود
  const offerSnap = await (await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js')).get(ref(db, `rooms/${ROOM}/offer`));
  const offer = offerSnap.val();
  if (!offer) {
    log('لا يوجد offer في الغرفة للرد عليه');
    return;
  }

  pc = createPeerConnection();
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  // مراجع المرشحين
  callerCandidatesRef = ref(db, `rooms/${ROOM}/callerCandidates`);
  calleeCandidatesRef = ref(db, `rooms/${ROOM}/calleeCandidates`);

  // استماع لمرشحي الـ caller
  onChildAdded(callerCandidatesRef, snapshot => {
    const data = snapshot.val();
    if (data) {
      pc.addIceCandidate(data).catch(e => console.error('addIceCandidate', e));
      log('تم إضافة candidate وارد من المتصل');
    }
  });

  // اضبط offer ثم أنشئ answer
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await set(ref(db, `rooms/${ROOM}/answer`), { type: answer.type, sdp: answer.sdp });
  log('تم إنشاء answer وحفظها في DB — يجب أن يبدأ الاتصال قريبا');
  statusEl.textContent = 'متصل';

  // أي candidate محلي سيتم دفعه إلى calleeCandidatesRef خلال حدث icecandidate
};

/* ===== زر إنهاء المكالمة وتنظيف الحضور ===== */
hangupBtn.onclick = async () => {
  log('إنهاء وتنظيف...');
  // إغلاق الاتصال
  if (pc) {
    pc.close();
    pc = null;
  }
  // إيقاف الميكروفون المحلي
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  statusEl.textContent = 'مغلق';
  // حذف حضور المستخدم من DB
  if (myId) {
    try {
      await remove(ref(db, `rooms/${ROOM}/users/${myId}`));
      log('تم حذف الحضور من قاعدة البيانات');
    } catch (e) {
      console.warn('خطأ عند حذف الحضور:', e);
    }
    myId = null;
    myName = null;
    myNameEl.textContent = '—';
  }
  // لا نحذف الغرفة لأن قد يكون فيها مستخدمون آخرون
};

/* ===== تنظيف تلقائي عند إغلاق الصفحة (fallback) ===== */
window.addEventListener('beforeunload', async () => {
  if (myId) {
    try { await remove(ref(db, `rooms/${ROOM}/users/${myId}`)); } catch (e) {}
  }
});
</script>
</body>
</html>
