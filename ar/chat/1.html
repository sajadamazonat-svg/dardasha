<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>صفحة دردشة واتصال</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#111b2f;
      --card2:#16233d;
      --text:#eaf1ff;
      --muted:#8fa3c7;
      --accent:#4f8cff;
      --good:#25c47d;
      --danger:#ff5d73;
      --border:rgba(255,255,255,.08);
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top, #18305a 0%, var(--bg) 50%, #050913 100%);
      color:var(--text);
      min-height:100svh;
      padding:14px;
    }
    .app{
      max-width:980px;
      margin:0 auto;
      display:grid;
      gap:14px;
    }
    .topbar{
      background:rgba(17,27,47,.95);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .topbar h1{
      margin:0 0 4px;
      font-size:1.05rem;
    }
    .topbar p{
      margin:0;
      color:var(--muted);
      font-size:.9rem;
    }
    .status{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      font-size:.9rem;
    }
    .grid{
      display:grid;
      gap:14px;
    }
    @media (min-width: 900px){
      .grid{
        grid-template-columns: 1fr 1fr;
      }
    }
    .card{
      background:rgba(17,27,47,.95);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      backdrop-filter: blur(10px);
    }
    .title{
      margin:0 0 12px;
      font-size:1rem;
    }
    .note{
      color:var(--muted);
      font-size:.9rem;
      line-height:1.5;
      margin:0 0 14px;
    }
    .row{
      display:grid;
      gap:10px;
      margin-bottom:10px;
    }
    input, textarea, button{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:1rem;
    }
    input, textarea{
      background:var(--card2);
      color:var(--text);
      border:1px solid var(--border);
    }
    input::placeholder, textarea::placeholder{
      color:#8092b7;
    }
    textarea{
      min-height:150px;
      resize:vertical;
    }
    .btns{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    button{
      background:var(--accent);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      transition:.15s transform ease, .15s opacity ease;
    }
    button:active{ transform:scale(.98); }
    button.secondary{ background:#233755; }
    button.good{ background:var(--good); }
    button.danger{ background:var(--danger); }
    .chat{
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .messages{
      min-height:320px;
      max-height:42vh;
      overflow:auto;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:18px;
    }
    .msg{
      max-width:88%;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      word-break:break-word;
    }
    .msg.me{
      align-self:flex-end;
      background:rgba(79,140,255,.18);
      border-color:rgba(79,140,255,.35);
    }
    .meta{
      font-size:.78rem;
      color:var(--muted);
      margin-bottom:4px;
    }
    .chatbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      margin-top:12px;
    }
    .callBox{
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
    }
    .callStatus{
      font-size:.95rem;
      color:var(--muted);
      margin-bottom:12px;
    }
    .callControls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      color:var(--muted);
      font-size:.8rem;
      margin-bottom:10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h1>صفحة دردشة واتصال</h1>
        <p>مثال واجهة مناسب للهواتف.</p>
      </div>
      <div class="status" id="status">غير متصل</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2 class="title">الدردشة</h2>
        <p class="note">اكتب رسالة وسيتم عرضها مباشرة داخل الصفحة كمثال.</p>

        <div class="chat">
          <div class="messages" id="messages">
            <div class="msg">
              <div class="meta">النظام</div>
              <div>أهلاً بك داخل صفحة الدردشة.</div>
            </div>
          </div>

          <div class="chatbar">
            <input id="msgInput" placeholder="اكتب رسالة..." />
            <button id="sendBtn">إرسال</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="title">الاتصال</h2>
        <span class="pill">مثال واجهة فقط</span>

        <div class="callBox">
          <div class="callStatus" id="callStatus">لا توجد مكالمة حالياً</div>
          <div class="callControls">
            <button class="good" id="callBtn">بدء اتصال</button>
            <button class="danger" id="endBtn" disabled>إنهاء</button>
          </div>
        </div>

        <div class="row" style="margin-top:14px;">
          <input id="nameInput" placeholder="اسمك" value="مستخدم" />
        </div>
      </div>
    </div>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const callBtn = document.getElementById("callBtn");
    const endBtn = document.getElementById("endBtn");
    const statusEl = document.getElementById("status");
    const callStatus = document.getElementById("callStatus");
    const nameInput = document.getElementById("nameInput");

    let inCall = false;

    function timeNow() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function addMessage(name, text, me = false) {
      const div = document.createElement("div");
      div.className = "msg" + (me ? " me" : "");
      div.innerHTML = `
        <div class="meta">${name} • ${timeNow()}</div>
        <div>${text}</div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    sendBtn.addEventListener("click", () => {
      const text = msgInput.value.trim();
      const name = nameInput.value.trim() || "مستخدم";
      if (!text) return;

      addMessage(name, text, true);
      msgInput.value = "";
    });

    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendBtn.click();
    });

    callBtn.addEventListener("click", () => {
      inCall = true;
      statusEl.textContent = "متصل";
      callStatus.textContent = "تم بدء الاتصال بنجاح";
      callBtn.disabled = true;
      endBtn.disabled = false;
      addMessage("النظام", "تم بدء الاتصال.", false);
    });

    endBtn.addEventListener("click", () => {
      inCall = false;
      statusEl.textContent = "غير متصل";
      callStatus.textContent = "لا توجد مكالمة حالياً";
      callBtn.disabled = false;
      endBtn.disabled = true;
      addMessage("النظام", "تم إنهاء الاتصال.", false);
    });
  </script>
</body>
</html>
