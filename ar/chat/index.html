<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسهل حل | الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #2c3e9e;
            --primary-light: #6c7ffa;
            --secondary: #06d6a0;
            --success: #06d6a0;
            --warning: #ffb703;
            --danger: #d9042b;
            --dark: #1e1e2f;
            --light: #f4f7fb;
            --gray: #6b7280;
            --bg-gradient: linear-gradient(145deg, #ffffff 0%, #f0f4fa 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --border: #d1d5db;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --font-base: 13px;
            --transition: all 0.2s ease;
        }
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(145deg, #12121c 0%, #1e1e2e 100%);
            --card-bg: rgba(28, 28, 42, 0.95);
            --dark: #f0f0fa;
            --light: #2a2a3c;
            --gray: #a0a0b0;
            --border: #4a4a60;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body {
            background: var(--bg-gradient);
            color: var(--dark);
            font-size: var(--font-base);
            line-height: 1.5;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .index-container {
            max-width: 400px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 32px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .logo i { font-size: 2.2rem; color: var(--primary-dark); }
        .main-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--dark);
        }
        .description {
            color: var(--gray);
            margin-bottom: 24px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .cta-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 24px 0;
        }
        .btn {
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(67, 97, 238, 0.4);
        }
        .btn-outline {
            background: var(--light);
            color: var(--dark);
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 0 16px;
        }
        .theme-toggle button {
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 14px;
            cursor: pointer;
            color: var(--dark);
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }
        .theme-toggle button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
            font-size: 0.75rem;
        }
        .footer-links a {
            color: var(--gray);
            text-decoration: none;
            transition: var(--transition);
        }
        .footer-links a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="index-container">
        <div class="logo">
            <i class="fas fa-comment-dots"></i>
            <span>اسهل حل</span>
        </div>
        <div class="main-title">تواصل بكل سهولة</div>
        <div class="description">
            منصة الدردشة الأسرع والأكثر أماناً. محادثات فورية، مشاركة ملفات، وصوت عالي الجودة.
        </div>

        <div class="cta-buttons">
            <button class="btn btn-primary" id="startBtn"><i class="fas fa-sign-in-alt"></i> ابدأ الآن</button>
            <button class="btn btn-outline" id="aboutBtn"><i class="fas fa-info-circle"></i> عن التطبيق</button>
        </div>

        <div class="theme-toggle">
            <button id="lightModeBtn"><i class="fas fa-sun"></i> فاتح</button>
            <button id="darkModeBtn"><i class="fas fa-moon"></i> داكن</button>
        </div>

        <div class="footer-links">
            <a href="#" id="privacyLink">خصوصية</a>
            <a href="#" id="termsLink">شروط</a>
            <a href="#" id="helpLink">مساعدة</a>
        </div>
    </div>

    <script>
        // الوضع الليلي
        const lightModeBtn = document.getElementById('lightModeBtn');
        const darkModeBtn = document.getElementById('darkModeBtn');
        const htmlElement = document.documentElement;

        if (localStorage.getItem('darkMode') === 'true') {
            htmlElement.setAttribute('data-theme', 'dark');
        }

        lightModeBtn.addEventListener('click', () => {
            htmlElement.removeAttribute('data-theme');
            localStorage.setItem('darkMode', 'false');
        });

        darkModeBtn.addEventListener('click', () => {
            htmlElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('darkMode', 'true');
        });

        // أزرار التنقل
        document.getElementById('startBtn').addEventListener('click', () => {
            window.location.href = 'welcome.html'; // أو login.html حسب التدفق المطلوب
        });

        document.getElementById('aboutBtn').addEventListener('click', () => {
            alert('تطبيق اسهل حل - نسخة 1.0\nدردشة حقيقية بسيطة وآمنة');
        });

        // روابط
        document.getElementById('privacyLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('سياسة الخصوصية - قيد التطوير');
        });
        document.getElementById('termsLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('شروط الاستخدام - قيد التطوير');
        });
        document.getElementById('helpLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('المساعدة - قيد التطوير');
        });
    </script>
</body>
</html>
