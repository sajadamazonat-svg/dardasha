<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسهل حل | الدردشة الحقيقية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #2c3e9e;
            --primary-light: #6c7ffa;
            --secondary: #06d6a0;
            --success: #06d6a0;
            --warning: #ffb703;
            --danger: #d9042b;
            --dark: #1e1e2f;
            --light: #f4f7fb;
            --gray: #6b7280;
            --bg-gradient: linear-gradient(145deg, #ffffff 0%, #f0f4fa 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --border: #d1d5db;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            --font-base: 14px;
            --transition: all 0.2s ease;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(145deg, #12121c 0%, #1e1e2e 100%);
            --card-bg: rgba(28, 28, 42, 0.95);
            --dark: #f0f0fa;
            --light: #2a2a3c;
            --gray: #a0a0b0;
            --border: #4a4a60;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--dark);
            font-size: var(--font-base);
            line-height: 1.5;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .home-container {
            max-width: 400px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 32px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo i {
            font-size: 2.2rem;
            color: var(--primary-dark);
        }

        .tagline {
            color: var(--gray);
            margin-bottom: 32px;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--dark);
            font-size: 0.9rem;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 4px 16px;
            transition: var(--transition);
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .input-wrapper i {
            color: var(--gray);
            font-size: 1.1rem;
            margin-left: 8px;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            color: var(--dark);
            font-size: 1rem;
        }

        .input-wrapper input:focus {
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--gray);
            opacity: 0.7;
        }

        .random-room {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .random-room:hover {
            text-decoration: underline;
        }

        .enter-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 24px 0 16px;
        }

        .theme-toggle button {
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--dark);
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .theme-toggle button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: var(--gray);
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 8px;
            min-height: 20px;
        }

        .info-message {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 16px;
        }

        @media (max-width: 480px) {
            .home-container {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="home-container">
        <div class="logo">
            <i class="fas fa-comment-dots"></i>
            <span>اسهل حل</span>
        </div>
        <div class="tagline">دردشة حقيقية، بسيطة وآمنة</div>

        <div class="input-group">
            <label>اسم المستخدم</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="أدخل اسمك" autocomplete="off">
            </div>
        </div>

        <div class="input-group">
            <label>رقم الغرفة</label>
            <div class="input-wrapper">
                <i class="fas fa-door-open"></i>
                <input type="text" id="room" placeholder="أدخل رقم الغرفة">
            </div>
            <div class="random-room" id="randomRoomBtn">
                <i class="fas fa-dice"></i>
                <span>إنشاء غرفة عشوائية</span>
            </div>
        </div>

        <button class="enter-btn" id="enterBtn">
            <i class="fas fa-sign-in-alt"></i>
            دخول
        </button>

        <div class="error-message" id="errorMessage"></div>

        <div class="theme-toggle">
            <button id="lightModeBtn"><i class="fas fa-sun"></i> فاتح</button>
            <button id="darkModeBtn"><i class="fas fa-moon"></i> داكن</button>
        </div>

        <div class="footer-links">
            <a href="#" id="homeLink"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="#" id="helpLink"><i class="fas fa-question-circle"></i> مساعدة</a>
            <a href="#" id="aboutLink"><i class="fas fa-info-circle"></i> حول</a>
            <a href="#" id="privacyLink"><i class="fas fa-shield-alt"></i> خصوصية</a>
            <a href="#" id="termsLink"><i class="fas fa-file-contract"></i> شروط</a>
        </div>

        <div class="info-message">
            <i class="fas fa-lock"></i> جميع المحادثات مشفرة
        </div>
    </div>

    <script>
        // الوضع الليلي
        const lightModeBtn = document.getElementById('lightModeBtn');
        const darkModeBtn = document.getElementById('darkModeBtn');
        const htmlElement = document.documentElement;

        // استرجاع الوضع المحفوظ
        if (localStorage.getItem('darkMode') === 'true') {
            htmlElement.setAttribute('data-theme', 'dark');
        }

        lightModeBtn.addEventListener('click', () => {
            htmlElement.removeAttribute('data-theme');
            localStorage.setItem('darkMode', 'false');
        });

        darkModeBtn.addEventListener('click', () => {
            htmlElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('darkMode', 'true');
        });

        // عناصر الإدخال
        const usernameInput = document.getElementById('username');
        const roomInput = document.getElementById('room');
        const enterBtn = document.getElementById('enterBtn');
        const errorMessage = document.getElementById('errorMessage');
        const randomRoomBtn = document.getElementById('randomRoomBtn');

        // إنشاء رقم غرفة عشوائي
        function generateRandomRoom() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        randomRoomBtn.addEventListener('click', () => {
            roomInput.value = generateRandomRoom();
        });

        // التحقق من المدخلات والدخول
        enterBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const room = roomInput.value.trim();

            if (!username) {
                errorMessage.textContent = 'الرجاء إدخال اسم المستخدم';
                return;
            }
            if (!room) {
                errorMessage.textContent = 'الرجاء إدخال رقم الغرفة';
                return;
            }

            // حفظ البيانات في localStorage (سيتم قراءتها في صفحة الدردشة)
            localStorage.setItem('chatUser', username);
            localStorage.setItem('chatRoom', room);

            // الانتقال إلى صفحة الدردشة
            window.location.href = 'chat.html'; // تأكد من أن اسم ملف الدردشة هو chat.html
        });

        // السماح بالدخول بالضغط على Enter
        [usernameInput, roomInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    enterBtn.click();
                }
            });
        });

        // روابط القائمة (لأغراض العرض، يمكن توجيهها إلى صفحات أخرى)
        document.getElementById('homeLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('الصفحة الرئيسية - قيد التطوير');
        });
        document.getElementById('helpLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('المساعدة - قيد التطوير');
        });
        document.getElementById('aboutLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('حول التطبيق - قيد التطوير');
        });
        document.getElementById('privacyLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('سياسة الخصوصية - قيد التطوير');
        });
        document.getElementById('termsLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('شروط الاستخدام - قيد التطوير');
        });
    </script>
</body>
</html>
