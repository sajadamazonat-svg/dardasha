<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسهل حل | مرحباً</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #2c3e9e;
            --primary-light: #6c7ffa;
            --secondary: #06d6a0;
            --success: #06d6a0;
            --warning: #ffb703;
            --danger: #d9042b;
            --dark: #1e1e2f;
            --light: #f4f7fb;
            --gray: #6b7280;
            --bg-gradient: linear-gradient(145deg, #ffffff 0%, #f0f4fa 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --border: #d1d5db;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --font-base: 13px;
            --transition: all 0.2s ease;
        }
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(145deg, #12121c 0%, #1e1e2e 100%);
            --card-bg: rgba(28, 28, 42, 0.95);
            --dark: #f0f0fa;
            --light: #2a2a3c;
            --gray: #a0a0b0;
            --border: #4a4a60;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body {
            background: var(--bg-gradient);
            color: var(--dark);
            font-size: var(--font-base);
            line-height: 1.5;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .welcome-container {
            max-width: 400px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 32px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .logo i { font-size: 2.2rem; color: var(--primary-dark); }
        .welcome-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
        }
        .welcome-text {
            color: var(--gray);
            margin-bottom: 24px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .features {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 24px 0;
            text-align: right;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--light);
            padding: 12px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }
        .feature-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .feature-text {
            flex: 1;
            font-weight: 600;
            color: var(--dark);
        }
        .feature-desc {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 2px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(67, 97, 238, 0.4);
        }
        .btn-outline {
            background: var(--light);
            color: var(--dark);
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 0 0;
        }
        .theme-toggle button {
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 14px;
            cursor: pointer;
            color: var(--dark);
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }
        .theme-toggle button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .footer-note {
            margin-top: 20px;
            color: var(--gray);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="logo">
            <i class="fas fa-comment-dots"></i>
            <span>اسهل حل</span>
        </div>
        <div class="welcome-title">مرحباً بك</div>
        <div class="welcome-text">
            تطبيق الدردشة الأكثر أماناً وسهولة. تواصل مع أصدقائك بخصوصية تامة.
        </div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-lock"></i></div>
                <div>
                    <div class="feature-text">تشفير كامل</div>
                    <div class="feature-desc">جميع المحادثات مشفرة وآمنة</div>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-bolt"></i></div>
                <div>
                    <div class="feature-text">سرعة عالية</div>
                    <div class="feature-desc">إرسال واستقبال فوري للرسائل</div>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-images"></i></div>
                <div>
                    <div class="feature-text">مشاركة الوسائط</div>
                    <div class="feature-desc">صور، فيديو، وصوت بجودة عالية</div>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="loginBtn"><i class="fas fa-sign-in-alt"></i> دخول</button>
            <button class="btn btn-outline" id="registerBtn"><i class="fas fa-user-plus"></i> إنشاء حساب</button>
        </div>

        <div class="theme-toggle">
            <button id="lightModeBtn"><i class="fas fa-sun"></i> فاتح</button>
            <button id="darkModeBtn"><i class="fas fa-moon"></i> داكن</button>
        </div>

        <div class="footer-note">
            بالدخول أنت توافق على <a href="#" style="color: var(--primary);">الشروط</a> و <a href="#" style="color: var(--primary);">الخصوصية</a>
        </div>
    </div>

    <script>
        // الوضع الليلي
        const lightModeBtn = document.getElementById('lightModeBtn');
        const darkModeBtn = document.getElementById('darkModeBtn');
        const htmlElement = document.documentElement;

        if (localStorage.getItem('darkMode') === 'true') {
            htmlElement.setAttribute('data-theme', 'dark');
        }

        lightModeBtn.addEventListener('click', () => {
            htmlElement.removeAttribute('data-theme');
            localStorage.setItem('darkMode', 'false');
        });

        darkModeBtn.addEventListener('click', () => {
            htmlElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('darkMode', 'true');
        });

        // أزرار التنقل
        document.getElementById('loginBtn').addEventListener('click', () => {
            window.location.href = 'login.html';
        });

        document.getElementById('registerBtn').addEventListener('click', () => {
            alert('ميزة إنشاء حساب قيد التطوير');
        });

        // روابط الشروط والخصوصية
        document.querySelectorAll('.footer-note a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                alert('قيد التطوير');
            });
        });
    </script>
</body>
</html>
