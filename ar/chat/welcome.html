<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسهل حل | مرحباً</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Cairo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        .top-bar {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid #e0e7ff;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-weight: 800;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4361ee;
        }

        .menu-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.4rem;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: #f0f3ff;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 280px;
            height: 100vh;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 24px 0;
            border-radius: 40px 0 0 40px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px 20px;
            border-bottom: 2px solid #e0e7ff;
        }

        .close-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
            margin-top: 20px;
        }

        .sidebar-nav a {
            background: transparent;
            border: none;
            color: #2b2d42;
            padding: 14px 18px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .sidebar-nav a:hover {
            background: rgba(67, 97, 238, 0.05);
            color: #4361ee;
            border-color: #6c7ffa;
        }

        .sidebar-nav a i {
            font-size: 1.3rem;
            color: #4361ee;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .content {
            padding: 32px 24px;
            text-align: center;
        }

        .logo {
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4361ee, #06d6a0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #5a6a7a;
            font-size: 1.2rem;
            border-bottom: 2px solid #e0e7ff;
            padding-bottom: 20px;
        }

        .welcome-message {
            background: #f8faff;
            border-radius: 40px;
            padding: 28px 20px;
            margin: 20px 0 30px;
            border: 1px solid #e0e7ff;
        }

        .welcome-message h2 {
            color: #4361ee;
            font-size: 1.8rem;
            margin-bottom: 16px;
        }

        .welcome-message p {
            color: #5a6a7a;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 30px 0;
        }

        .feature-item {
            background: #f8faff;
            border-radius: 30px;
            padding: 20px 12px;
            border: 1px solid #e0e7ff;
            transition: transform 0.2s;
        }

        .feature-item:hover {
            transform: translateY(-5px);
        }

        .feature-item i {
            font-size: 2rem;
            color: #4361ee;
            margin-bottom: 10px;
        }

        .feature-item span {
            display: block;
            font-weight: 600;
            color: #2b2d42;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            margin: 8px 0;
        }

        .btn-success {
            background: linear-gradient(135deg, #06d6a0, #05b386);
            color: white;
            box-shadow: 0 8px 20px rgba(6, 214, 160, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(6, 214, 160, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: #4361ee;
            border: 2px solid #4361ee;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: #4361ee;
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- الشريط العلوي -->
        <div class="top-bar">
            <span class="brand"><i class="fas fa-comments"></i> اسهل حل</span>
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        </div>

        <!-- القائمة الجانبية -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="brand">اسهل حل</span>
                <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
            </div>
            <div class="sidebar-nav">
                <a href="welcome.html" class="active"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> دخول</a>
                <a href="help.html"><i class="fas fa-question-circle"></i> مساعدة</a>
                <a href="about.html"><i class="fas fa-info-circle"></i> حول</a>
                <a href="privacy.html"><i class="fas fa-lock"></i> خصوصية</a>
                <a href="terms.html"><i class="fas fa-file-alt"></i> شروط</a>
            </div>
        </div>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- المحتوى الرئيسي -->
        <div class="content">
            <div class="logo">
                <h1>اسهل حل</h1>
                <p>دردشة فورية متطورة</p>
            </div>

            <div class="welcome-message">
                <h2>مرحباً بك</h2>
                <p>تواصل مع أصدقائك بسهولة وأمان. محادثات فورية، مكالمات صوتية، ومشاركة الملفات.</p>
            </div>

            <div class="features">
                <div class="feature-item">
                    <i class="fas fa-comment"></i>
                    <span>دردشة لحظية</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-phone"></i>
                    <span>مكالمات صوتية</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-image"></i>
                    <span>مشاركة صور</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-microphone"></i>
                    <span>تسجيل صوتي</span>
                </div>
            </div>

            <a href="login.html" class="btn btn-success">
                <i class="fas fa-comment-dots"></i> ابدأ المحادثة
            </a>

            <div style="display: flex; gap: 10px; margin-top: 16px;">
                <a href="help.html" class="btn btn-outline" style="flex:1;">
                    <i class="fas fa-question-circle"></i> مساعدة
                </a>
                <a href="about.html" class="btn btn-outline" style="flex:1;">
                    <i class="fas fa-info-circle"></i> حول
                </a>
            </div>
        </div>
    </div>

    <script>
        // وظائف القائمة الجانبية
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        menuBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
