<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسهل حل | دخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #4361ee, #06d6a0); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: #4361ee; text-align: center; margin-bottom: 20px; }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e0e0e0; border-radius: 30px; font-size: 16px; }
        .input-field:focus { outline: none; border-color: #4361ee; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; background: #4361ee; color: white; margin: 8px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-success { background: #06d6a0; }
        .btn-outline { background: white; border: 2px solid #4361ee; color: #4361ee; }
        .divider { text-align: center; margin: 15px 0; color: #666; }
        #error-message { color: #ef476f; font-size: 14px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>اسهل حل</h1>
        <p style="text-align: center; color: #666;">دردشة فورية بسيطة</p>

        <input type="text" id="username" class="input-field" placeholder="اسمك (اتركه فارغًا لاسم عشوائي)">

        <div style="display: flex; gap: 8px; margin: 8px 0;">
            <input type="text" id="room-code" class="input-field" placeholder="رمز الغرفة (4 أرقام)" style="flex:2;">
            <button id="join-btn" class="btn btn-outline" style="flex:1;">انضمام</button>
        </div>

        <button id="create-btn" class="btn"><i class="fas fa-plus"></i> إنشاء غرفة جديدة</button>
        <button id="public-btn" class="btn btn-success"><i class="fas fa-users"></i> غرفة عامة (1000)</button>

        <div id="error-message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAG4EKrB3iLEV2hsB8b08ShpSO6PXDnGjg",
            authDomain: "zio3-8ffdd.firebaseapp.com",
            databaseURL: "https://zio3-8ffdd-default-rtdb.firebaseio.com",
            projectId: "zio3-8ffdd",
            storageBucket: "zio3-8ffdd.firebasestorage.app",
            messagingSenderId: "560939348415",
            appId: "1:560939348415:web:c854e9e214e498ad2d310a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const PUBLIC_ROOM = "1000";

        const usernameInput = document.getElementById('username');
        const roomCodeInput = document.getElementById('room-code');
        const createBtn = document.getElementById('create-btn');
        const joinBtn = document.getElementById('join-btn');
        const publicBtn = document.getElementById('public-btn');
        const errorDiv = document.getElementById('error-message');

        function generateRandomName() {
            const names = ['زائر', 'مستخدم', 'عضو', 'صديق'];
            return names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 1000);
        }

        function isValidRoomCode(code) {
            return /^\d{4}$/.test(code); // 4 أرقام فقط
        }

        function generateRoomCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        async function enterRoom(roomCode, userName) {
            try {
                // التأكد من وجود معلومات الغرفة (إذا لم تكن موجودة ننشئها)
                const roomInfoRef = ref(db, `rooms/${roomCode}/info`);
                const snap = await get(roomInfoRef);
                if (!snap.exists()) {
                    await set(roomInfoRef, { createdAt: Date.now(), createdBy: userName });
                }
                // الانتقال إلى صفحة الدردشة
                window.location.href = `chat.html?room=${roomCode}&user=${encodeURIComponent(userName)}`;
            } catch (err) {
                errorDiv.textContent = 'خطأ: ' + err.message;
            }
        }

        createBtn.addEventListener('click', async () => {
            const userName = usernameInput.value.trim() || generateRandomName();
            const roomCode = generateRoomCode();
            await enterRoom(roomCode, userName);
        });

        joinBtn.addEventListener('click', async () => {
            const roomCode = roomCodeInput.value.trim();
            if (!isValidRoomCode(roomCode)) {
                errorDiv.textContent = 'الرمز يجب أن يكون 4 أرقام';
                return;
            }
            const userName = usernameInput.value.trim() || generateRandomName();
            await enterRoom(roomCode, userName);
        });

        publicBtn.addEventListener('click', async () => {
            const userName = usernameInput.value.trim() || generateRandomName();
            await enterRoom(PUBLIC_ROOM, userName);
        });
    </script>
</body>
</html>
