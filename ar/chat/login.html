<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسهل حل | دخول</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .app-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        .top-bar {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid #e0e7ff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-weight: 800;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4361ee;
        }

        .menu-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: #f0f3ff;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 250px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 20px 0;
            border-radius: 30px 0 0 30px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px 16px;
            border-bottom: 2px solid #e0e7ff;
        }

        .close-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 12px;
            margin-top: 16px;
        }

        .sidebar-nav a {
            background: transparent;
            border: none;
            color: #2b2d42;
            padding: 10px 14px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .sidebar-nav a:hover {
            background: rgba(67, 97, 238, 0.05);
            color: #4361ee;
            border-color: #6c7ffa;
        }

        .sidebar-nav a i {
            font-size: 1.1rem;
            color: #4361ee;
        }

        .sidebar-nav a.active {
            background: rgba(67, 97, 238, 0.1);
            color: #4361ee;
            border-color: #6c7ffa;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .content {
            padding: 24px 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4361ee, #06d6a0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #5a6a7a;
            font-size: 1rem;
            border-bottom: 1px solid #e0e7ff;
            padding-bottom: 12px;
        }

        .card {
            background: #f8faff;
            border-radius: 32px;
            padding: 22px 18px;
            border: 1px solid #e0e7ff;
        }

        .input-field {
            width: 100%;
            padding: 12px 18px;
            margin: 6px 0;
            border: 2px solid rgba(67, 97, 238, 0.2);
            border-radius: 50px;
            background: white;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        .checkbox-container input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 18px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            margin: 6px 0;
        }

        .btn i {
            font-size: 1.1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4361ee, #3a56d4);
            color: white;
            box-shadow: 0 6px 16px rgba(67, 97, 238, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(67, 97, 238, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #06d6a0, #05b386);
            color: white;
            box-shadow: 0 6px 16px rgba(6, 214, 160, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(6, 214, 160, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: #4361ee;
            border: 2px solid #4361ee;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: #4361ee;
            color: white;
        }

        .divider {
            position: relative;
            margin: 16px 0;
            text-align: center;
            color: #8d99ae;
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e7ff;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .join-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .join-row .input-field {
            flex: 2;
            margin: 0;
        }

        .join-row .btn {
            flex: 1;
            margin: 0;
        }

        #error-message {
            color: #ef476f;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #4361ee;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link i {
            margin-left: 4px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b2d42;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 9999;
            display: none;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="app-container">
        <!-- الشريط العلوي -->
        <div class="top-bar">
            <span class="brand"><i class="fas fa-comments"></i> اسهل حل</span>
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        </div>

        <!-- القائمة الجانبية -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="brand">اسهل حل</span>
                <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
            </div>
            <div class="sidebar-nav">
                <a href="welcome.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> دخول</a>
                <a href="help.html"><i class="fas fa-question-circle"></i> مساعدة</a>
                <a href="about.html"><i class="fas fa-info-circle"></i> حول</a>
                <a href="privacy.html"><i class="fas fa-lock"></i> خصوصية</a>
                <a href="terms.html"><i class="fas fa-file-alt"></i> شروط</a>
            </div>
        </div>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- المحتوى الرئيسي -->
        <div class="content">
            <div class="logo">
                <h1>اسهل حل</h1>
                <p>دخول إلى المحادثة</p>
            </div>

            <div class="card">
                <input type="text" id="username-input" class="input-field" placeholder="اسمك (اتركه فارغاً لاسم عشوائي)" maxlength="20">

                <div class="checkbox-container">
                    <input type="checkbox" id="manual-code-checkbox">
                    <label for="manual-code-checkbox">استخدام مفتاح مخصص</label>
                </div>

                <div id="custom-key-container" style="display: none;">
                    <input type="text" id="custom-room-input" class="input-field" placeholder="المفتاح (أرقام)" maxlength="6">
                </div>

                <button id="create-room-btn" class="btn btn-primary">
                    <i class="fas fa-plus-circle"></i> إنشاء غرفة جديدة
                </button>

                <div class="divider">أو</div>

                <div class="join-row">
                    <input type="text" id="room-code-input" class="input-field" placeholder="مفتاح الغرفة" maxlength="6">
                    <button id="join-room-btn" class="btn btn-outline">
                        <i class="fas fa-door-open"></i> انضمام
                    </button>
                </div>

                <button id="public-room-btn" class="btn btn-success">
                    <i class="fas fa-users"></i> غرفة للجميع (عامة)
                </button>

                <div id="error-message"></div>

                <a href="welcome.html" class="back-link">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </a>
            </div>
        </div>
    </div>

    <!-- جافا سكريبت خاص بالصفحة -->
    <script type="module">
        // ========== وظائف القائمة الجانبية ==========
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        menuBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);

        // ========== دالة الإشعارات ==========
        const toast = document.getElementById('toast');
        function showNotification(msg, type = 'success') {
            toast.textContent = msg;
            toast.style.background = type === 'success' ? '#06d6a0' : '#ef476f';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        // ========== دوال مساعدة ==========
        function isValidRoomCode(code) {
            return /^\d{3,6}$/.test(code);
        }

        function generateRandomCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        function generateUserId() {
            return 'user_' + Math.random().toString(36).substr(2, 9);
        }

        function generateRandomName() {
            const prefixes = ['guest','user','member','visitor','player','coder','geek'];
            return prefixes[Math.floor(Math.random() * prefixes.length)] + Math.floor(Math.random() * 10000);
        }

        // ========== معالجة رابط الدعوة ==========
        function handleInviteLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomCode = urlParams.get('room');
            if (roomCode && isValidRoomCode(roomCode)) {
                document.getElementById('room-code-input').value = roomCode;
                showNotification('تم استلام دعوة غرفة: ' + roomCode, 'success');
            }
        }
        handleInviteLink();

        // ========== التحكم في إظهار حقل المفتاح المخصص ==========
        const manualCheckbox = document.getElementById('manual-code-checkbox');
        const customContainer = document.getElementById('custom-key-container');
        manualCheckbox.addEventListener('change', function() {
            customContainer.style.display = this.checked ? 'block' : 'none';
        });

        // ========== منع إدخال غير الأرقام في حقول المفاتيح ==========
        const roomCodeInput = document.getElementById('room-code-input');
        const customRoomInput = document.getElementById('custom-room-input');
        [roomCodeInput, customRoomInput].forEach(input => {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
            });
        });

        // ========== محاكاة الدخول إلى الغرفة (سيتم ربطها مع Firebase لاحقاً) ==========
        function enterChat(room, name) {
            // تخزين بيانات الجلسة
            sessionStorage.setItem('currentRoom', room);
            sessionStorage.setItem('currentUser', name);
            sessionStorage.setItem('userId', generateUserId());
            // التوجيه إلى صفحة الدردشة
            window.location.href = `chat.html?room=${room}`;
        }

        // ========== أحداث الأزرار ==========
        document.getElementById('create-room-btn').addEventListener('click', (e) => {
            e.preventDefault();
            let name = document.getElementById('username-input').value.trim() || generateRandomName();
            let code;
            if (manualCheckbox.checked) {
                code = customRoomInput.value.trim();
                if (!code || !isValidRoomCode(code)) {
                    document.getElementById('error-message').textContent = 'المفتاح يجب أن يكون 3-6 أرقام';
                    return;
                }
            } else {
                code = generateRandomCode();
            }
            document.getElementById('error-message').textContent = '';
            // محاكاة إنشاء غرفة جديدة
            enterChat(code, name);
        });

        document.getElementById('join-room-btn').addEventListener('click', () => {
            let name = document.getElementById('username-input').value.trim() || generateRandomName();
            const code = roomCodeInput.value.trim();
            if (!code || !isValidRoomCode(code)) {
                document.getElementById('error-message').textContent = 'المفتاح يجب أن يكون 3-6 أرقام';
                return;
            }
            document.getElementById('error-message').textContent = '';
            // محاكاة الانضمام إلى غرفة موجودة
            enterChat(code, name);
        });

        document.getElementById('public-room-btn').addEventListener('click', () => {
            let name = document.getElementById('username-input').value.trim() || generateRandomName();
            const code = "1000"; // الغرفة العامة
            document.getElementById('error-message').textContent = '';
            enterChat(code, name);
        });
    </script>
</body>
</html>
