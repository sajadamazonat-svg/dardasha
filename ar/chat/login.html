
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>دخول - اسهل حل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root {
            --primary: #4361ee;
            --primary-dark: #2c3e9e;
            --primary-light: #6c7ffa;
            --secondary: #06d6a0;
            --accent-1: #ff6b6b;
            --accent-2: #ffb703;
            --dark: #1e1e2f;
            --light: #f4f7fb;
            --gray: #6b7280;
            --bg-gradient: linear-gradient(145deg, #ffffff 0%, #f0f4fa 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --border: #d1d5db;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --font-base: 13px;
            --transition: all 0.2s ease;
        }
        [data-theme="dark"] {
            --primary: #5f7df2;
            --primary-dark: #4054b2;
            --primary-light: #8a9cff;
            --secondary: #06d6a0;
            --accent-1: #ff8a8a;
            --accent-2: #ffca3a;
            --dark: #f0f0fa;
            --light: #2a2a3c;
            --gray: #a0a0b0;
            --bg-gradient: linear-gradient(145deg, #12121c 0%, #1e1e2e 100%);
            --card-bg: rgba(28, 28, 42, 0.98);
            --border: #4a4a60;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }
        body {
            background: var(--bg-gradient);
            color: var(--dark);
            font-size: var(--font-base);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 0 15px; width: 100%; }
        .header {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
        }
        .logo i { color: var(--primary-dark); font-size: 1.7rem; }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.9rem;
        }
        .nav-links a:hover { color: var(--primary); }
        .theme-toggle-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .theme-toggle-btn:hover { background: var(--primary); color: white; }
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 30px;
            margin: 40px 0;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .login-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .login-card p {
            color: var(--gray);
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--dark);
            font-size: 0.85rem;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 4px 14px;
            transition: var(--transition);
        }
        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.1);
        }
        .input-wrapper i {
            color: var(--gray);
            font-size: 1rem;
            margin-left: 6px;
        }
        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            color: var(--dark);
            font-size: 0.95rem;
        }
        .input-wrapper input:focus { outline: none; }
        .random-room {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .random-room:hover { text-decoration: underline; }
        .enter-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
        }
        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(67, 97, 238, 0.4);
        }
        .error-message {
            color: var(--accent-1);
            font-size: 0.8rem;
            margin-top: 6px;
            min-height: 20px;
        }
        .info-message {
            text-align: center;
            color: var(--gray);
            font-size: 0.8rem;
            margin-top: 16px;
        }
        .footer {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 25px 0 15px;
            margin-top: auto;
            border-top: 1px solid var(--border);
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 15px;
        }
        .footer-col h4 {
            font-size: 0.95rem;
            margin-bottom: 8px;
            border-right: 3px solid var(--primary);
            padding-right: 8px;
        }
        .footer-col a {
            display: block;
            color: var(--gray);
            text-decoration: none;
            margin-bottom: 4px;
            font-size: 0.8rem;
        }
        .copyright {
            text-align: center;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            color: var(--gray);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <a href="welcome.html" class="logo"><i class="fas fa-comment-dots"></i><span>اسهل حل</span></a>
            <nav class="nav-links">
                <a href="help.html"><i class="fas fa-question-circle"></i> المساعدة</a>
                <a href="about.html"><i class="fas fa-info-circle"></i> حول</a>
                <a href="settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
                <div class="theme-toggle-btn" id="themeToggle"><i class="fas fa-sun" id="themeIcon"></i></div>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="login-card">
            <h2>مرحباً بك</h2>
            <p>اختر اسماً مستعاراً ورقم الغرفة للدخول إلى الدردشة</p>
            <div class="form-group">
                <label>الاسم المستعار (اختياري)</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="nickname" placeholder="سيتم توليد اسم تلقائي" maxlength="30">
                </div>
            </div>
            <div class="form-group">
                <label>رقم الغرفة (اختياري)</label>
                <div class="input-wrapper">
                    <i class="fas fa-door-open"></i>
                    <input type="text" id="room" placeholder="سيتم توليد غرفة عشوائية" maxlength="20">
                </div>
                <div class="random-room" id="randomRoomBtn">
                    <i class="fas fa-dice"></i>
                    <span>إنشاء غرفة عشوائية (5 أرقام)</span>
                </div>
            </div>
            <button class="enter-btn" id="enterBtn"><i class="fas fa-sign-in-alt"></i> دخول</button>
            <div class="error-message" id="errorMessage"></div>
            <div class="info-message"><i class="fas fa-lock"></i> جميع المحادثات مشفرة</div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col"><h4>اسهل حل</h4><p style="color: var(--gray); font-size:0.8rem;">دردشة سريعة وآمنة</p></div>
                <div class="footer-col"><h4>الدعم</h4><a href="help.html">المساعدة</a><a href="about.html">حول</a></div>
                <div class="footer-col"><h4>القانوني</h4><a href="privacy.html">الخصوصية</a><a href="terms.html">الشروط</a></div>
                <div class="footer-col"><h4>روابط</h4><a href="login.html">الدخول</a></div>
            </div>
            <div class="copyright"><p>© 2026 اسهل حل</p></div>
        </div>
    </footer>

    <script>
        // Firebase Config (نفس الإعدادات الموجودة في chat.html)
        const firebaseConfig = {
            apiKey: "AIzaSyAG4EKrB3iLEV2hsB8b08ShpSO6PXDnGjg",
            authDomain: "zio3-8ffdd.firebaseapp.com",
            databaseURL: "https://zio3-8ffdd-default-rtdb.firebaseio.com",
            projectId: "zio3-8ffdd",
            storageBucket: "zio3-8ffdd.firebasestorage.app",
            messagingSenderId: "560939348415",
            appId: "1:560939348415:web:c854e9e214e498ad2d310a",
            measurementId: "G-CVN2B2D0RD"
        };
        firebase.initializeApp(firebaseConfig);
        const analytics = firebase.analytics();

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
        }
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('darkMode', 'false');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('darkMode', 'true');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        });

        // DOM Elements
        const nicknameInput = document.getElementById('nickname');
        const roomInput = document.getElementById('room');
        const enterBtn = document.getElementById('enterBtn');
        const randomRoomBtn = document.getElementById('randomRoomBtn');
        const errorMsg = document.getElementById('errorMessage');

        // Helper functions
        function generateRandomRoom() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }
        function generateRandomName() {
            const prefixes = ['زائر', 'مسافر', 'عابر', 'صديق', 'مجهول'];
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            return prefixes[Math.floor(Math.random() * prefixes.length)] + randomNum;
        }
        function sanitizeInput(str) {
            // منع الأحرف الخطيرة التي قد تسبب مشاكل في Firebase
            return str.replace(/[.#$[\]]/g, '_').trim();
        }

        // Random room button
        randomRoomBtn.addEventListener('click', () => {
            roomInput.value = generateRandomRoom();
        });

        // Enter button
        enterBtn.addEventListener('click', async () => {
            let nickname = nicknameInput.value.trim();
            let room = roomInput.value.trim();

            // توليد اسم تلقائي إذا كان فارغاً
            if (!nickname) {
                nickname = generateRandomName();
                errorMsg.textContent = `تم توليد اسم: ${nickname}`;
                setTimeout(() => errorMsg.textContent = '', 3000);
            } else {
                // تنظيف الاسم من الرموز غير المسموحة
                nickname = sanitizeInput(nickname);
                if (nickname.length > 30) nickname = nickname.substring(0, 30);
            }

            // توليد غرفة تلقائية إذا كانت فارغة
            if (!room) {
                room = generateRandomRoom();
                errorMsg.textContent = `تم إنشاء غرفة جديدة: ${room}`;
                setTimeout(() => errorMsg.textContent = '', 3000);
            } else {
                room = sanitizeInput(room);
                // التحقق من أن رقم الغرفة لا يحتوي على مسافات أو رموز خطيرة
                if (room.includes(' ') || room.length === 0) {
                    errorMsg.textContent = 'رقم الغرفة غير صالح، يرجى استخدام أرقام أو حروف فقط بدون مسافات.';
                    return;
                }
            }

            // تخزين البيانات في sessionStorage لتكون متاحة في صفحة الدردشة
            sessionStorage.setItem('chatRoom', room);
            sessionStorage.setItem('chatUser', nickname);

            // الانتقال إلى صفحة الدردشة
            window.location.href = `chat.html?room=${encodeURIComponent(room)}&user=${encodeURIComponent(nickname)}`;
        });

        // دعم الضغط على Enter
        [nicknameInput, roomInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') enterBtn.click();
            });
        });
    </script>
</body>
</html>
