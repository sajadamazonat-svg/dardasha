<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسهل حل | دخول</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Cairo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        .top-bar {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid #e0e7ff;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-weight: 800;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4361ee;
        }

        .menu-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.4rem;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: #f0f3ff;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 280px;
            height: 100vh;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 24px 0;
            border-radius: 40px 0 0 40px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px 20px;
            border-bottom: 2px solid #e0e7ff;
        }

        .close-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
            margin-top: 20px;
        }

        .sidebar-nav a {
            background: transparent;
            border: none;
            color: #2b2d42;
            padding: 14px 18px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .sidebar-nav a:hover {
            background: rgba(67, 97, 238, 0.05);
            color: #4361ee;
            border-color: #6c7ffa;
        }

        .sidebar-nav a i {
            font-size: 1.3rem;
            color: #4361ee;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .content {
            padding: 32px 24px;
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4361ee, #06d6a0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #5a6a7a;
            font-size: 1.1rem;
            border-bottom: 2px solid #e0e7ff;
            padding-bottom: 16px;
        }

        .card {
            background: #f8faff;
            border-radius: 40px;
            padding: 28px 20px;
            border: 1px solid #e0e7ff;
        }

        .input-field {
            width: 100%;
            padding: 14px 20px;
            margin: 8px 0;
            border: 2px solid rgba(67, 97, 238, 0.2);
            border-radius: 60px;
            background: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #4361ee;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0;
            font-size: 1rem;
        }

        .checkbox-container input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            margin: 8px 0;
        }

        .btn i {
            font-size: 1.2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4361ee, #3a56d4);
            color: white;
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(67, 97, 238, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #06d6a0, #05b386);
            color: white;
            box-shadow: 0 8px 20px rgba(6, 214, 160, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(6, 214, 160, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: #4361ee;
            border: 2px solid #4361ee;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: #4361ee;
            color: white;
        }

        .divider {
            position: relative;
            margin: 20px 0;
            text-align: center;
            color: #8d99ae;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e7ff;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .join-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .join-row .input-field {
            flex: 2;
            margin: 0;
        }

        .join-row .btn {
            flex: 1;
            margin: 0;
        }

        #error-message {
            color: #ef476f;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 16px;
            min-height: 24px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #4361ee;
            text-decoration: none;
            font-size: 1rem;
        }

        .back-link i {
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- الشريط العلوي -->
        <div class="top-bar">
            <span class="brand"><i class="fas fa-comments"></i> اسهل حل</span>
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        </div>

        <!-- القائمة الجانبية -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="brand">اسهل حل</span>
                <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
            </div>
            <div class="sidebar-nav">
                <a href="welcome.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> دخول</a>
                <a href="help.html"><i class="fas fa-question-circle"></i> مساعدة</a>
                <a href="about.html"><i class="fas fa-info-circle"></i> حول</a>
                <a href="privacy.html"><i class="fas fa-lock"></i> خصوصية</a>
                <a href="terms.html"><i class="fas fa-file-alt"></i> شروط</a>
            </div>
        </div>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- المحتوى الرئيسي -->
        <div class="content">
            <div class="logo">
                <h1>اسهل حل</h1>
                <p>دخول إلى المحادثة</p>
            </div>

            <div class="card">
                <input type="text" id="username-input" class="input-field" placeholder="اسمك (اتركه فارغاً لاسم عشوائي)" maxlength="20">

                <div class="checkbox-container">
                    <input type="checkbox" id="manual-code-checkbox">
                    <label for="manual-code-checkbox">استخدام مفتاح مخصص</label>
                </div>

                <div id="custom-key-container" style="display: none;">
                    <input type="text" id="custom-room-input" class="input-field" placeholder="المفتاح (أرقام)" maxlength="6">
                </div>

                <button id="create-room-btn" class="btn btn-primary">
                    <i class="fas fa-plus-circle"></i> إنشاء غرفة جديدة
                </button>

                <div class="divider">أو</div>

                <div class="join-row">
                    <input type="text" id="room-code-input" class="input-field" placeholder="مفتاح الغرفة" maxlength="6">
                    <button id="join-room-btn" class="btn btn-outline">
                        <i class="fas fa-door-open"></i> انضمام
                    </button>
                </div>

                <button id="public-room-btn" class="btn btn-success">
                    <i class="fas fa-users"></i> غرفة للجميع (عامة)
                </button>

                <div id="error-message"></div>

                <a href="welcome.html" class="back-link">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </a>
            </div>
        </div>
    </div>

    <script>
        // وظائف القائمة الجانبية
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        menuBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);

        // التحكم في ظهور حقل المفتاح المخصص
        const manualCheckbox = document.getElementById('manual-code-checkbox');
        const customContainer = document.getElementById('custom-key-container');
        manualCheckbox.addEventListener('change', function() {
            customContainer.style.display = this.checked ? 'block' : 'none';
        });

        // التحقق من رابط الدعوة المباشر
        function handleInviteLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomCode = urlParams.get('room');
            if (roomCode && /^\d{3,6}$/.test(roomCode)) {
                document.getElementById('room-code-input').value = roomCode;
            }
        }
        handleInviteLink();

        // منع إدخال غير الأرقام في حقول المفاتيح
        const roomCodeInput = document.getElementById('room-code-input');
        const customRoomInput = document.getElementById('custom-room-input');
        [roomCodeInput, customRoomInput].forEach(input => {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
            });
        });

        // وظائف الأزرار (سيتم ربطها مع Firebase لاحقاً)
        document.getElementById('create-room-btn').addEventListener('click', function() {
            // مؤقتاً ننتقل إلى صفحة الدردشة
            window.location.href = 'chat.html';
        });

        document.getElementById('join-room-btn').addEventListener('click', function() {
            const code = roomCodeInput.value.trim();
            if (!code) {
                document.getElementById('error-message').textContent = 'الرجاء إدخال مفتاح الغرفة';
                return;
            }
            if (!/^\d{3,6}$/.test(code)) {
                document.getElementById('error-message').textContent = 'المفتاح يجب أن يكون 3-6 أرقام';
                return;
            }
            window.location.href = 'chat.html';
        });

        document.getElementById('public-room-btn').addEventListener('click', function() {
            window.location.href = 'chat.html';
        });
    </script>
</body>
</html>
