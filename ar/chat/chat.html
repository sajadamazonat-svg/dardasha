<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #2c3e9e;
            --primary-light: #6c7ffa;
            --secondary: #06d6a0;
            --success: #06d6a0;
            --warning: #ffb703;
            --danger: #d9042b;
            --dark: #1e1e2f;
            --light: #f4f7fb;
            --gray: #6b7280;
            --bg-gradient: linear-gradient(145deg, #ffffff 0%, #f0f4fa 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --border: #d1d5db;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            --font-base: 14px;
            --transition: all 0.2s ease;
        }
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(145deg, #12121c 0%, #1e1e2e 100%);
            --card-bg: rgba(28, 28, 42, 0.98);
            --dark: #f0f0fa;
            --light: #2a2a3c;
            --gray: #a0a0b0;
            --border: #4a4a60;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body { background: var(--bg-gradient); color: var(--dark); font-size: var(--font-base); line-height: 1.5; transition: background 0.3s, color 0.3s; }
        #app { max-width: 600px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; background: transparent; padding: 8px; position: relative; }
        @media (max-width: 600px) { #app { padding: 4px; } .chat-header { padding: 6px 10px; border-radius: 32px; } .top-bar .action-btn { width: 40px; height: 40px; } .messages-container { padding: 8px; } .message { max-width: 90%; padding: 8px 12px; } .input-area .action-btn { width: 40px; height: 40px; } }
        .chat-header { flex-shrink: 0; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-radius: 40px 40px 12px 12px; margin-bottom: 8px; }
        .header-info h2 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .user-count { font-size: 0.8rem; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 30px; }
        .user-info { display: flex; align-items: center; gap: 6px; }
        .user-badge { background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 30px; font-size: 0.85rem; display: flex; align-items: center; gap: 4px; border: 1px solid rgba(255,255,255,0.2); }
        .action-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0; backdrop-filter: blur(4px); }
        .action-btn.secondary { background: var(--light); color: var(--primary); border: 1px solid var(--border); }
        .top-bar { display: flex; gap: 4px; padding: 4px; background: var(--card-bg); border-radius: 40px; margin-bottom: 8px; border: 1px solid var(--border); justify-content: center; flex-wrap: wrap; }
        .top-bar .action-btn { width: 40px; height: 40px; background: var(--light); color: var(--dark); border: 1px solid var(--border); }
        .top-bar .action-btn#leave-room-btn { background: var(--danger); color: white; border: none; }
        .side-menu, .users-popup { position: absolute; top: 70px; right: 8px; background: var(--card-bg); border-radius: 32px 0 0 32px; padding: 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); border: 1px solid var(--border); z-index: 2000; display: none; flex-direction: column; gap: 12px; backdrop-filter: blur(20px); width: 260px; }
        .side-menu.show, .users-popup.show { display: flex; }
        .side-menu .action-btn { width: 100%; border-radius: 40px; justify-content: flex-start; gap: 12px; padding: 0 16px; background: var(--light); color: var(--dark); height: 48px; }
        .users-popup { max-height: 350px; overflow-y: auto; }
        .users-popup-header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-bottom: 8px; }
        .user-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .user-name { flex: 1; font-weight: 600; color: var(--dark); }
        .messages-container { flex: 1; min-height: 0; padding: 12px; background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 28px; margin-bottom: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--border); }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 24px 24px 24px 6px; align-self: flex-start; background: #f0f4fa; color: #1a1a2c; box-shadow: 0 2px 8px rgba(0,0,0,0.08); word-break: break-word; border: 1px solid rgba(0,0,0,0.05); }
        [data-theme="dark"] .message { background: #2f2f45; color: #f0f0fa; }
        .message.own { align-self: flex-end; background: linear-gradient(135deg, #5f7df2, #4054b2); color: white; border-radius: 24px 24px 6px 24px; }
        .message.system { align-self: center; background: #8892b0; color: white; border-radius: 30px; font-size: 0.8rem; padding: 4px 16px; }
        .message .username { font-size: 0.7rem; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .message .time { font-size: 0.55rem; opacity: 0.7; margin-top: 4px; text-align: left; }
        .message-image { max-width: 100%; max-height: 200px; border-radius: 16px; cursor: pointer; margin-top: 4px; border: 2px solid white; }
        .message-actions { display: none; gap: 8px; margin-top: 6px; justify-content: flex-end; }
        .message.active .message-actions { display: flex; }
        .typing-indicator { font-size: 0.8rem; color: var(--gray); padding: 6px 14px; background: var(--card-bg); border-radius: 30px; align-self: flex-start; display: none; border: 1px solid var(--border); }
        .input-area { flex-shrink: 0; display: flex; gap: 4px; align-items: center; background: var(--card-bg); border-radius: 40px; padding: 4px 4px 4px 14px; border: 1px solid var(--border); }
        .input-area textarea { flex: 1; border: none; padding: 8px 0; background: transparent; color: var(--dark); font-size: 0.95rem; resize: none; max-height: 80px; }
        .input-area textarea:focus { outline: none; }
        .input-area .action-btn { width: 42px; height: 42px; background: var(--primary); color: white; border: none; }

        .media-popup, .emoji-panel { position: absolute; bottom: 70px; left: 8px; background: var(--card-bg); border-radius: 40px; padding: 10px; display: none; gap: 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border: 1px solid var(--border); z-index: 100; backdrop-filter: blur(16px); }

        .audio-play-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .audio-progress { flex: 1; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; position: relative; overflow: hidden; }
        .audio-progress-fill { height: 100%; background: white; width: 0%; transition: width 0.1s; }
        .call-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .call-container.active { display: flex; }
        .call-avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 16px; border: 3px solid white; }
        .call-info { font-size: 1.3rem; margin-bottom: 20px; }
        .call-actions { display: flex; gap: 20px; }
        .call-btn { width: 56px; height: 56px; border-radius: 50%; background: var(--danger); color: white; border: none; font-size: 1.6rem; cursor: pointer; }
        .incoming-panel { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card-bg); padding: 14px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 10001; display: none; flex-direction: column; align-items: center; gap: 8px; border: 2px solid var(--primary); width: 90%; max-width: 320px; }
        .incoming-panel.active { display: flex; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.9rem; z-index: 9999; display: none; }
        .confirm-dialog { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 18px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); z-index: 10001; display: none; flex-direction: column; align-items: center; gap: 12px; width: 260px; text-align: center; border: 2px solid var(--primary); }
        .confirm-dialog.active { display: flex; }
        .confirm-dialog .btn-group { display: flex; gap: 10px; width: 100%; }
        .confirm-dialog .btn { flex: 1; padding: 10px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .confirm-dialog .btn-danger { background: var(--danger); color: white; }
        .confirm-dialog .btn-outline { background: var(--light); color: var(--dark); border: 1px solid var(--border); }
        #global-loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 20000; align-items: center; justify-content: center; flex-direction: column; color: white; }
        #global-loader.active { display: flex; }
        .loader-spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .mention-popup { position: absolute; bottom: 80px; right: 10px; background: var(--card-bg); border-radius: 30px; padding: 8px; display: none; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; border: 1px solid var(--border); z-index: 150; backdrop-filter: blur(16px); }
        .mention-item { padding: 8px 16px; cursor: pointer; border-radius: 30px; display: flex; align-items: center; gap: 8px; }
        .mention-item:hover { background: var(--light); }
        #ring { display: none; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onChildAdded, onChildRemoved, onDisconnect, get, remove, onValue, query, limitToLast, orderByKey, off, endAt } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAG4EKrB3iLEV2hsB8b08ShpSO6PXDnGjg",
            authDomain: "zio3-8ffdd.firebaseapp.com",
            databaseURL: "https://zio3-8ffdd-default-rtdb.firebaseio.com",
            projectId: "zio3-8ffdd",
            storageBucket: "zio3-8ffdd.firebasestorage.app",
            messagingSenderId: "560939348415",
            appId: "1:560939348415:web:c854e9e214e498ad2d310a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const GITHUB_USERNAME = "ashlhl";
        const GITHUB_REPO = "ashlhl";
        const GITHUB_TOKEN_PATH = "2026";
        const ADMIN_LOGIN = "ashlhlsgadalyasiri";
        const ADMIN_DISPLAY = "سجاد";
        const ONE_HOUR = 60 * 60 * 1000;
        const MAX_MSGS = 20;

        let currentRoom = null, currentUser = null, userId = null, messagesRef = null;
        let displayedMessages = new Set();
        let usersMap = {};
        let localStream = null, pc = null, currentCallId = null, callTimeout = null, incomingOffer = null, remoteAudio = null;
        let mediaRecorder = null, recordingInterval = null;
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        const ring = document.getElementById('ring');
        ring.src = "https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3";
        ring.load();

        async function showLoading(txt) { document.querySelector('#global-loader .loader-text').innerHTML = txt; document.getElementById('global-loader').classList.add('active'); }
        function hideLoading() { document.getElementById('global-loader').classList.remove('active'); }
        function showNotification(msg, type = 'success') {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 2000);
        }
        async function copyToClipboard(text) { try { await navigator.clipboard.writeText(text); return true; } catch { return false; } }
        function generateUserId() { return 'user_' + Math.random().toString(36).substr(2, 9); }

        async function setupLocalStream() {
            if (localStream) return localStream;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                showNotification('الميكروفون جاهز');
                return localStream;
            } catch (err) {
                showNotification('تعذر الوصول إلى الميكروفون', 'danger');
                throw err;
            }
        }
        function closeLocalStream() { if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; } }

        function createPeerConnection(room, callId, isCaller) {
            const pc = new RTCPeerConnection(configuration);
            if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = (event) => {
                if (event.streams[0]) {
                    if (remoteAudio) remoteAudio.remove();
                    remoteAudio = document.createElement('audio');
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.autoplay = true;
                    remoteAudio.style.display = 'none';
                    document.body.appendChild(remoteAudio);
                    document.getElementById('call-info').textContent = 'جاري التحدث...';
                    document.getElementById('call-container').classList.add('active');
                }
            };
            pc.onicecandidate = (event) => {
                if (!event.candidate || !room || !callId) return;
                const c = event.candidate.toJSON();
                set(ref(db, `calls/${room}/${callId}/${isCaller ? 'caller' : 'callee'}Candidates/${Date.now()}`), c);
            };
            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'connected') {
                    if (callTimeout) clearTimeout(callTimeout);
                    document.getElementById('incoming-panel').classList.remove('active');
                    ring.pause(); ring.currentTime = 0;
                } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed' || pc.connectionState === 'closed') {
                    endCall();
                }
            };
            return pc;
        }

        async function startCall(targetUserId) {
            if (!currentRoom || !userId) return;
            if (pc) { showNotification('هناك مكالمة قائمة', 'warning'); return; }
            try {
                await setupLocalStream();
                currentCallId = 'call_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                pc = createPeerConnection(currentRoom, currentCallId, true);
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                await set(ref(db, `calls/${currentRoom}/${currentCallId}/offer`), {
                    type: offer.type, sdp: offer.sdp, from: userId, name: currentUser, targetId: targetUserId, ts: Date.now()
                });
                // listen for candidates from callee
                const candRef = ref(db, `calls/${currentRoom}/${currentCallId}/calleeCandidates`);
                onChildAdded(candRef, (snap) => { if (pc) pc.addIceCandidate(new RTCIceCandidate(snap.val())); });
                document.getElementById('call-info').textContent = `الاتصال بـ ${usersMap[targetUserId] || 'المستخدم'}...`;
                document.getElementById('call-container').classList.add('active');
                callTimeout = setTimeout(() => {
                    if (pc && pc.connectionState !== 'connected') { endCall(); showNotification('لم يجب الطرف الآخر', 'danger'); }
                }, 30000);
            } catch (err) { console.error(err); showNotification('فشل بدء المكالمة', 'danger'); endCall(); }
        }

        async function acceptCall() {
            if (!incomingOffer || !currentRoom || !userId || !currentCallId) return;
            if (pc) { showNotification('هناك مكالمة قائمة', 'warning'); return; }
            try {
                await setupLocalStream();
                pc = createPeerConnection(currentRoom, currentCallId, false);
                await pc.setRemoteDescription(new RTCSessionDescription({ type: incomingOffer.type, sdp: incomingOffer.sdp }));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await set(ref(db, `calls/${currentRoom}/${currentCallId}/answer`), {
                    type: answer.type, sdp: answer.sdp, from: userId, name: currentUser, ts: Date.now()
                });
                // listen for caller candidates
                const candRef = ref(db, `calls/${currentRoom}/${currentCallId}/callerCandidates`);
                onChildAdded(candRef, (snap) => { if (pc) pc.addIceCandidate(new RTCIceCandidate(snap.val())); });
                document.getElementById('call-info').textContent = `تتحدث مع ${incomingOffer.name}`;
                document.getElementById('call-container').classList.add('active');
                if (callTimeout) clearTimeout(callTimeout);
                ring.pause(); ring.currentTime = 0;
            } catch (err) { console.error(err); showNotification('فشل قبول المكالمة', 'danger'); endCall(); }
        }

        function endCall() {
            if (callTimeout) clearTimeout(callTimeout);
            if (pc) { pc.close(); pc = null; }
            if (currentRoom && currentCallId) remove(ref(db, `calls/${currentRoom}/${currentCallId}`));
            currentCallId = null; incomingOffer = null;
            document.getElementById('call-container').classList.remove('active');
            document.getElementById('incoming-panel').classList.remove('active');
            document.getElementById('call-info').textContent = '...';
            if (remoteAudio) { remoteAudio.remove(); remoteAudio = null; }
        }

        function listenForCalls() {
            if (!currentRoom) return;
            const callsRef = ref(db, `calls/${currentRoom}`);
            onChildAdded(callsRef, (snap) => {
                const callId = snap.key;
                const callData = snap.val();
                if (!callData || !callData.offer) return;
                const offer = callData.offer;
                if (offer.from === userId) return;
                if (offer.targetId && offer.targetId !== userId) return;
                if (pc) { showNotification('مكالمة واردة من ' + offer.name + ' ولكن لديك مكالمة', 'warning'); return; }
                currentCallId = callId;
                incomingOffer = offer;
                document.getElementById('incoming-caller-name').textContent = offer.name || 'مستخدم';
                document.getElementById('incoming-panel').classList.add('active');
                ring.loop = true; ring.volume = 0.5; ring.play().catch(e => console.warn('Ring error', e));
                onChildRemoved(ref(db, `calls/${currentRoom}/${callId}`), () => {
                    if (currentCallId === callId) { endCall(); showNotification('تم إنهاء المكالمة', 'info'); ring.pause(); ring.currentTime = 0; }
                });
            });
        }

        // باقي دوال الدردشة (الرسائل، الملفات، الإيموجي، إلخ) مختصرة للضرورة
        async function enterChat(room, name) {
            showLoading('جاري الدخول...');
            try {
                if (currentRoom) leaveRoom();
                currentRoom = room;
                const isAdmin = (name === ADMIN_LOGIN);
                currentUser = isAdmin ? ADMIN_DISPLAY : name;
                userId = generateUserId();
                document.getElementById('room-name-display').innerHTML = `غرفة ${room}`;
                document.getElementById('current-user-name').innerText = currentUser;
                const userRef = ref(db, `rooms/${room}/users/${userId}`);
                await set(userRef, { name: isAdmin ? ADMIN_LOGIN : currentUser, joinedAt: Date.now() });
                onDisconnect(userRef).remove();
                // system message
                await set(ref(db, `rooms/${room}/messages/${Date.now()}_system`), { sender: 'نظام', text: `${currentUser} دخل الغرفة`, timestamp: Date.now() });
                // listen for users
                onChildAdded(ref(db, `rooms/${room}/users`), (snap) => { if (snap.val()?.name) usersMap[snap.key] = snap.val().name; updateUsersList(); });
                onChildRemoved(ref(db, `rooms/${room}/users`), (snap) => { delete usersMap[snap.key]; updateUsersList(); });
                // listen for messages
                messagesRef = ref(db, `rooms/${room}/messages`);
                onChildAdded(query(messagesRef, orderByKey(), limitToLast(50)), (snap) => {
                    const msg = snap.val();
                    if (!msg || displayedMessages.has(snap.key)) return;
                    displayedMessages.add(snap.key);
                    const isOwn = msg.sender === (currentUser === ADMIN_DISPLAY ? ADMIN_LOGIN : currentUser) && msg.sender !== 'نظام';
                    const div = document.createElement('div');
                    div.className = `message ${isOwn ? 'own' : ''} ${msg.sender === 'نظام' ? 'system' : ''}`;
                    if (msg.sender !== 'نظام') {
                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'username';
                        nameDiv.textContent = msg.sender === ADMIN_LOGIN ? ADMIN_DISPLAY : msg.sender;
                        div.appendChild(nameDiv);
                    }
                    if (msg.type === 'image') {
                        const img = document.createElement('img');
                        img.src = msg.text; img.className = 'message-image';
                        img.onclick = () => { document.getElementById('modalMediaContainer').innerHTML = `<img src="${msg.text}" class="modal-media">`; document.getElementById('mediaModal').style.display = 'flex'; };
                        div.appendChild(img);
                    } else {
                        const textSpan = document.createElement('span');
                        textSpan.textContent = msg.text;
                        div.appendChild(textSpan);
                    }
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'time';
                    timeDiv.textContent = new Date(msg.timestamp).toLocaleTimeString('ar-EG');
                    div.appendChild(timeDiv);
                    document.getElementById('messages-container').appendChild(div);
                    document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
                });
                listenForCalls();
                hideLoading();
            } catch (err) { hideLoading(); showNotification('خطأ: ' + err.message, 'danger'); }
        }
        function updateUsersList() {
            const count = Object.keys(usersMap).length;
            document.getElementById('user-count').textContent = `(${count})`;
            const list = document.getElementById('popup-users-list');
            list.innerHTML = '';
            Object.entries(usersMap).forEach(([id, name]) => {
                const item = document.createElement('div');
                item.className = 'user-item';
                item.dataset.userId = id;
                item.innerHTML = `<div class="user-avatar">${name.charAt(0)}</div><div class="user-name">${name === ADMIN_LOGIN ? ADMIN_DISPLAY : name}</div>`;
                item.onclick = () => { document.getElementById('users-popup').classList.remove('show'); document.getElementById('popup-overlay').style.display = 'none'; startCall(id); };
                list.appendChild(item);
            });
        }
        function leaveRoom() {
            endCall(); closeLocalStream();
            if (currentRoom && userId) {
                set(ref(db, `rooms/${currentRoom}/messages/${Date.now()}_system`), { sender: 'نظام', text: `${currentUser} غادر الغرفة`, timestamp: Date.now() });
                remove(ref(db, `rooms/${currentRoom}/users/${userId}`));
            }
            currentRoom = currentUser = userId = null;
            window.location.href = 'login.html';
        }
        function confirmLeave() { document.getElementById('confirm-dialog').classList.add('active'); }
        document.getElementById('confirm-yes').onclick = () => { document.getElementById('confirm-dialog').classList.remove('active'); leaveRoom(); };
        document.getElementById('confirm-no').onclick = () => document.getElementById('confirm-dialog').classList.remove('active');
        document.getElementById('leave-room-btn').onclick = confirmLeave;
        document.getElementById('send-message-btn').onclick = async () => {
            const text = document.getElementById('message-input').value.trim();
            if (!text || !currentRoom) return;
            const key = `${Date.now()}_${userId}`;
            await set(ref(db, `rooms/${currentRoom}/messages/${key}`), { sender: currentUser === ADMIN_DISPLAY ? ADMIN_LOGIN : currentUser, text, timestamp: Date.now() });
            document.getElementById('message-input').value = '';
        };
        document.getElementById('message-input').addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('send-message-btn').click(); } });
        document.getElementById('toggle-users-btn').onclick = () => { document.getElementById('users-popup').classList.toggle('show'); document.getElementById('popup-overlay').style.display = 'block'; };
        document.getElementById('close-popup-btn').onclick = () => { document.getElementById('users-popup').classList.remove('show'); document.getElementById('popup-overlay').style.display = 'none'; };
        document.getElementById('popup-overlay').onclick = () => { document.getElementById('users-popup').classList.remove('show'); document.getElementById('popup-overlay').style.display = 'none'; };
        document.getElementById('call-user-btn').onclick = () => { document.getElementById('users-popup').classList.toggle('show'); document.getElementById('popup-overlay').style.display = 'block'; };
        document.getElementById('copy-room-btn').onclick = async () => { if (currentRoom) { const ok = await copyToClipboard(currentRoom); showNotification(ok ? 'تم نسخ رقم الغرفة' : 'فشل النسخ'); } };
        document.getElementById('share-room-btn').onclick = () => { if (currentRoom) navigator.clipboard.writeText(window.location.href).then(() => showNotification('تم نسخ الرابط')); };
        document.getElementById('accept-incoming').onclick = acceptCall;
        document.getElementById('reject-incoming').onclick = () => { endCall(); ring.pause(); ring.currentTime = 0; };
        document.getElementById('mute-call-btn').onclick = () => { if (localStream) { const track = localStream.getAudioTracks()[0]; if (track) { track.enabled = !track.enabled; document.getElementById('mute-call-btn').innerHTML = track.enabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>'; } } };
        document.getElementById('end-call-btn').onclick = endCall;
        document.getElementById('menu-btn').onclick = () => document.getElementById('side-menu').classList.toggle('show');
        document.addEventListener('click', (e) => { if (!e.target.closest('#side-menu') && !e.target.closest('#menu-btn')) document.getElementById('side-menu').classList.remove('show'); });
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('mediaModal').style.display = 'none';
        document.getElementById('emoji-btn').onclick = () => document.getElementById('emoji-panel').classList.toggle('show');
        document.querySelectorAll('.emoji-btn').forEach(btn => btn.onclick = () => { document.getElementById('message-input').value += btn.textContent; document.getElementById('emoji-panel').classList.remove('show'); });
        document.getElementById('media-btn').onclick = () => document.getElementById('media-popup').classList.toggle('show');
        document.getElementById('attach-btn').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = async (e) => { if (e.target.files[0]) { const file = e.target.files[0]; const key = `${Date.now()}_${userId}`; await set(ref(db, `rooms/${currentRoom}/messages/${key}`), { sender: currentUser === ADMIN_DISPLAY ? ADMIN_LOGIN : currentUser, text: '[ملف]', type: 'image', timestamp: Date.now() }); } };
        document.getElementById('voice-record-btn').onclick = () => { alert('تسجيل الصوت قيد التطوير'); };
        if (localStorage.getItem('darkMode') === 'true') document.documentElement.setAttribute('data-theme', 'dark');
        (async () => { const room = localStorage.getItem('chatRoom'), name = localStorage.getItem('nickname'); if (room && name) { await enterChat(room, name); } else window.location.href = 'login.html'; })();
    </script>
