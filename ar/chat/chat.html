<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسهل حل | الدردشة</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Cairo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FFmpeg (لتحويل الفيديو) -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            max-width: 550px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px 48px 0 0;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .top-bar {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid #e0e7ff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-weight: 800;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4361ee;
        }

        .menu-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: #f0f3ff;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 280px;
            height: 100vh;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 24px 0;
            border-radius: 40px 0 0 40px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px 20px;
            border-bottom: 2px solid #e0e7ff;
        }

        .close-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
            margin-top: 20px;
        }

        .sidebar-nav a {
            background: transparent;
            border: none;
            color: #2b2d42;
            padding: 12px 16px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .sidebar-nav a:hover {
            background: rgba(67, 97, 238, 0.05);
            color: #4361ee;
            border-color: #6c7ffa;
        }

        .sidebar-nav a i {
            font-size: 1.2rem;
            color: #4361ee;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* شاشة الدردشة */
        .chat-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 8px;
        }

        .chat-header {
            background: linear-gradient(135deg, #4361ee, #3a56d4);
            color: white;
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-radius: 40px 40px 16px 16px;
            margin-bottom: 8px;
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.2);
            gap: 8px;
        }

        .header-info h2 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-count {
            font-size: 0.85rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 40px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .user-badge {
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .action-btn.secondary {
            background: white;
            color: #4361ee;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .messages-container {
            flex: 1;
            padding: 16px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            margin-bottom: 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.9);
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 24px 24px 24px 6px;
            align-self: flex-start;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            position: relative;
            word-break: break-word;
            font-size: 0.95rem;
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, #4361ee, #3a56d4);
            color: white;
            border-radius: 24px 24px 6px 24px;
        }

        .message.system {
            align-self: center;
            background: rgba(141, 153, 174, 0.7);
            color: white;
            border-radius: 40px;
            font-size: 0.8rem;
            padding: 4px 20px;
        }

        .message .username {
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #3a56d4;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.8;
        }

        .message.own .username {
            color: rgba(255,255,255,0.9);
        }

        .message .time {
            font-size: 0.55rem;
            opacity: 0.6;
            margin-top: 4px;
            text-align: left;
        }

        .message-image {
            max-width: 100%;
            max-height: 150px;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 4px;
            border: 2px solid white;
        }

        .typing-indicator {
            font-size: 0.8rem;
            color: #8d99ae;
            padding: 6px 16px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            align-self: flex-start;
            display: none;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .input-area {
            display: flex;
            gap: 6px;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 4px 4px 4px 16px;
            border: 1px solid #e0e7ff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .input-area textarea {
            flex: 1;
            border: none;
            padding: 10px 0;
            background: transparent;
            font-size: 1rem;
            resize: none;
            max-height: 80px;
            min-height: 24px;
            font-family: 'Cairo', sans-serif;
        }

        .input-area textarea:focus {
            outline: none;
        }

        .input-area .action-btn {
            width: 48px;
            height: 48px;
            background: #4361ee;
            color: white;
            border: none;
            font-size: 1.2rem;
        }

        .input-area .action-btn.secondary {
            background: #f8f9fa;
            color: #2b2d42;
        }

        .media-popup {
            position: absolute;
            bottom: 80px;
            left: 15px;
            background: white;
            border-radius: 50px;
            padding: 10px;
            display: flex;
            gap: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 1px solid #dee2e6;
            display: none;
            z-index: 100;
        }

        .media-popup.show {
            display: flex;
        }

        .media-popup .action-btn {
            width: auto;
            height: auto;
            padding: 8px 16px;
            border-radius: 40px;
            background: #4361ee;
            color: white;
            gap: 6px;
            font-size: 0.9rem;
        }

        #emoji-panel {
            bottom: 140px;
            flex-wrap: wrap;
            width: 260px;
            gap: 6px;
            justify-content: center;
        }

        .emoji-btn {
            font-size: 1.8rem;
            padding: 6px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .emoji-btn:hover {
            transform: scale(1.2);
        }

        .voice-recording-bar {
            display: none;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 8px 16px;
            border-radius: 60px;
            margin-bottom: 8px;
            border: 2px solid #4361ee;
            box-shadow: 0 4px 16px rgba(67,97,238,0.2);
        }

        .voice-recording-bar.active {
            display: flex;
        }

        .voice-timer {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ef476f;
            direction: ltr;
        }

        .voice-visualizer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 30px;
        }

        .voice-bar {
            width: 4px;
            background: #4361ee;
            border-radius: 2px;
            transition: height 0.1s;
        }

        .users-popup {
            position: absolute;
            top: 70px;
            left: 15px;
            right: 15px;
            background: white;
            border-radius: 36px;
            padding: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid #dee2e6;
            z-index: 2000;
            display: none;
            max-height: 350px;
            overflow-y: auto;
        }

        .users-popup.show {
            display: block;
        }

        .users-popup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #e0e7ff;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .users-popup-header h4 {
            color: #4361ee;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-popup-btn {
            background: #f8f9fa;
            border: none;
            color: #4361ee;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-bottom: 1px solid #e0e7ff;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4361ee, #06d6a0);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
        }

        .user-name {
            flex: 1;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .user-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #06d6a0;
            box-shadow: 0 0 8px #06d6a0;
        }

        /* نافذة المكالمة */
        .call-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .call-container.active {
            display: flex;
        }

        .call-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4361ee, #06d6a0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            margin-bottom: 20px;
            border: 3px solid white;
        }

        .call-info {
            font-size: 1.3rem;
            margin-bottom: 30px;
        }

        .call-actions {
            display: flex;
            gap: 20px;
        }

        .call-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ef476f;
            color: white;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .call-btn.answer {
            background: #06d6a0;
        }

        .call-btn:hover {
            transform: scale(1.1);
        }

        .incoming-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 16px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 10001;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 2px solid #4361ee;
            width: 90%;
            max-width: 320px;
        }

        .incoming-panel.active {
            display: flex;
        }

        .incoming-panel .caller-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4361ee;
        }

        .incoming-actions {
            display: flex;
            gap: 15px;
        }

        /* مؤشر التحميل */
        #global-loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        #global-loader.active { display: flex; }
        .loader-spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top-color: #4361ee; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        .loader-text { font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 30px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #ring { display: none; }
    </style>
</head>
<body>
    <!-- مؤشر التحميل العام -->
    <div id="global-loader">
        <div class="loader-spinner"></div>
        <div class="loader-text" id="loader-text">جاري التحميل...</div>
    </div>

    <div class="app-container">
        <!-- الشريط العلوي -->
        <div class="top-bar">
            <span class="brand"><i class="fas fa-comments"></i> اسهل حل</span>
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        </div>

        <!-- القائمة الجانبية -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="brand">اسهل حل</span>
                <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
            </div>
            <div class="sidebar-nav">
                <a href="welcome.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> دخول</a>
                <a href="chat.html" class="active"><i class="fas fa-comment"></i> الدردشة</a>
                <a href="room-info.html"><i class="fas fa-door-open"></i> الغرفة</a>
                <a href="help.html"><i class="fas fa-question-circle"></i> مساعدة</a>
                <a href="about.html"><i class="fas fa-info-circle"></i> حول</a>
                <a href="privacy.html"><i class="fas fa-lock"></i> خصوصية</a>
                <a href="terms.html"><i class="fas fa-file-alt"></i> شروط</a>
            </div>
        </div>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- شاشة الدردشة -->
        <div class="chat-screen">
            <!-- رأس الدردشة -->
            <div class="chat-header">
                <div class="header-info">
                    <h2>
                        <i class="fas fa-comment"></i>
                        <span id="room-name-display">غرفة 1000</span>
                        <span class="user-count" id="user-count">(0)</span>
                    </h2>
                </div>
                <div class="user-info">
                    <span class="user-badge" id="user-status">
                        <i class="fas fa-user"></i> <span id="current-user-name">زائر</span>
                    </span>
                    <button class="action-btn secondary" id="toggle-users-btn" title="المتصلون">
                        <i class="fas fa-users"></i>
                    </button>
                    <button class="action-btn secondary" id="call-user-btn" title="اتصال صوتي">
                        <i class="fas fa-phone"></i>
                    </button>
                    <button class="action-btn secondary" id="copy-room-btn" title="نسخ رقم الغرفة">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button class="action-btn secondary" id="share-room-btn" title="مشاركة الغرفة">
                        <i class="fas fa-share-alt"></i>
                    </button>
                    <button class="action-btn secondary" id="leave-room-btn" style="background:#ef476f;color:white" title="خروج">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <!-- قائمة المستخدمين المنبثقة -->
            <div id="users-popup" class="users-popup">
                <div class="users-popup-header">
                    <h4><i class="fas fa-users"></i> المتصلون الآن</h4>
                    <button class="close-popup-btn" id="close-popup-btn"><i class="fas fa-times"></i></button>
                </div>
                <div id="popup-users-list"></div>
            </div>
            <div id="popup-overlay" class="sidebar-overlay"></div>

            <!-- منطقة الرسائل -->
            <div id="messages-container" class="messages-container">
                <div class="typing-indicator" id="typing-indicator"></div>
            </div>

            <!-- شريط تقدم رفع الملفات -->
            <div id="upload-progress" style="display:none; padding:6px; background:white; border-radius:40px; margin-bottom:4px;">
                <div class="progress-text" style="display:flex; justify-content:space-between; font-size:0.8rem;">
                    <span id="progress-message">جاري الرفع...</span>
                    <span id="progress-percent"></span>
                </div>
                <div class="progress-indeterminate" id="progress-indicator" style="display:flex; align-items:center; gap:6px;">
                    <div class="spinner" style="width:18px; height:18px; border:3px solid #e0e7ff; border-top-color:#4361ee; border-radius:50%; animation:spin 1s linear infinite;"></div>
                    <span>جاري المعالجة...</span>
                </div>
            </div>

            <!-- شريط تسجيل الصوت -->
            <div id="voice-recording-bar" class="voice-recording-bar">
                <span class="voice-timer" id="voice-timer">00:00</span>
                <div class="voice-visualizer" id="voice-visualizer"></div>
                <button id="stop-recording-btn" class="action-btn" style="background:#ef476f"><i class="fas fa-stop"></i></button>
                <button id="send-voice-btn" class="action-btn" style="background:#06d6a0"><i class="fas fa-paper-plane"></i></button>
            </div>

            <!-- منطقة الإدخال -->
            <div class="input-area">
                <textarea id="message-input" placeholder="اكتب رسالتك..." rows="1"></textarea>

                <button class="action-btn secondary" id="emoji-btn"><i class="far fa-smile"></i></button>
                <button class="action-btn secondary" id="media-btn"><i class="fas fa-paperclip"></i></button>

                <!-- قائمة الوسائط -->
                <div id="media-popup" class="media-popup">
                    <button id="attach-btn" class="action-btn"><i class="fas fa-cloud-upload-alt"></i> رفع</button>
                    <button id="camera-btn" class="action-btn"><i class="fas fa-camera"></i> كاميرا</button>
                    <button id="voice-record-btn" class="action-btn"><i class="fas fa-microphone"></i> تسجيل</button>
                </div>

                <!-- لوحة الإيموجي -->
                <div id="emoji-panel" class="media-popup">
                    <button class="emoji-btn">😊</button><button class="emoji-btn">😂</button><button class="emoji-btn">❤️</button>
                    <button class="emoji-btn">👍</button><button class="emoji-btn">🔥</button><button class="emoji-btn">🎉</button>
                    <button class="emoji-btn">😢</button><button class="emoji-btn">😡</button><button class="emoji-btn">👋</button>
                    <button class="emoji-btn">🤔</button><button class="emoji-btn">😎</button><button class="emoji-btn">🥳</button>
                </div>

                <button id="send-message-btn" class="action-btn"><i class="fas fa-paper-plane"></i></button>
            </div>

            <!-- مدخلات الملفات المخفية -->
            <input type="file" id="file-input" accept="image/*,video/*" style="display:none">
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">
        </div>
    </div>

    <!-- نافذة المكالمة الواردة -->
    <div id="incoming-panel" class="incoming-panel">
        <div class="caller-name" id="incoming-caller-name">...</div>
        <div class="incoming-actions">
            <button class="btn btn-success" id="accept-incoming"><i class="fas fa-phone"></i> قبول</button>
            <button class="btn btn-danger" id="reject-incoming"><i class="fas fa-phone-slash"></i> رفض</button>
        </div>
    </div>

    <!-- نافذة المكالمة النشطة -->
    <div id="call-container" class="call-container">
        <div class="call-avatar" id="call-avatar"><i class="fas fa-user"></i></div>
        <div class="call-info" id="call-info">...</div>
        <div class="call-actions">
            <button class="call-btn" id="mute-call-btn"><i class="fas fa-microphone"></i></button>
            <button class="call-btn" id="end-call-btn"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <!-- صوت الرنة -->
    <audio id="ring" src="https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg" preload="auto"></audio>

    <script>
        // ==================== وظائف القائمة الجانبية ====================
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        menuBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);

        // ==================== متغيرات مؤقتة للمحاكاة ====================
        let currentUser = 'زائر';
        let currentRoom = '1000';
        document.getElementById('current-user-name').textContent = currentUser;
        document.getElementById('room-name-display').textContent = `غرفة ${currentRoom}`;
        let usersMap = {};

        // ==================== قائمة المستخدمين المنبثقة ====================
        const toggleUsersBtn = document.getElementById('toggle-users-btn');
        const usersPopup = document.getElementById('users-popup');
        const popupOverlay = document.getElementById('popup-overlay');
        const closePopupBtn = document.getElementById('close-popup-btn');
        const popupUsersList = document.getElementById('popup-users-list');

        function closeUsersPopup() {
            usersPopup.classList.remove('show');
            popupOverlay.classList.remove('active');
        }

        toggleUsersBtn.addEventListener('click', () => {
            usersPopup.classList.toggle('show');
            popupOverlay.classList.toggle('active');
        });

        popupOverlay.addEventListener('click', closeUsersPopup);
        closePopupBtn.addEventListener('click', closeUsersPopup);

        // ==================== أزرار نسخ ومشاركة ====================
        const copyRoomBtn = document.getElementById('copy-room-btn');
        const shareRoomBtn = document.getElementById('share-room-btn');
        const leaveBtn = document.getElementById('leave-room-btn');

        copyRoomBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentRoom);
            alert('تم نسخ رقم الغرفة');
        });

        shareRoomBtn.addEventListener('click', () => {
            const url = `${location.origin}${location.pathname}?room=${currentRoom}`;
            if (navigator.share) {
                navigator.share({ title: 'اسهل حل', text: `انضم إلى غرفتي برمز: ${currentRoom}`, url });
            } else {
                navigator.clipboard.writeText(url);
                alert('تم نسخ رابط الدعوة');
            }
        });

        leaveBtn.addEventListener('click', () => {
            if (confirm('هل أنت متأكد من الخروج من الغرفة؟')) {
                window.location.href = 'login.html';
            }
        });

        // ==================== قائمة الوسائط ====================
        const mediaBtn = document.getElementById('media-btn');
        const mediaPopup = document.getElementById('media-popup');
        const attachBtn = document.getElementById('attach-btn');
        const cameraBtn = document.getElementById('camera-btn');
        const voiceRecordBtn = document.getElementById('voice-record-btn');
        const fileInput = document.getElementById('file-input');
        const cameraInput = document.getElementById('camera-input');

        mediaBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mediaPopup.classList.toggle('show');
        });

        attachBtn.addEventListener('click', () => {
            fileInput.click();
            mediaPopup.classList.remove('show');
        });

        cameraBtn.addEventListener('click', () => {
            cameraInput.click();
            mediaPopup.classList.remove('show');
        });

        document.addEventListener('click', (e) => {
            if (!mediaBtn.contains(e.target) && !mediaPopup.contains(e.target)) {
                mediaPopup.classList.remove('show');
            }
        });

        // ==================== إيموجي ====================
        const emojiBtn = document.getElementById('emoji-btn');
        const emojiPanel = document.getElementById('emoji-panel');
        const messageInput = document.getElementById('message-input');

        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPanel.style.display = emojiPanel.style.display === 'flex' ? 'none' : 'flex';
        });

        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                messageInput.value += btn.textContent;
                messageInput.focus();
                emojiPanel.style.display = 'none';
            });
        });

        document.addEventListener('click', (e) => {
            if (!emojiBtn.contains(e.target) && !emojiPanel.contains(e.target)) {
                emojiPanel.style.display = 'none';
            }
        });

        // ==================== إرسال رسالة (محاكاة) ====================
        const sendBtn = document.getElementById('send-message-btn');
        const messagesContainer = document.getElementById('messages-container');

        function addMessage(text, isOwn = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOwn ? 'own' : ''}`;

            if (!isOwn) {
                const usernameDiv = document.createElement('div');
                usernameDiv.className = 'username';
                usernameDiv.textContent = 'مستخدم';
                msgDiv.appendChild(usernameDiv);
            }

            msgDiv.appendChild(document.createTextNode(text));

            const timeDiv = document.createElement('div');
            timeDiv.className = 'time';
            timeDiv.textContent = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            msgDiv.appendChild(timeDiv);

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text) {
                addMessage(text, true);
                messageInput.value = '';
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // ==================== تسجيل صوت (محاكاة) ====================
        const voiceBar = document.getElementById('voice-recording-bar');
        const stopRecordingBtn = document.getElementById('stop-recording-btn');
        const sendVoiceBtn = document.getElementById('send-voice-btn');
        const voiceTimer = document.getElementById('voice-timer');
        let recording = false;
        let timerInterval;

        voiceRecordBtn.addEventListener('click', () => {
            // محاكاة بدء التسجيل
            voiceBar.classList.add('active');
            let seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                voiceTimer.textContent = `${mins}:${secs}`;
            }, 1000);
        });

        stopRecordingBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            voiceBar.classList.remove('active');
            voiceTimer.textContent = '00:00';
        });

        sendVoiceBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            voiceBar.classList.remove('active');
            voiceTimer.textContent = '00:00';
            addMessage('🎤 تسجيل صوتي', true);
        });

        // ==================== رفع ملفات (محاكاة) ====================
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.type.startsWith('image/')) {
                    addMessage('🖼️ صورة', true);
                } else if (file.type.startsWith('video/')) {
                    addMessage('🎥 فيديو', true);
                }
            }
            fileInput.value = '';
        });

        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                addMessage('📸 صورة من الكاميرا', true);
            }
            cameraInput.value = '';
        });

        // ==================== مكالمات (محاكاة) ====================
        const callUserBtn = document.getElementById('call-user-btn');
        const incomingPanel = document.getElementById('incoming-panel');
        const acceptIncoming = document.getElementById('accept-incoming');
        const rejectIncoming = document.getElementById('reject-incoming');
        const callContainer = document.getElementById('call-container');
        const endCallBtn = document.getElementById('end-call-btn');
        const muteCallBtn = document.getElementById('mute-call-btn');
        const ring = document.getElementById('ring');

        callUserBtn.addEventListener('click', () => {
            // محاكاة عرض لوحة المتصلين (المستخدمين)
            usersPopup.classList.toggle('show');
            popupOverlay.classList.toggle('active');
            // في التطبيق الحقيقي سيتم تحديد مستخدم للاتصال به
        });

        // محاكاة مكالمة واردة بعد ثوانٍ (للعرض فقط)
        setTimeout(() => {
            document.getElementById('incoming-caller-name').textContent = 'مستخدم 123';
            incomingPanel.classList.add('active');
            ring.play().catch(() => {});
        }, 5000);

        acceptIncoming.addEventListener('click', () => {
            incomingPanel.classList.remove('active');
            ring.pause();
            callContainer.classList.add('active');
            document.getElementById('call-info').textContent = 'جاري التحدث مع مستخدم 123';
        });

        rejectIncoming.addEventListener('click', () => {
            incomingPanel.classList.remove('active');
            ring.pause();
        });

        endCallBtn.addEventListener('click', () => {
            callContainer.classList.remove('active');
        });

        muteCallBtn.addEventListener('click', () => {
            const icon = muteCallBtn.querySelector('i');
            if (icon.classList.contains('fa-microphone')) {
                icon.classList.remove('fa-microphone');
                icon.classList.add('fa-microphone-slash');
            } else {
                icon.classList.remove('fa-microphone-slash');
                icon.classList.add('fa-microphone');
            }
        });

        // ==================== مؤشر التحميل ====================
        const loader = document.getElementById('global-loader');
        function showLoading(text = 'جاري التحميل...') {
            document.getElementById('loader-text').textContent = text;
            loader.classList.add('active');
        }
        function hideLoading() {
            loader.classList.remove('active');
        }

        // محاكاة تحميل عند الدخول
        showLoading();
        setTimeout(hideLoading, 1000);
    </script>
</body>
</html>
