        async function getGitHubToken() { const snap = await get(ref(db, GITHUB_TOKEN_PATH)); if (!snap.exists()) throw new Error('لم يتم العثور على التوكن'); return snap.val(); }
        async function uploadToGitHub(file, fileName, fileType) {
            const token = await getGitHubToken();
            let typeFolder = { image: 'صور', video: 'فيديو', audio: 'تسجيل_صوتي' }[fileType] || 'اخرى';
            const githubPath = `chat/${typeFolder}/${sanitizeFolderName(currentRoom)}/${sanitizeFolderName(currentUser)}/${fileName}`;
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${githubPath}`, {
                            method: 'PUT',
                            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `رفع ${fileType} من ${currentUser} في غرفة ${currentRoom}`, content: e.target.result.split(',')[1], branch: 'main' })
                        });
                        if (!response.ok) { const err = await response.json(); throw new Error(err.message); }
                        resolve(`https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/${githubPath}`);
                    } catch (err) { reject(new Error('فشل الرفع')); }
                }; reader.onerror = () => reject(new Error('فشل قراءة الملف')); reader.readAsDataURL(file);
            });
        }

        async function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const maxSize = 1920;
                        if (width > maxSize || height > maxSize) {
                            if (width > height) { height = Math.round((height * maxSize) / width); width = maxSize; }
                            else { width = Math.round((width * maxSize) / height); height = maxSize; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            if (blob) resolve(new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }));
                            else reject(new Error('فشل ضغط الصورة'));
                        }, 'image/jpeg', 0.8);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function handleFileUpload(file, type) {

                if (type === 'image') { try { file = await compressImage(file); } catch (e) { console.warn(e); } }
                else if (type === 'video') { if (file.size > 100*1024*1024) { showNotification('الفيديو كبير جداً', 'danger'); progressDiv.style.display = 'none'; return; } }
                const fname = Date.now() + '_' + Math.random().toString(36).substring(2,8) + '.' + (file.name.split('.').pop() || (type==='image'?'jpg':type==='video'?'mp4':'webm'));
                const url = await uploadToGitHub(file, fname, type);
                progressDiv.style.display = 'none';
                if (currentRoom && messagesRef) {
                    const msgKey = `${Date.now()}_${userId}`;
                    await set(ref(db, `rooms/${currentRoom}/messages/${msgKey}`), {

        // ==================== تسجيل صوتي ====================
        let mediaRecorder, audioChunks = [], recordingStartTime, recordingTimerInterval, audioContext, analyser, visualizerAnimation;
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const audioFile = new File([audioBlob], 'audio_'+Date.now()+'.webm', { type: 'audio/webm' });
                        handleFileUpload(audioFile, 'audio');
                        audioChunks = [];
                    }
                    stream.getTracks().forEach(t => t.stop());
                };
                audioContext = new AudioContext(); analyser = audioContext.createAnalyser(); analyser.fftSize = 32;
                audioContext.createMediaStreamSource(stream).connect(analyser);
                voiceVisualizer.innerHTML = ''; for (let i=0; i<16; i++) voiceVisualizer.innerHTML += '<div class="voice-bar"></div>';
                mediaRecorder.start(); recordingStartTime = Date.now();
                recordingTimerInterval = setInterval(() => { let e = Math.floor((Date.now()-recordingStartTime)/1000); voiceTimer.textContent = `${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`; },1000);
                voiceRecordingBar.classList.add('active');
                const updateVis = () => {
                    if (!analyser || !voiceRecordingBar.classList.contains('active')) return;
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(data);
                    voiceVisualizer.querySelectorAll('.voice-bar').forEach((b,i) => { b.style.height = (10 + (data[i]/255)*20) + 'px'; });
                    visualizerAnimation = requestAnimationFrame(updateVis);
                };
                updateVis();
                showNotification('بدأ التسجيل');
            } catch { showNotification('تعذر الوصول إلى الميكروفون', 'danger'); }
        }
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop(); clearInterval(recordingTimerInterval); audioContext?.close();
                if (visualizerAnimation) cancelAnimationFrame(visualizerAnimation);
                voiceRecordingBar.classList.remove('active'); showNotification('تم إيقاف التسجيل');
            }
        }

        // ==================== WebRTC (مبسط) ====================
        // سيتم تنفيذ المكالمات بشكل كامل هنا، لكن للاختصار نضع هيكل أساسي
        async function setupLocalStream() { if (localStream) return localStream; try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); showNotification('الميكروفون جاهز'); return localStream; } catch { showNotification('تعذر الوصول إلى الميكروفون', 'danger'); throw err; } }
        function createPeerConnection() {
            const pc = new RTCPeerConnection(configuration);
            pc.addEventListener('track', event => {
                if (event.streams && event.streams[0]) {
                    if (remoteAudioElement) remoteAudioElement.remove();
                    remoteAudioElement = document.createElement('audio');
                    remoteAudioElement.srcObject = event.streams[0];
                    remoteAudioElement.autoplay = true; remoteAudioElement.style.display = 'none';
                    document.body.appendChild(remoteAudioElement);
                    callInfo.textContent = 'جاري التحدث...';
                }
            });
            pc.addEventListener('icecandidate', event => {
                if (!event.candidate || !currentRoom) return;
                const c = event.candidate.toJSON();
                if (callerCandidatesRef) push(callerCandidatesRef, c);
                else if (calleeCandidatesRef) push(calleeCandidatesRef, c);
            });
            pc.addEventListener('connectionstatechange', () => {
                if (pc.connectionState === 'connected') { callContainer.classList.add('active'); incomingPanel.classList.remove('active'); }
                else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed' || pc.connectionState === 'closed') endCall();
            });
            return pc;
        }
        async function startCall(targetUserId) {
            if (!currentRoom || !userId || pc) return showNotification('هناك مكالمة قائمة حالياً', 'warning');
            try {
                await setupLocalStream(); pc = createPeerConnection();
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                callerCandidatesRef = ref(db, `${callBasePath()}/callerCandidates`);
                calleeCandidatesRef = ref(db, `${callBasePath()}/calleeCandidates`);
                const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
                await set(ref(db, `${callBasePath()}/offer`), { type: offer.type, sdp: offer.sdp, from: userId, name: currentUser, targetId: targetUserId, ts: Date.now() });
                currentCallTarget = targetUserId;
                callInfo.textContent = `الاتصال بـ ${usersMap[targetUserId] || 'المستخدم'}...`;
                callContainer.classList.add('active'); callAvatar.innerHTML = '<i class="fas fa-phone"></i>';
                muteCallBtn.innerHTML = '<i class="fas fa-microphone"></i>'; incomingPanel.classList.remove('active');
                callTimeout = setTimeout(() => { if (pc && pc.connectionState !== 'connected') { endCall(); showNotification('لم يجب الطرف الآخر', 'danger'); } }, 30000);
            } catch (err) { console.error(err); showNotification('فشل بدء المكالمة', 'danger'); endCall(); }
        }
        async function acceptCall() {
            if (!incomingOffer || !currentRoom || !userId || pc) return showNotification('هناك مكالمة قائمة', 'warning');
            try {
                await setupLocalStream(); pc = createPeerConnection();
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                callerCandidatesRef = ref(db, `${callBasePath()}/callerCandidates`);
                calleeCandidatesRef = ref(db, `${callBasePath()}/calleeCandidates`);
                await pc.setRemoteDescription(new RTCSessionDescription({ type: incomingOffer.type, sdp: incomingOffer.sdp }));
                const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
                await set(ref(db, `${callBasePath()}/answer`), { type: answer.type, sdp: answer.sdp, from: userId, name: currentUser, ts: Date.now() });
                currentCallTarget = incomingOffer.from; callInfo.textContent = `تتحدث مع ${incomingOffer.name}`;
                callContainer.classList.add('active'); callAvatar.innerHTML = '<i class="fas fa-user"></i>';
                incomingPanel.classList.remove('active'); if (callTimeout) clearTimeout(callTimeout);
            } catch (err) { console.error(err); showNotification('فشل قبول المكالمة', 'danger'); endCall(); }
        }
        function endCall() {
            if (callTimeout) clearTimeout(callTimeout);
            if (pc) { pc.close(); pc = null; }
            if (currentRoom) {
                remove(ref(db, `${callBasePath()}/offer`)); remove(ref(db, `${callBasePath()}/answer`));
                remove(ref(db, `${callBasePath()}/callerCandidates`)); remove(ref(db, `${callBasePath()}/calleeCandidates`));
            }
            callerCandidatesRef = calleeCandidatesRef = null; currentCallTarget = incomingOffer = null;
            callContainer.classList.remove('active'); incomingPanel.classList.remove('active');
            callInfo.textContent = '...';
            if (remoteAudioElement) { remoteAudioElement.remove(); remoteAudioElement = null; }
            if (firebaseListeners.offer) off(ref(db, `${callBasePath()}/offer`), firebaseListeners.offer);
            if (firebaseListeners.answer) off(ref(db, `${callBasePath()}/answer`), firebaseListeners.answer);
            if (firebaseListeners.callerCandidates) off(ref(db, `${callBasePath()}/callerCandidates`), firebaseListeners.callerCandidates);
            if (firebaseListeners.calleeCandidates) off(ref(db, `${callBasePath()}/calleeCandidates`), firebaseListeners.calleeCandidates);
            firebaseListeners.offer = firebaseListeners.answer = firebaseListeners.callerCandidates = firebaseListeners.calleeCandidates = null;
        }
        function toggleMute() {
            if (!localStream) return;
            const track = localStream.getAudioTracks()[0];
            if (track) { track.enabled = !track.enabled; muteCallBtn.innerHTML = track.enabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>'; }
        }
        function listenForCalls() {
            if (!currentRoom) return;
            if (firebaseListeners.offer) off(ref(db, `${callBasePath()}/offer`), firebaseListeners.offer);
            firebaseListeners.offer = onValue(ref(db, `${callBasePath()}/offer`), (snap) => {
                const offer = snap.val();
                if (!offer) { incomingPanel.classList.remove('active'); try { ring.pause(); ring.currentTime = 0; } catch(e){} return; }
                if (offer.from === userId) return; if (offer.targetId && offer.targetId !== userId) return;
                incomingOffer = offer; incomingCallerName.textContent = offer.name || 'مستخدم';
                incomingPanel.classList.add('active'); ring.play().catch(()=>{});
            });
            if (firebaseListeners.answer) off(ref(db, `${callBasePath()}/answer`), firebaseListeners.answer);
            firebaseListeners.answer = onValue(ref(db, `${callBasePath()}/answer`), async (snap) => {
                const answer = snap.val(); if (!answer || !pc) return; if (answer.from === userId) return;
                if (pc.signalingState === 'have-local-offer') {
                    try { await pc.setRemoteDescription(new RTCSessionDescription(answer)); if (callTimeout) clearTimeout(callTimeout); callInfo.textContent = `تتحدث مع ${answer.name}`; }
                    catch (e) { console.error(e); }
                }
            });
            if (firebaseListeners.callerCandidates) off(ref(db, `${callBasePath()}/callerCandidates`), firebaseListeners.callerCandidates);
            firebaseListeners.callerCandidates = onChildAdded(ref(db, `${callBasePath()}/callerCandidates`), (snap) => {
                const candidate = snap.val(); if (!pc || snap.key === userId) return; pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.log);
            });
            if (firebaseListeners.calleeCandidates) off(ref(db, `${callBasePath()}/calleeCandidates`), firebaseListeners.calleeCandidates);
            firebaseListeners.calleeCandidates = onChildAdded(ref(db, `${callBasePath()}/calleeCandidates`), (snap) => {
                const candidate = snap.val(); if (!pc || snap.key === userId) return; pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.log);
            });
        }
        listenForCalls();

        callUserBtn.addEventListener('click', () => {
            if (!currentRoom) return;
            usersPopup.classList.toggle('show'); popupOverlay.classList.toggle('show');
            // لاختيار مستخدم من القائمة والاتصال به
        });
        popupUsersList.addEventListener('click', (e) => {
            const item = e.target.closest('.user-item'); if (!item) return;
            const uname = item.querySelector('.user-name').textContent;
            const tid = Object.keys(usersMap).find(id => (usersMap[id] === ADMIN_LOGIN ? ADMIN_DISPLAY : usersMap[id]) === uname);
            if (tid && tid !== userId) { usersPopup.classList.remove('show'); popupOverlay.classList.remove('active'); startCall(tid); }
        });
        acceptIncoming.addEventListener('click', acceptCall);
        rejectIncoming.addEventListener('click', () => {
            incomingPanel.classList.remove('active'); try { ring.pause(); ring.currentTime = 0; } catch(e){}
            incomingOffer = null;
        });
        muteCallBtn.addEventListener('click', toggleMute);
        endCallBtn.addEventListener('click', endCall);

        // ==================== تنظيف عند الإغلاق ====================
        window.addEventListener('beforeunload', () => {
            if (currentRoom && userId) {
                remove(ref(db, `rooms/${currentRoom}/users/${userId}`));
                remove(ref(db, `rooms/${currentRoom}/typing/${userId}`));
            }
        });
    </script>
</body>
</html>
