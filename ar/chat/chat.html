<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسهل حل | الدردشة</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FFmpeg (لتحويل الفيديو) -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px 40px 0 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .top-bar {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid #e0e7ff;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-weight: 800;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4361ee;
        }

        .menu-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: #f0f3ff;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 250px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 20px 0;
            border-radius: 30px 0 0 30px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px 16px;
            border-bottom: 2px solid #e0e7ff;
        }

        .close-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #4361ee;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 12px;
            margin-top: 16px;
        }

        .sidebar-nav a {
            background: transparent;
            border: none;
            color: #2b2d42;
            padding: 10px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .sidebar-nav a:hover {
            background: rgba(67, 97, 238, 0.05);
            color: #4361ee;
            border-color: #6c7ffa;
        }

        .sidebar-nav a i {
            font-size: 1.1rem;
            color: #4361ee;
        }

        .sidebar-nav a.active {
            background: rgba(67, 97, 238, 0.1);
            color: #4361ee;
            border-color: #6c7ffa;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .chat-header {
            background: linear-gradient(135deg, #4361ee, #3a56d4);
            color: white;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-radius: 36px 36px 12px 12px;
            margin: 6px 8px 6px 8px;
            gap: 6px;
        }

        .header-info h2 {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-count {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 30px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .user-badge {
            background: rgba(255,255,255,0.15);
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .action-btn.secondary {
            background: white;
            color: #4361ee;
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .messages-container {
            flex: 1;
            margin: 0 8px 8px;
            padding: 12px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.9);
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 20px 20px 20px 6px;
            align-self: flex-start;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            word-break: break-word;
            font-size: 0.9rem;
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, #4361ee, #3a56d4);
            color: white;
            border-radius: 20px 20px 6px 20px;
        }

        .message.system {
            align-self: center;
            background: rgba(141,153,174,0.7);
            color: white;
            border-radius: 30px;
            font-size: 0.75rem;
            padding: 3px 16px;
        }

        .message .username {
            font-size: 0.65rem;
            font-weight: 700;
            margin-bottom: 2px;
            color: #3a56d4;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.8;
        }

        .message.own .username {
            color: rgba(255,255,255,0.9);
        }

        .message .time {
            font-size: 0.5rem;
            opacity: 0.6;
            margin-top: 2px;
            text-align: left;
        }

        .message-image {
            max-width: 100%;
            max-height: 120px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 4px;
            border: 2px solid white;
        }

        .typing-indicator {
            font-size: 0.75rem;
            color: #8d99ae;
            padding: 4px 12px;
            background: rgba(255,255,255,0.8);
            border-radius: 30px;
            align-self: flex-start;
            display: none;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .input-area {
            display: flex;
            gap: 4px;
            align-items: center;
            background: white;
            border-radius: 50px;
            padding: 4px 4px 4px 12px;
            margin: 0 8px 12px;
            border: 1px solid #e0e7ff;
        }

        .input-area textarea {
            flex: 1;
            border: none;
            padding: 8px 0;
            background: transparent;
            font-size: 0.9rem;
            resize: none;
            max-height: 60px;
            min-height: 20px;
        }

        .input-area textarea:focus {
            outline: none;
        }

        .input-area .action-btn {
            width: 40px;
            height: 40px;
            background: #4361ee;
            color: white;
            border: none;
            font-size: 1.1rem;
        }

        .input-area .action-btn.secondary {
            background: #f8f9fa;
            color: #2b2d42;
        }

        .media-popup {
            position: absolute;
            bottom: 70px;
            left: 10px;
            background: white;
            border-radius: 40px;
            padding: 8px;
            display: flex;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid #dee2e6;
            display: none;
            z-index: 100;
        }

        .media-popup.show {
            display: flex;
        }

        .media-popup .action-btn {
            width: auto;
            height: auto;
            padding: 6px 12px;
            border-radius: 30px;
            background: #4361ee;
            color: white;
            gap: 4px;
            font-size: 0.8rem;
        }

        #emoji-panel {
            bottom: 120px;
            flex-wrap: wrap;
            width: 240px;
            gap: 4px;
            justify-content: center;
        }

        .emoji-btn {
            font-size: 1.6rem;
            padding: 4px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .emoji-btn:hover {
            transform: scale(1.2);
        }

        .voice-recording-bar {
            display: none;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 6px 12px;
            border-radius: 40px;
            margin: 0 8px 8px;
            border: 2px solid #4361ee;
        }

        .voice-recording-bar.active {
            display: flex;
        }

        .voice-timer {
            font-size: 1rem;
            font-weight: 700;
            color: #ef476f;
            direction: ltr;
        }

        .voice-visualizer {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 2px;
            height: 24px;
        }

        .voice-bar {
            width: 3px;
            background: #4361ee;
            border-radius: 2px;
            transition: height 0.1s;
        }

        .users-popup {
            position: absolute;
            top: 60px;
            left: 10px;
            right: 10px;
            background: white;
            border-radius: 30px;
            padding: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            z-index: 2000;
            display: none;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
        }

        .users-popup.show {
            display: block;
        }

        .users-popup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #e0e7ff;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .users-popup-header h4 {
            color: #4361ee;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .close-popup-btn {
            background: #f8f9fa;
            border: none;
            color: #4361ee;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px;
            border-bottom: 1px solid #e0e7ff;
            cursor: pointer;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4361ee, #06d6a0);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .user-name {
            flex: 1;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .online-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #06d6a0;
            box-shadow: 0 0 6px #06d6a0;
        }

        .call-container {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .call-container.active {
            display: flex;
        }

        .call-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4361ee, #06d6a0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 12px;
            border: 3px solid white;
        }

        .call-info {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .call-actions {
            display: flex;
            gap: 15px;
        }

        .call-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ef476f;
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .call-btn.answer {
            background: #06d6a0;
        }

        .incoming-panel {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 10001;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            border: 2px solid #4361ee;
            width: 90%;
            max-width: 280px;
        }

        .incoming-panel.active {
            display: flex;
        }

        .caller-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #4361ee;
        }

        .incoming-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-success {
            background: #06d6a0;
            color: white;
        }

        .btn-danger {
            background: #ef476f;
            color: white;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b2d42;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 9999;
            display: none;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
        }

        .loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }

        .loader.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #4361ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 1rem;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 30px;
        }

        #ring {
            display: none;
        }

        #upload-progress {
            display: none;
            padding: 6px;
            background: white;
            border-radius: 40px;
            margin: 0 8px 8px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        .progress-indeterminate {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-indeterminate .spinner {
            width: 16px;
            height: 16px;
            border-width: 3px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <!-- مؤشر التحميل -->
    <div class="loader" id="loader"><div class="spinner"></div><div class="loader-text">جاري التحميل...</div></div>
    <!-- الإشعارات -->
    <div class="toast" id="toast"></div>

    <div class="app-container">
        <!-- الشريط العلوي -->
        <div class="top-bar">
            <div class="brand"><i class="fas fa-comments"></i> اسهل حل</div>
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        </div>

        <!-- القائمة الجانبية -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="brand">اسهل حل</span>
                <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
            </div>
            <div class="sidebar-nav">
                <a href="welcome.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> دخول</a>
                <a href="chat.html" class="active"><i class="fas fa-comment"></i> الدردشة</a>
                <a href="room-info.html"><i class="fas fa-door-open"></i> الغرفة</a>
                <a href="help.html"><i class="fas fa-question-circle"></i> مساعدة</a>
                <a href="about.html"><i class="fas fa-info-circle"></i> حول</a>
                <a href="privacy.html"><i class="fas fa-lock"></i> خصوصية</a>
                <a href="terms.html"><i class="fas fa-file-alt"></i> شروط</a>
            </div>
        </div>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- رأس الدردشة -->
        <div class="chat-header">
            <div class="header-info">
                <h2><i class="fas fa-comment"></i> <span id="room-name-display">غرفة</span> <span class="user-count" id="user-count">(0)</span></h2>
            </div>
            <div class="user-info">
                <span class="user-badge" id="user-status"><i class="fas fa-user"></i> <span id="current-user-name"></span></span>
                <button class="action-btn secondary" id="toggle-users-btn" title="المتصلون"><i class="fas fa-users"></i></button>
                <button class="action-btn secondary" id="call-user-btn" title="اتصال صوتي"><i class="fas fa-phone"></i></button>
                <button class="action-btn secondary" id="copy-room-btn" title="نسخ رقم الغرفة"><i class="fas fa-copy"></i></button>
                <button class="action-btn secondary" id="share-room-btn" title="مشاركة"><i class="fas fa-share-alt"></i></button>
                <button class="action-btn secondary" id="leave-room-btn" style="background:#ef476f;color:white" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <!-- قائمة المستخدمين المنبثقة -->
        <div class="users-popup" id="users-popup">
            <div class="users-popup-header">
                <h4><i class="fas fa-users"></i> المتصلون الآن</h4>
                <button class="close-popup-btn" id="close-popup-btn"><i class="fas fa-times"></i></button>
            </div>
            <div id="popup-users-list"></div>
        </div>
        <div class="sidebar-overlay" id="popup-overlay"></div>

        <!-- منطقة الرسائل -->
        <div class="messages-container" id="messages-container">
            <div class="typing-indicator" id="typing-indicator"></div>
        </div>

        <!-- شريط تقدم رفع الملفات -->
        <div id="upload-progress">
            <div class="progress-text"><span id="progress-message">جاري الرفع...</span><span id="progress-percent"></span></div>
            <div class="progress-indeterminate" id="progress-indicator"><div class="spinner"></div><span>معالجة...</span></div>
        </div>

        <!-- شريط التسجيل الصوتي -->
        <div class="voice-recording-bar" id="voice-recording-bar">
            <span class="voice-timer" id="voice-timer">00:00</span>
            <div class="voice-visualizer" id="voice-visualizer"></div>
            <button class="action-btn" style="background:#ef476f" id="stop-recording-btn"><i class="fas fa-stop"></i></button>
            <button class="action-btn" style="background:#06d6a0" id="send-voice-btn"><i class="fas fa-paper-plane"></i></button>
        </div>

        <!-- منطقة الإدخال -->
        <div class="input-area">
            <textarea id="message-input" placeholder="اكتب رسالتك..." rows="1"></textarea>
            <button class="action-btn secondary" id="emoji-btn"><i class="far fa-smile"></i></button>
            <button class="action-btn secondary" id="media-btn"><i class="fas fa-paperclip"></i></button>
            <!-- قائمة الوسائط -->
            <div class="media-popup" id="media-popup">
                <button class="action-btn" id="attach-btn"><i class="fas fa-cloud-upload-alt"></i> رفع</button>
                <button class="action-btn" id="camera-btn"><i class="fas fa-camera"></i> كاميرا</button>
                <button class="action-btn" id="voice-record-btn"><i class="fas fa-microphone"></i> تسجيل</button>
            </div>
            <!-- لوحة الإيموجي -->
            <div class="media-popup" id="emoji-panel">
                <button class="emoji-btn">😊</button><button class="emoji-btn">😂</button><button class="emoji-btn">❤️</button>
                <button class="emoji-btn">👍</button><button class="emoji-btn">🔥</button><button class="emoji-btn">🎉</button>
                <button class="emoji-btn">😢</button><button class="emoji-btn">😡</button><button class="emoji-btn">👋</button>
                <button class="emoji-btn">🤔</button><button class="emoji-btn">😎</button><button class="emoji-btn">🥳</button>
            </div>
            <button class="action-btn" id="send-message-btn"><i class="fas fa-paper-plane"></i></button>
        </div>

        <!-- مدخلات الملفات المخفية -->

        // ========== دوال مساعدة ==========

        // ========== إدارة المستخدمين المباشرين ==========

            userCountSpan.textContent = `(${Object.keys(usersMap).length})`;

        // تسجيل هذا المستخدم

        onDisconnect(ref(db, `rooms/${currentRoom}/typing/${userId}`)).remove();

        // ========== الرسائل ==========
        messagesRef = ref(db, `rooms/${currentRoom}/messages`);
        onChildAdded(query(messagesRef, orderByKey(), limitToLast(MAX_MSGS)), (snap) => {
            const msg = snap.val(); if (!msg) return;
            const keyTs = parseInt(snap.key.split('_')[0]);
            const now = Date.now();
            if (keyTs && keyTs < now - ONE_HOUR) {
                remove(ref(db, `rooms/${currentRoom}/messages/${snap.key}`));
                return;
            }
            if (displayedMessages.has(snap.key)) return;
            displayedMessages.add(snap.key);
            const div = document.createElement('div');
            div.className = `message ${(msg.sender === (currentUser===ADMIN_DISPLAY?ADMIN_LOGIN:currentUser)) && msg.sender !== 'نظام' ? 'own' : ''} ${msg.sender === 'نظام' ? 'system' : ''}`;
            if (msg.sender !== 'نظام') {
                const ns = document.createElement('div'); ns.className = 'username';
                ns.textContent = msg.sender === ADMIN_LOGIN ? ADMIN_DISPLAY : msg.sender;
                if (msg.sender === ADMIN_LOGIN) ns.innerHTML += '<i class="fas fa-crown" style="font-size:0.6rem;color:#fbbf24;"></i>';
                div.appendChild(ns);
            }
            if (msg.type === 'image') {
                const img = document.createElement('img'); img.src = msg.text; img.className = 'message-image';
                img.onclick = () => window.open(msg.text);
                div.appendChild(img);
            } else if (msg.type === 'video') {
                const vid = document.createElement('video'); vid.src = msg.text; vid.controls = true; vid.className = 'message-image';
                vid.onclick = () => window.open(msg.text);
                div.appendChild(vid);
            } else if (msg.type === 'audio') {
                div.innerHTML = `<div style="display:flex;align-items:center;gap:6px"><button class="audio-play-btn" data-audio="${msg.text}" style="width:30px;height:30px;border-radius:50%;background:#4361ee;color:white;border:none"><i class="fas fa-play"></i></button><div style="flex:1;height:4px;background:rgba(0,0,0,0.1);border-radius:2px"><div class="audio-progress" style="width:0%;height:100%;background:#4361ee;border-radius:2px"></div></div><span class="audio-duration" style="font-size:0.7rem">00:00</span></div>`;
                const btn = div.querySelector('.audio-play-btn');
                const prog = div.querySelector('.audio-progress');
                const dur = div.querySelector('.audio-duration');
                const audioSrc = btn.dataset.audio;
                let audio = window.audioPlayers.get(audioSrc);
                if (!audio) { audio = new Audio(audioSrc); window.audioPlayers.set(audioSrc, audio); }
                btn.onclick = () => {
                    if (audio.paused) {
                        window.audioPlayers.forEach(a => a.pause());
                        audio.play();
                        btn.innerHTML = '<i class="fas fa-pause"></i>';
                    } else {
                        audio.pause();
                        btn.innerHTML = '<i class="fas fa-play"></i>';
                    }
                };
                audio.ontimeupdate = () => {
                    prog.style.width = (audio.currentTime / audio.duration) * 100 + '%';
                    dur.textContent = new Date(audio.currentTime * 1000).toISOString().substr(14,5);
                };
                audio.onended = () => { btn.innerHTML = '<i class="fas fa-play"></i>'; prog.style.width = '0%'; };
            } else {
                div.appendChild(document.createTextNode(msg.text));
            }
            const ts = document.createElement('div'); ts.className = 'time';
            ts.textContent = new Date(msg.timestamp).toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });

        // إرسال رسالة نصية
        sendBtn.addEventListener('click', async () => {

                sender: currentUser === ADMIN_DISPLAY ? ADMIN_LOGIN : currentUser,

            });

        });

        // ========== مؤشر الكتابة ==========
        let typingTimeout;
        messageInput.addEventListener('input', () => {
            if (messageInput.value.trim()) {
                set(ref(db, `rooms/${currentRoom}/typing/${userId}`), true);

                set(ref(db, `rooms/${currentRoom}/typing/${userId}`), false);

        onValue(ref(db, `rooms/${currentRoom}/typing`), (snap) => {

        // ========== رفع الملفات إلى GitHub ==========
        async function getGitHubToken() {
            const snap = await get(ref(db, GITHUB_TOKEN_PATH));
            if (!snap.exists()) throw new Error('لم يتم العثور على التوكن');
            return snap.val();
        }
        async function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const maxSize = 1920;
                        if (width > maxSize || height > maxSize) {
                            if (width > height) { height = Math.round((height * maxSize) / width); width = maxSize; }
                            else { width = Math.round((width * maxSize) / height); height = maxSize; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            if (blob) resolve(new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }));
                            else reject(new Error('فشل ضغط الصورة'));
                        }, 'image/jpeg', 0.8);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        function sanitizeFolderName(name) {
            if (name === ADMIN_LOGIN) return ADMIN_DISPLAY;
            return name.replace(/[^a-zA-Z0-9\u0600-\u06FF\s\-_]/g, '').trim().replace(/\s+/g, '_');
        }
        async function uploadToGitHub(file, fileName, fileType) {
            const token = await getGitHubToken();
            let typeFolder = { image: 'صور', video: 'فيديو', audio: 'تسجيل_صوتي' }[fileType] || 'اخرى';
            const githubPath = `chat/${typeFolder}/${sanitizeFolderName(currentRoom)}/${sanitizeFolderName(currentUser)}/${fileName}`;
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${githubPath}`, {
                            method: 'PUT',
                            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `رفع ${fileType} من ${currentUser} في غرفة ${currentRoom}`, content: e.target.result.split(',')[1], branch: 'main' })
                        });
                        if (!response.ok) { const err = await response.json(); throw new Error(err.message); }
                        resolve(`https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/${githubPath}`);
                    } catch (err) { reject(new Error('فشل الرفع')); }
                }; reader.onerror = () => reject(new Error('فشل قراءة الملف')); reader.readAsDataURL(file);
            });
        }
        async function handleFileUpload(file, type) {
            if (!currentRoom) return;
            try {
                uploadProgress.style.display = 'block'; progressIndicator.style.display = 'flex';
                progressPercent.textContent = ''; progressMessage.textContent = `جاري رفع ${type}...`;
                if (type === 'image') { try { file = await compressImage(file); } catch (e) {} }
                const fname = Date.now() + '_' + Math.random().toString(36).substring(2,8) + '.' + (file.name.split('.').pop() || (type==='image'?'jpg':type==='video'?'mp4':'webm'));
                const url = await uploadToGitHub(file, fname, type);
                uploadProgress.style.display = 'none';
                const msgKey = `${Date.now()}_${userId}`;
                await set(ref(db, `rooms/${currentRoom}/messages/${msgKey}`), {
                    sender: currentUser === ADMIN_DISPLAY ? ADMIN_LOGIN : currentUser,
                    text: url, type, timestamp: Date.now()
                });
                showNotification('تم الإرسال');
            } catch (e) { uploadProgress.style.display = 'none'; showNotification(e.toString(), 'danger'); }
        }
        attachBtn.addEventListener('click', () => { fileInput.click(); mediaPopup.classList.remove('show'); });
        cameraBtn.addEventListener('click', () => { cameraInput.click(); mediaPopup.classList.remove('show'); });
        fileInput.addEventListener('change', (e) => {
            const f = e.target.files[0]; if (!f) return;
            if (f.type.startsWith('image/')) handleFileUpload(f, 'image');
            else if (f.type.startsWith('video/')) handleFileUpload(f, 'video');
            else showNotification('نوع غير مدعوم', 'danger');
            fileInput.value = '';
        });
        cameraInput.addEventListener('change', (e) => {

            cameraInput.value = '';
        });

        // ========== تسجيل صوتي ==========
        voiceRecordBtn.addEventListener('click', async () => {
            mediaPopup.classList.remove('show');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const audioFile = new File([audioBlob], 'audio_'+Date.now()+'.webm', { type: 'audio/webm' });
                        handleFileUpload(audioFile, 'audio');
                        audioChunks = [];
                    }
                    stream.getTracks().forEach(t => t.stop());
                };
                audioContext = new AudioContext(); analyser = audioContext.createAnalyser(); analyser.fftSize = 32;
                audioContext.createMediaStreamSource(stream).connect(analyser);
                voiceVisualizer.innerHTML = ''; for (let i=0; i<16; i++) voiceVisualizer.innerHTML += '<div class="voice-bar"></div>';
                mediaRecorder.start(); recordingStartTime = Date.now();
                recordingTimer = setInterval(() => {
                    let e = Math.floor((Date.now()-recordingStartTime)/1000);
                    voiceTimer.textContent = `${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;
                },1000);
                voiceBar.classList.add('active');
                const updateVis = () => {
                    if (!analyser || !voiceBar.classList.contains('active')) return;
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(data);
                    voiceVisualizer.querySelectorAll('.voice-bar').forEach((b,i) => { b.style.height = (10 + (data[i]/255)*20) + 'px'; });
                    visualizerAnimation = requestAnimationFrame(updateVis);
                };
                updateVis();
                showNotification('بدأ التسجيل');
            } catch { showNotification('تعذر الوصول إلى الميكروفون', 'danger'); }
        });
        stopRecordingBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                clearInterval(recordingTimer);
                audioContext?.close();
                if (visualizerAnimation) cancelAnimationFrame(visualizerAnimation);
                voiceBar.classList.remove('active');
            }
        });
        sendVoiceBtn.addEventListener('click', () => { stopRecordingBtn.click(); });

        // ========== إيموجي ==========
        emojiBtn.addEventListener('click', (e) => { e.stopPropagation(); emojiPanel.classList.toggle('show'); });

        // ========== قائمة المستخدمين ==========

        // ========== أزرار النسخ والمشاركة والخروج ==========

            else { navigator.clipboard.writeText(shareUrl); showNotification('تم نسخ رابط الدعوة'); }
        });
        leaveBtn.addEventListener('click', () => {
            if (confirm('هل أنت متأكد من الخروج من الغرفة؟')) {
                remove(ref(db, `rooms/${currentRoom}/users/${userId}`));
                remove(ref(db, `rooms/${currentRoom}/typing/${userId}`));
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        });

        // ========== WebRTC (مكالمات صوتية) ==========
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        async function setupLocalStream() {
            if (localStream) return localStream;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                return localStream;
            } catch { showNotification('تعذر الوصول إلى الميكروفون', 'danger'); throw new Error(); }
        }
        function createPeerConnection() {
            const pc = new RTCPeerConnection(configuration);
            pc.addEventListener('track', event => {
                if (event.streams[0]) {
                    if (remoteAudioElement) remoteAudioElement.remove();
                    remoteAudioElement = document.createElement('audio');
                    remoteAudioElement.srcObject = event.streams[0];
                    remoteAudioElement.autoplay = true;
                    remoteAudioElement.style.display = 'none';
                    document.body.appendChild(remoteAudioElement);
                    callInfo.textContent = 'جاري التحدث...';
                }
            });
            pc.addEventListener('icecandidate', event => {
                if (!event.candidate) return;
                const c = event.candidate.toJSON();
                if (callerCandidatesRef) push(callerCandidatesRef, c);
                else if (calleeCandidatesRef) push(calleeCandidatesRef, c);
            });
            pc.addEventListener('connectionstatechange', () => {
                if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') endCall();
            });
            return pc;
        }
        async function startCall(targetUserId) {
            if (pc) { showNotification('هناك مكالمة قائمة', 'warning'); return; }
            try {
                await setupLocalStream();
                pc = createPeerConnection();
                localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
                callerCandidatesRef = ref(db, `calls/${currentRoom}/callerCandidates`);
                calleeCandidatesRef = ref(db, `calls/${currentRoom}/calleeCandidates`);
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                await set(ref(db, `calls/${currentRoom}/offer`), { type: offer.type, sdp: offer.sdp, from: userId, name: currentUser, targetId: targetUserId, ts: Date.now() });
                callInfo.textContent = `الاتصال بـ ${usersMap[targetUserId] || 'المستخدم'}...`;
                callContainer.classList.add('active');
                callTimeout = setTimeout(() => { if (pc && pc.connectionState !== 'connected') { endCall(); showNotification('لم يجب الطرف الآخر', 'danger'); } }, 30000);
            } catch { showNotification('فشل بدء المكالمة', 'danger'); endCall(); }
        }
        async function acceptCall() {
            if (!incomingOffer || pc) return;
            try {
                await setupLocalStream();
                pc = createPeerConnection();
                localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
                callerCandidatesRef = ref(db, `calls/${currentRoom}/callerCandidates`);
                calleeCandidatesRef = ref(db, `calls/${currentRoom}/calleeCandidates`);
                await pc.setRemoteDescription(new RTCSessionDescription(incomingOffer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await set(ref(db, `calls/${currentRoom}/answer`), { type: answer.type, sdp: answer.sdp, from: userId, name: currentUser, ts: Date.now() });
                callInfo.textContent = `تتحدث مع ${incomingOffer.name}`;
                callContainer.classList.add('active');
                incomingPanel.classList.remove('active');
                if (callTimeout) clearTimeout(callTimeout);
            } catch { showNotification('فشل قبول المكالمة', 'danger'); endCall(); }
        }
        function endCall() {
            if (callTimeout) clearTimeout(callTimeout);
            if (pc) { pc.close(); pc = null; }
            if (currentRoom) {
                remove(ref(db, `calls/${currentRoom}/offer`));
                remove(ref(db, `calls/${currentRoom}/answer`));
                remove(ref(db, `calls/${currentRoom}/callerCandidates`));
                remove(ref(db, `calls/${currentRoom}/calleeCandidates`));
            }
            callerCandidatesRef = calleeCandidatesRef = null;
            incomingOffer = null;
            callContainer.classList.remove('active');
            incomingPanel.classList.remove('active');
            if (remoteAudioElement) { remoteAudioElement.remove(); remoteAudioElement = null; }
        }
        function toggleMute() {
            if (!localStream) return;
            const track = localStream.getAudioTracks()[0];
            if (track) {
                track.enabled = !track.enabled;
                muteCallBtn.innerHTML = track.enabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
            }
        }
        function listenForCalls() {
            onValue(ref(db, `calls/${currentRoom}/offer`), (snap) => {
                const offer = snap.val();
                if (!offer) { incomingPanel.classList.remove('active'); ring.pause(); return; }
                if (offer.from === userId) return;
                if (offer.targetId && offer.targetId !== userId) return;
                incomingOffer = offer;
                incomingCallerName.textContent = offer.name || 'مستخدم';
                incomingPanel.classList.add('active');
                ring.play().catch(()=>{});
            });
            onValue(ref(db, `calls/${currentRoom}/answer`), async (snap) => {
                const answer = snap.val();
                if (!answer || !pc) return;
                if (answer.from === userId) return;
                if (pc.signalingState === 'have-local-offer') {
                    try { await pc.setRemoteDescription(new RTCSessionDescription(answer)); if (callTimeout) clearTimeout(callTimeout); callInfo.textContent = `تتحدث مع ${answer.name}`; } catch {}
                }
            });
            onChildAdded(ref(db, `calls/${currentRoom}/callerCandidates`), (snap) => {
                const cand = snap.val(); if (!pc || snap.key === userId) return; pc.addIceCandidate(new RTCIceCandidate(cand)).catch(()=>{});
            });
            onChildAdded(ref(db, `calls/${currentRoom}/calleeCandidates`), (snap) => {
                const cand = snap.val(); if (!pc || snap.key === userId) return; pc.addIceCandidate(new RTCIceCandidate(cand)).catch(()=>{});
            });
        }
        listenForCalls();

        callUserBtn.addEventListener('click', () => { usersPopup.classList.toggle('show'); popupOverlay.classList.toggle('active'); });
        popupUsersList.addEventListener('click', (e) => {
            const item = e.target.closest('.user-item');
            if (!item) return;
            const targetId = item.dataset.id;
            if (targetId && targetId !== userId) {
                usersPopup.classList.remove('show');
                popupOverlay.classList.remove('active');
                startCall(targetId);
            }
        });
        acceptIncoming.addEventListener('click', acceptCall);
        rejectIncoming.addEventListener('click', () => {
            incomingPanel.classList.remove('active');
            ring.pause();
            incomingOffer = null;
        });
        muteCallBtn.addEventListener('click', toggleMute);
        endCallBtn.addEventListener('click', endCall);

        // تنظيف عند إغلاق الصفحة
        window.addEventListener('beforeunload', () => {
            remove(ref(db, `rooms/${currentRoom}/users/${userId}`));
            remove(ref(db, `rooms/${currentRoom}/typing/${userId}`));
        });
    </script>
</body>
</html>
