<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسهل حل | الدردشة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; height: 100vh; overflow: hidden; }
        #app { max-width: 500px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; background: white; }
        header { background: #4361ee; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #f8f9fa; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 18px; background: white; align-self: flex-start; word-wrap: break-word; }
        .message.own { background: #4361ee; color: white; align-self: flex-end; }
        .message .sender { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; opacity: 0.8; }
        .message .time { font-size: 0.6rem; text-align: left; margin-top: 4px; opacity: 0.6; }
        .input-area { display: flex; gap: 8px; padding: 10px; background: white; border-top: 1px solid #ddd; }
        #message-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; font-size: 14px; }
        #send-btn { background: #4361ee; color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        #loader {
            display: flex;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 20000;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top-color: #4361ee; border-radius: 50%; animation: spin 1s linear infinite; }
        .loader-text { color: white; margin-top: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #exit-btn { background: #ef476f; color: white; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loader-text">جاري التحميل...</div>
    </div>

    <div id="app">
        <header>
            <div><i class="fas fa-comment"></i> <span id="room-name">غرفة</span> (<span id="user-count">0</span>)</div>
            <div>
                <i class="fas fa-user"></i> <span id="current-user"></span>
                <button id="exit-btn"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="اكتب رسالتك...">
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onChildAdded, onChildRemoved, onDisconnect, get, query, limitToLast, orderByChild } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAG4EKrB3iLEV2hsB8b08ShpSO6PXDnGjg",
            authDomain: "zio3-8ffdd.firebaseapp.com",
            databaseURL: "https://zio3-8ffdd-default-rtdb.firebaseio.com",
            projectId: "zio3-8ffdd",
            storageBucket: "zio3-8ffdd.firebasestorage.app",
            messagingSenderId: "560939348415",
            appId: "1:560939348415:web:c854e9e214e498ad2d310a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // جلب المعاملات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room');
        const userName = urlParams.get('user');

        if (!roomCode || !userName) {
            alert('خطأ: بيانات الغرفة غير موجودة');
            window.location.href = 'index.html';
        }

        // عناصر الصفحة
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const roomNameSpan = document.getElementById('room-name');
        const currentUserSpan = document.getElementById('current-user');
        const userCountSpan = document.getElementById('user-count');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const exitBtn = document.getElementById('exit-btn');

        // متغيرات الحالة
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);
        let users = {}; // { userId: userName }

        // دوال التحكم في loader
        function showLoading(text) {
            loaderText.textContent = text;
            loader.style.display = 'flex';
        }
        function hideLoading() {
            loader.style.display = 'none';
        }

        // تأمين: إخفاء loader بعد 7 ثواني
        setTimeout(hideLoading, 7000);

        // تحديث عدد المستخدمين في الشاشة
        function updateUserCount() {
            userCountSpan.textContent = Object.keys(users).length;
        }

        // الاستماع لإضافات وإزالات المستخدمين
        function setupUsersListener() {
            const usersRef = ref(db, `rooms/${roomCode}/users`);
            onChildAdded(usersRef, (snap) => {
                const userData = snap.val();
                users[snap.key] = userData.name || userData;
                updateUserCount();
            });
            onChildRemoved(usersRef, (snap) => {
                delete users[snap.key];
                updateUserCount();
            });
        }

        // عرض رسالة واحدة
        function displayMessage(msg, isOwn) {
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            div.innerHTML = `
                <div class="sender">${msg.sender}</div>
                <div>${msg.text}</div>
                <div class="time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // تحميل الرسائل القديمة (آخر 20)
        async function loadOldMessages() {
            const messagesRef = ref(db, `rooms/${roomCode}/messages`);
            const snapshot = await get(query(messagesRef, orderByChild('timestamp'), limitToLast(20)));
            if (snapshot.exists()) {
                const msgs = snapshot.val();
                const sorted = Object.values(msgs).sort((a, b) => a.timestamp - b.timestamp);
                sorted.forEach(msg => displayMessage(msg, msg.sender === userName));
            }
        }

        // الاستماع للرسائل الجديدة
        function setupMessagesListener() {
            const messagesRef = ref(db, `rooms/${roomCode}/messages`);
            onChildAdded(messagesRef, (snap) => {
                const msg = snap.val();
                // تجاهل الرسائل القديمة جداً (يمكن إضافة شرط زمني)
                displayMessage(msg, msg.sender === userName);
            });
        }

        // إرسال رسالة
        async function sendMessage(text) {
            if (!text.trim()) return;
            const messagesRef = ref(db, `rooms/${roomCode}/messages`);
            await push(messagesRef, {
                sender: userName,
                text: text,
                timestamp: Date.now()
            });
            messageInput.value = '';
        }

        // الخروج من الغرفة
        async function leaveRoom() {
            // حذف المستخدم من قائمة المتصلين
            const userRef = ref(db, `rooms/${roomCode}/users/${userId}`);
            await set(userRef, null); // حذف
            // العودة إلى الصفحة الرئيسية
            window.location.href = 'index.html';
        }

        // الدخول إلى الغرفة
        async function enterRoom() {
            showLoading('جاري الدخول...');
            try {
                // تحديث عناوين الصفحة
                roomNameSpan.textContent = `غرفة ${roomCode}`;
                currentUserSpan.textContent = userName;

                // إضافة المستخدم الحالي إلى قائمة المتصلين
                const userRef = ref(db, `rooms/${roomCode}/users/${userId}`);
                await set(userRef, { name: userName, joinedAt: Date.now() });
                onDisconnect(userRef).remove(); // حذف عند قطع الاتصال

                // إعداد مستمعي المستخدمين
                setupUsersListener();

                // تحميل الرسائل القديمة
                await loadOldMessages();

                // الاستماع للرسائل الجديدة
                setupMessagesListener();

                // إرسال رسالة ترحيب
                const messagesRef = ref(db, `rooms/${roomCode}/messages`);
                await push(messagesRef, {
                    sender: 'نظام',
                    text: `👋 ${userName} دخل الغرفة`,
                    timestamp: Date.now()
                });

                hideLoading(); // نجاح
            } catch (error) {
                console.error('خطأ في الدخول:', error);
                alert('فشل الدخول إلى الغرفة');
                hideLoading();
                // العودة إلى الصفحة الرئيسية بعد قليل
                setTimeout(() => window.location.href = 'index.html', 2000);
            }
        }

        // بدء الدخول
        enterRoom();

        // أحداث الإرسال
        sendBtn.addEventListener('click', () => sendMessage(messageInput.value));
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });

        // الخروج
        exitBtn.addEventListener('click', leaveRoom);
    </script>
</body>
</html>
