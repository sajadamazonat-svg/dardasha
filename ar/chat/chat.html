<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Call</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --panel2:#17223a;
      --border:#273552;
      --text:#eef2ff;
      --muted:#9aa7c7;
      --primary:#2563eb;
      --danger:#dc2626;
      --success:#16a34a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Tahoma, sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .app{
      width:min(760px,100%);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      padding:18px;
      box-shadow:0 18px 50px rgba(0,0,0,.25);
    }
    h1{
      margin:0 0 14px;
      font-size:22px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }
    .card{
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
    }
    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }
    input{
      width:100%;
      border:1px solid var(--border);
      background:#0b1220;
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
    }
    .row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    button{
      border:none;
      border-radius:14px;
      padding:11px 14px;
      font-size:14px;
      cursor:pointer;
      color:#fff;
      background:var(--primary);
    }
    button.secondary{ background:#475569; }
    button.success{ background:var(--success); }
    button.danger{ background:var(--danger); }
    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .status{
      margin-top:12px;
      padding:12px 14px;
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:16px;
      min-height:48px;
      line-height:1.6;
      color:var(--muted);
      white-space:pre-wrap;
    }
    .incoming, .activeCall{
      display:none;
      margin-top:14px;
      padding:14px;
      background:rgba(37,99,235,.10);
      border:1px solid rgba(37,99,235,.35);
      border-radius:18px;
    }
    .incoming.show, .activeCall.show{ display:block; }
    audio{
      width:100%;
      margin-top:10px;
    }
    .small{
      font-size:12px;
      color:var(--muted);
      margin-top:8px;
    }
    @media (max-width:720px){
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>الاتصال الصوتي</h1>

    <div class="grid">
      <div class="card">
        <label>اسمك</label>
        <input id="nameInput" placeholder="مثال: سجاد" />
      </div>

      <div class="card">
        <label>اسم الغرفة</label>
        <input id="roomInput" placeholder="main" value="main" />
      </div>

      <div class="card">
        <label>معرّف الطرف الآخر (Target User ID)</label>
        <input id="targetIdInput" placeholder="اكتب userId الخاص بالطرف الآخر" />
      </div>

      <div class="card">
        <label>اسم الطرف الآخر</label>
        <input id="targetNameInput" placeholder="اختياري" />
      </div>
    </div>

    <div class="row">
      <button id="joinBtn">دخول الغرفة</button>
      <button id="callBtn">اتصال</button>
      <button id="hangupBtn" class="danger" disabled>إنهاء</button>
      <button id="muteBtn" class="secondary" disabled>كتم الميكروفون</button>
    </div>

    <div id="incomingBox" class="incoming">
      <b>مكالمة واردة</b>
      <div id="incomingText" style="margin-top:8px;"></div>
      <div class="row">
        <button id="acceptBtn" class="success">قبول</button>
        <button id="rejectBtn" class="danger">رفض</button>
      </div>
    </div>

    <div id="activeBox" class="activeCall">
      <b>المكالمة نشطة</b>
      <div id="activeText" style="margin-top:8px;"></div>
      <audio id="remoteAudio" autoplay></audio>
    </div>

    <div id="status" class="status">جاهز.</div>
    <div class="small">
      ملاحظة: هذا الكود يعتمد على WebRTC للصوت، وFirebase فقط لتبادل بيانات الاتصال.
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      push,
      update,
      onValue,
      onChildAdded,
      onDisconnect,
      remove
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAG4EKrB3iLEV2hsB8b08ShpSO6PXDnGjg",
      authDomain: "zio3-8ffdd.firebaseapp.com",
      databaseURL: "https://zio3-8ffdd-default-rtdb.firebaseio.com",
      projectId: "zio3-8ffdd",
      storageBucket: "zio3-8ffdd.firebasestorage.app",
      messagingSenderId: "560939348415",
      appId: "1:560939348415:web:c854e9e214e498ad2d310a",
      measurementId: "G-CVN2B2D0RD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const nameInput = document.getElementById("nameInput");
    const roomInput = document.getElementById("roomInput");
    const targetIdInput = document.getElementById("targetIdInput");
    const targetNameInput = document.getElementById("targetNameInput");
    const joinBtn = document.getElementById("joinBtn");
    const callBtn = document.getElementById("callBtn");
    const hangupBtn = document.getElementById("hangupBtn");
    const muteBtn = document.getElementById("muteBtn");
    const incomingBox = document.getElementById("incomingBox");
    const incomingText = document.getElementById("incomingText");
    const acceptBtn = document.getElementById("acceptBtn");
    const rejectBtn = document.getElementById("rejectBtn");
    const activeBox = document.getElementById("activeBox");
    const activeText = document.getElementById("activeText");
    const statusEl = document.getElementById("status");
    const remoteAudio = document.getElementById("remoteAudio");

    let room = localStorage.getItem("voice_room") || roomInput.value || "main";
    let userName = localStorage.getItem("voice_name") || nameInput.value || "";
    let userId = localStorage.getItem("voice_user_id") || `${Date.now()}_${Math.floor(Math.random()*99999)}`;
    let joined = false;

    let pc = null;
    let localStream = null;
    let callId = null;
    let currentIncoming = null;
    let isMuted = false;
    let currentRole = null; // caller | callee

    const rtcConfig = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    };

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function showIncoming(data, id) {
      currentIncoming = { data, id };
      incomingText.textContent = `من: ${data.callerName || "مستخدم"}\nالمعرف: ${data.callerId || "-"}`;
      incomingBox.classList.add("show");
    }

    function hideIncoming() {
      incomingBox.classList.remove("show");
      currentIncoming = null;
    }

    function showActive(text) {
      activeText.textContent = text;
      activeBox.classList.add("show");
      hangupBtn.disabled = false;
      muteBtn.disabled = false;
      callBtn.disabled = true;
    }

    function hideActive() {
      activeBox.classList.remove("show");
      hangupBtn.disabled = true;
      muteBtn.disabled = true;
      callBtn.disabled = false;
      muteBtn.textContent = "كتم الميكروفون";
      isMuted = false;
    }

    async function createPeerConnection() {
      pc = new RTCPeerConnection(rtcConfig);

      pc.ontrack = (event) => {
        remoteAudio.srcObject = event.streams[0];
      };

      pc.onconnectionstatechange = () => {
        setStatus(`حالة الاتصال: ${pc.connectionState}`);
      };

      return pc;
    }

    async function getLocalAudio() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      localStream = stream;
      return stream;
    }

    async function joinRoom() {
      room = roomInput.value.trim() || "main";
      userName = nameInput.value.trim();

      if (!userName) {
        alert("اكتب اسمك أولاً");
        return;
      }

      localStorage.setItem("voice_room", room);
      localStorage.setItem("voice_name", userName);
      localStorage.setItem("voice_user_id", userId);

      document.title = `Voice Call - ${room}`;

      const userRef = ref(db, `rooms/${room}/users/${userId}`);
      await set(userRef, {
        name: userName,
        joinedAt: Date.now()
      });

      onDisconnect(userRef).remove();
      joined = true;
      setStatus(`دخلت الغرفة: ${room}`);
      joinBtn.disabled = true;

      const callsRef = ref(db, `rooms/${room}/calls`);

      onChildAdded(callsRef, (snap) => {
        const data = snap.val();
        const id = snap.key;

        if (!data) return;
        if (data.status === "ended") return;

        // استقبال مكالمة واردة
        if (data.targetId === userId && data.status === "ringing") {
          if (!currentIncoming || currentIncoming.id !== id) {
            showIncoming(data, id);
            setStatus(`هناك مكالمة واردة من ${data.callerName || "مستخدم"}`);
          }
        }
      });
    }

    async function startOutgoingCall() {
      if (!joined) {
        alert("ادخل الغرفة أولاً");
        return;
      }

      const targetId = targetIdInput.value.trim();
      const targetName = targetNameInput.value.trim() || "مستخدم";

      if (!targetId) {
        alert("اكتب معرف الطرف الآخر");
        return;
      }

      if (targetId === userId) {
        alert("لا يمكنك الاتصال بنفسك");
        return;
      }

      if (pc) return;

      currentRole = "caller";
      callId = push(ref(db, `rooms/${room}/calls`)).key;

      const callRef = ref(db, `rooms/${room}/calls/${callId}`);
      const callerCandidatesRef = ref(db, `rooms/${room}/calls/${callId}/callerCandidates`);
      const calleeCandidatesRef = ref(db, `rooms/${room}/calls/${callId}/calleeCandidates`);
      const answerRef = ref(db, `rooms/${room}/calls/${callId}/answer`);

      await getLocalAudio();
      await createPeerConnection();

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.onicecandidate = async (event) => {
        if (event.candidate) {
          await push(callerCandidatesRef, event.candidate.toJSON());
        }
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      await set(callRef, {
        callerId: userId,
        callerName: userName,
        targetId,
        targetName,
        offer: {
          type: offer.type,
          sdp: offer.sdp
        },
        status: "ringing",
        createdAt: Date.now()
      });

      setStatus(`جارٍ الاتصال بـ ${targetName}...`);
      showActive(`المتصل: ${targetName}`);

      onValue(answerRef, async (snap) => {
        const answer = snap.val();
        if (!answer || !pc) return;

        try {
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
          setStatus("تم قبول المكالمة، جاري الاتصال...");
        } catch (err) {
          console.error(err);
        }
      });

      onChildAdded(calleeCandidatesRef, async (snap) => {
        const candidate = snap.val();
        if (!candidate || !pc) return;
        try {
          await pc.addIceCandidate(new RTCIceCandidate(candidate));
        } catch (err) {
          console.error(err);
        }
      });
    }

    async function acceptIncomingCall() {
      if (!currentIncoming) return;
      if (pc) return;

      const { data, id } = currentIncoming;
      const callRef = ref(db, `rooms/${room}/calls/${id}`);
      const callerCandidatesRef = ref(db, `rooms/${room}/calls/${id}/callerCandidates`);
      const calleeCandidatesRef = ref(db, `rooms/${room}/calls/${id}/calleeCandidates`);

      currentRole = "callee";
      callId = id;

      await getLocalAudio();
      await createPeerConnection();

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.onicecandidate = async (event) => {
        if (event.candidate) {
          await push(calleeCandidatesRef, event.candidate.toJSON());
        }
      };

      onChildAdded(callerCandidatesRef, async (snap) => {
        const candidate = snap.val();
        if (!candidate || !pc) return;
        try {
          await pc.addIceCandidate(new RTCIceCandidate(candidate));
        } catch (err) {
          console.error(err);
        }
      });

      await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      await update(callRef, {
        answer: {
          type: answer.type,
          sdp: answer.sdp
        },
        status: "connected"
      });

      hideIncoming();
      showActive(`المتصل: ${data.callerName || "مستخدم"}`);
      setStatus("المكالمة متصلة");
    }

    async function rejectIncomingCall() {
      if (!currentIncoming) return;
      const { id } = currentIncoming;

      await update(ref(db, `rooms/${room}/calls/${id}`), {
        status: "rejected"
      });

      hideIncoming();
      setStatus("تم رفض المكالمة");
    }

    async function hangup() {
      if (callId) {
        try {
          await update(ref(db, `rooms/${room}/calls/${callId}`), {
            status: "ended"
          });
        } catch {}
      }

      if (pc) {
        pc.close();
        pc = null;
      }

      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }

      remoteAudio.srcObject = null;
      callId = null;
      currentRole = null;
      hideActive();
      hideIncoming();
      setStatus("تم إنهاء المكالمة");
    }

    function toggleMute() {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
      muteBtn.textContent = isMuted ? "إلغاء الكتم" : "كتم الميكروفون";
    }

    joinBtn.addEventListener("click", joinRoom);
    callBtn.addEventListener("click", startOutgoingCall);
    acceptBtn.addEventListener("click", acceptIncomingCall);
    rejectBtn.addEventListener("click", rejectIncomingCall);
    hangupBtn.addEventListener("click", hangup);
    muteBtn.addEventListener("click", toggleMute);

    if (userName) nameInput.value = userName;
    if (room) roomInput.value = room;
  </script>
</body>
</html>
