<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول فوري – رقم اختبار</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: #0b1220cc;
      --line: #263247;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent2: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 30%, #111827 100%);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: linear-gradient(180deg, #0b1220f2, #0b1220d9);
      border: 1px solid #263247;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(14px);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 26px;
    }

    p {
      color: #94a3b8;
      font-size: 14px;
      margin: 0 0 24px;
      line-height: 1.7;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      transition: .2s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 20px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      background: #0f172a;
      border: 1px solid #263247;
      color: #cbd5e1;
      min-height: 48px;
      text-align: center;
      line-height: 1.7;
    }

    .status.success { border-color: rgba(16,185,129,.35); color: #bbf7d0; }
    .status.error   { border-color: rgba(239,68,68,.35);   color: #fecaca; }

    .note {
      margin-top: 16px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>تسجيل دخول فوري</h1>
    <p>
      هذا الزر يستخدم رقم الاختبار المُسجل في Firebase<br />
      <strong>+964 782 305 3419</strong> والرمز الثابت <strong>123456</strong>
    </p>

    <button id="instantBtn" class="btn">تسجيل الدخول الفوري</button>

    <div id="status" class="status">جاهز. اضغط على الزر لتسجيل الدخول.</div>
    <div class="note">يعمل فقط مع أرقام الاختبار المُضافة في لوحة التحكم</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithPhoneNumber,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // إعدادات مشروع Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDDb5kAoZCOLGqVvzKZ9q-wB1FZrdqyVH8",
      authDomain: "sample-firebase-ai-app-c5b33.firebaseapp.com",
      databaseURL: "https://sample-firebase-ai-app-c5b33-default-rtdb.firebaseio.com",
      projectId: "sample-firebase-ai-app-c5b33",
      storageBucket: "sample-firebase-ai-app-c5b33.firebasestorage.app",
      messagingSenderId: "183057738013",
      appId: "1:183057738013:web:649fc47c465a23da1959f4",
      measurementId: "G-1SCGVCM2WW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // بيانات رقم الاختبار من Firebase Console
    const TEST_PHONE = "+9647823053419";   // بدون مسافات أو شرطات
    const TEST_CODE  = "123456";

    const instantBtn = document.getElementById("instantBtn");
    const statusBox  = document.getElementById("status");

    function setStatus(msg, type = "") {
      statusBox.className = "status";
      if (type) statusBox.classList.add(type);
      statusBox.textContent = msg;
    }

    instantBtn.addEventListener("click", async () => {
      instantBtn.disabled = true;
      setStatus("جارٍ بدء عملية التحقق...");

      try {
        // لا حاجة إلى reCAPTCHA لأرقام الاختبار
        const confirmationResult = await signInWithPhoneNumber(
          auth,
          TEST_PHONE
          // لا نمرر أي reCAPTCHA هنا لأنه رقم اختبار
        );

        setStatus("تم استلام نتيجة التأكيد، جارٍ إدخال الرمز تلقائياً...");

        // تأكيد الرمز الثابت
        const result = await confirmationResult.confirm(TEST_CODE);
        const user = result.user;

        // تحديث الاسم بشكل اختياري (يمكن إزالته إذا أردت)
        await updateProfile(user, { displayName: "مستخدم فوري" });

        setStatus(
          `✅ تم تسجيل الدخول بنجاح! \n UID: ${user.uid}`,
          "success"
        );
      } catch (error) {
        console.error(error);
        setStatus(
          error.message || "فشل تسجيل الدخول، تأكد من إضافة الرقم كرقم اختبار.",
          "error"
        );
      } finally {
        instantBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
