<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسهل حل | منصة إدارة التطبيقات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-email {
            font-size: 0.875rem;
            color: #4b5563;
            background: #f3f4f6;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid #d1d5db;
            color: #374151;
        }

        .btn-outline:hover {
            background-color: #f9fafb;
            border-color: #9ca3af;
        }

        .btn-danger {
            background-color: #ef4444;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        /* Main content */
        .main-content {
            padding: 2rem;
        }

        /* Public section */
        .public-section {
            background-color: #f9fafb;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }

        .public-section h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #111827;
        }

        .app-name {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .app-description {
            color: #4b5563;
            margin: 0.75rem 0;
        }

        .download-button {
            display: inline-block;
            background-color: #059669;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 500;
            margin: 1rem 0;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .gallery img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Admin panel */
        .admin-panel {
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .admin-panel h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            transition: border 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            ring: 2px solid #bfdbfe;
        }

        .images-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-item {
            position: relative;
            width: 120px;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            overflow: hidden;
            background: #f9fafb;
        }

        .image-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }

        .image-actions {
            padding: 0.5rem;
            text-align: center;
        }

        .delete-image-btn {
            background-color: #ef4444;
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            width: 100%;
        }

        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }

        .message-success {
            background-color: #d1fae5;
            color: #065f46;
        }

        .message-error {
            background-color: #fee2e2;
            color: #991b1b;
        }

        hr {
            margin: 1.5rem 0;
            border: none;
            border-top: 1px solid #e5e7eb;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #e5e7eb;
            color: #6b7280;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .gallery img {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>اسهل حل</h1>
        </div>
        <div class="user-area">
            <span class="user-email" id="userEmailDisplay"></span>
            <button id="signOutBtn" class="btn-outline" style="display: none;">تسجيل خروج</button>
        </div>
    </div>

    <div class="main-content">
        <!-- منطقة تسجيل الدخول -->
        <div id="loginSection" style="text-align: center; padding: 2rem;">
            <button id="googleSignInBtn" style="font-size: 1rem;">تسجيل الدخول بحساب Google</button>
            <p id="authStatus" style="margin-top: 1rem; color: #6b7280;"></p>
        </div>

        <!-- العرض العام (للزوار) -->
        <div id="publicDisplay" class="public-section">
            <h2>التطبيق</h2>
            <div class="app-name" id="appNameDisplay">---</div>
            <div class="app-description" id="appDescDisplay"></div>
            <a id="downloadLinkDisplay" class="download-button" href="#" target="_blank" style="display: none;">تحميل التطبيق</a>
            <h4 style="margin: 1rem 0 0.5rem;">معرض الصور</h4>
            <div id="publicGallery" class="gallery"></div>
        </div>

        <!-- لوحة تحكم المسؤول (تظهر فقط للمسؤول) -->
        <div id="adminPanel" class="admin-panel" style="display: none;">
            <h3>لوحة التحكم</h3>
            <div class="form-group">
                <label>اسم التطبيق</label>
                <input type="text" id="appNameInput" placeholder="مثال: تطبيق اسهل حل">
            </div>
            <div class="form-group">
                <label>وصف التطبيق</label>
                <textarea id="appDescInput" placeholder="وصف تفصيلي للتطبيق..."></textarea>
            </div>
            <div class="form-group">
                <label>رابط التحميل</label>
                <input type="url" id="downloadLinkInput" placeholder="https://example.com/app.apk">
            </div>
            <button id="saveInfoBtn">حفظ المعلومات</button>

            <hr>

            <h3>إدارة الصور</h3>
            <div class="form-group">
                <label>رفع صورة جديدة</label>
                <input type="file" id="imageUploadInput" accept="image/jpeg,image/png,image/webp">
                <button id="uploadImageBtn" style="margin-top: 0.5rem;">رفع الصورة</button>
            </div>
            <div>
                <label>الصور الحالية</label>
                <div id="imagesListContainer" class="images-list"></div>
            </div>
            <div id="messageBox" class="message"></div>
        </div>
    </div>
    <footer>
        جميع الحقوق محفوظة © 2025 - اسهل حل
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAG4EKrB3iLEV2hsB8b08ShpSO6PXDnGjg",
        authDomain: "zio3-8ffdd.firebaseapp.com",
        databaseURL: "https://zio3-8ffdd-default-rtdb.firebaseio.com",
        projectId: "zio3-8ffdd",
        storageBucket: "zio3-8ffdd.firebasestorage.app",
        messagingSenderId: "560939348415",
        appId: "1:560939348415:web:c854e9e214e498ad2d310a",
        measurementId: "G-CVN2B2D0RD"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);

    const ADMIN_EMAIL = "ashlhl.iq@gmail.com";

    // عناصر DOM
    const loginSection = document.getElementById('loginSection');
    const publicDisplay = document.getElementById('publicDisplay');
    const adminPanel = document.getElementById('adminPanel');
    const userEmailSpan = document.getElementById('userEmailDisplay');
    const signOutBtn = document.getElementById('signOutBtn');
    const googleBtn = document.getElementById('googleSignInBtn');
    const authStatus = document.getElementById('authStatus');

    // حقول العرض العام
    const appNameDisplay = document.getElementById('appNameDisplay');
    const appDescDisplay = document.getElementById('appDescDisplay');
    const downloadLinkDisplay = document.getElementById('downloadLinkDisplay');
    const publicGallery = document.getElementById('publicGallery');

    // حقول الإدارة
    const appNameInput = document.getElementById('appNameInput');
    const appDescInput = document.getElementById('appDescInput');
    const downloadLinkInput = document.getElementById('downloadLinkInput');
    const saveInfoBtn = document.getElementById('saveInfoBtn');
    const imageUploadInput = document.getElementById('imageUploadInput');
    const uploadImageBtn = document.getElementById('uploadImageBtn');
    const imagesListContainer = document.getElementById('imagesListContainer');
    const messageBox = document.getElementById('messageBox');

    let currentImages = [];  // قائمة روابط الصور
    let currentImageStoragePaths = []; // لتخزين مسارات الملفات (لحذفها من Storage)

    function showMessage(text, isError = false) {
        messageBox.textContent = text;
        messageBox.className = `message ${isError ? 'message-error' : 'message-success'}`;
        setTimeout(() => {
            messageBox.textContent = '';
            messageBox.className = 'message';
        }, 4000);
    }

    // تحديث العرض العام
    function updatePublicDisplay(data) {
        appNameDisplay.textContent = data.name || "لم يضف اسم بعد";
        appDescDisplay.textContent = data.description || "";
        if (data.downloadLink && data.downloadLink.trim() !== "") {
            downloadLinkDisplay.href = data.downloadLink;
            downloadLinkDisplay.style.display = "inline-block";
        } else {
            downloadLinkDisplay.style.display = "none";
        }
        // عرض الصور
        publicGallery.innerHTML = "";
        if (data.images && data.images.length > 0) {
            data.images.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                img.alt = "صورة التطبيق";
                publicGallery.appendChild(img);
            });
        } else {
            publicGallery.innerHTML = "<p style='color:#6b7280;'>لا توجد صور معروضة حالياً.</p>";
        }
    }

    // عرض قائمة الصور في لوحة الإدارة مع زر حذف
    function renderAdminImages(images, imagePaths) {
        imagesListContainer.innerHTML = "";
        if (!images || images.length === 0) {
            imagesListContainer.innerHTML = "<p style='color:#6b7280;'>لا توجد صور. ارفع الصور الأولى.</p>";
            return;
        }
        images.forEach((url, idx) => {
            const div = document.createElement('div');
            div.className = 'image-item';
            const img = document.createElement('img');
            img.src = url;
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'image-actions';
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'حذف';
            deleteBtn.className = 'delete-image-btn';
            deleteBtn.addEventListener('click', async () => {
                if (!confirm("هل أنت متأكد من حذف هذه الصورة؟")) return;
                try {
                    // حذف الملف من Storage إذا كان لدينا المسار
                    const path = imagePaths[idx];
                    if (path) {
                        const fileRef = storageRef(storage, path);
                        await deleteObject(fileRef);
                    }
                    // تحديث قاعدة البيانات بإزالة الصورة من القائمة
                    const newImages = [...images];
                    const newPaths = [...imagePaths];
                    newImages.splice(idx, 1);
                    newPaths.splice(idx, 1);
                    await update(ref(db, 'appInfo'), {
                        images: newImages,
                        imageStoragePaths: newPaths
                    });
                    showMessage("تم حذف الصورة بنجاح");
                } catch (err) {
                    showMessage("فشل الحذف: " + err.message, true);
                }
            });
            actionsDiv.appendChild(deleteBtn);
            div.appendChild(img);
            div.appendChild(actionsDiv);
            imagesListContainer.appendChild(div);
        });
    }

    // تحميل البيانات من Firebase
    function loadAppData() {
        onValue(ref(db, 'appInfo'), (snapshot) => {
            const data = snapshot.val() || {};
            const appData = {
                name: data.name || '',
                description: data.description || '',
                downloadLink: data.downloadLink || '',
                images: data.images || [],
                imageStoragePaths: data.imageStoragePaths || []
            };
            currentImages = appData.images;
            currentImageStoragePaths = appData.imageStoragePaths;
            updatePublicDisplay(appData);
            if (adminPanel.style.display === 'block') {
                appNameInput.value = appData.name;
                appDescInput.value = appData.description;
                downloadLinkInput.value = appData.downloadLink;
                renderAdminImages(appData.images, appData.imageStoragePaths);
            }
        });
    }

    // حفظ معلومات التطبيق (الاسم، الوصف، الرابط)
    async function saveAppInfo() {
        const user = auth.currentUser;
        if (!user || user.email !== ADMIN_EMAIL) {
            showMessage("غير مصرح بهذه العملية", true);
            return;
        }
        const name = appNameInput.value.trim();
        if (!name) {
            showMessage("اسم التطبيق مطلوب", true);
            return;
        }
        try {
            await update(ref(db, 'appInfo'), {
                name: name,
                description: appDescInput.value.trim(),
                downloadLink: downloadLinkInput.value.trim()
            });
            showMessage("تم حفظ معلومات التطبيق");
        } catch (err) {
            showMessage("خطأ: " + err.message, true);
        }
    }

    // رفع صورة جديدة
    async function uploadNewImage() {
        const user = auth.currentUser;
        if (!user || user.email !== ADMIN_EMAIL) {
            showMessage("غير مصرح", true);
            return;
        }
        const file = imageUploadInput.files[0];
        if (!file) {
            showMessage("اختر صورة أولاً", true);
            return;
        }
        if (!file.type.startsWith('image/')) {
            showMessage("الملف المختار ليس صورة", true);
            return;
        }
        try {
            const ext = file.name.split('.').pop();
            const fileName = `app_images/${Date.now()}_${Math.random().toString(36).substring(2, 8)}.${ext}`;
            const fileRef = storageRef(storage, fileName);
            const uploadTask = await uploadBytes(fileRef, file);
            const downloadURL = await getDownloadURL(uploadTask.ref);
            // إضافة الصورة إلى القائمة الحالية
            const newImages = [...currentImages, downloadURL];
            const newPaths = [...currentImageStoragePaths, fileName];
            await update(ref(db, 'appInfo'), {
                images: newImages,
                imageStoragePaths: newPaths
            });
            showMessage("تم رفع الصورة بنجاح");
            imageUploadInput.value = '';
        } catch (err) {
            showMessage("فشل الرفع: " + err.message, true);
        }
    }

    // مراقبة حالة تسجيل الدخول
    onAuthStateChanged(auth, (user) => {
        if (user) {
            userEmailSpan.textContent = user.email;
            signOutBtn.style.display = 'inline-block';
            if (user.email === ADMIN_EMAIL) {
                loginSection.style.display = 'none';
                adminPanel.style.display = 'block';
                publicDisplay.style.display = 'block';
                authStatus.textContent = "مرحباً أيها المسؤول – يمكنك تعديل بيانات التطبيق والصور.";
                loadAppData();
            } else {
                loginSection.style.display = 'none';
                adminPanel.style.display = 'none';
                publicDisplay.style.display = 'block';
                authStatus.textContent = `تم الدخول كـ ${user.email} لكن ليس لديك صلاحيات الإدارة.`;
                loadAppData();
            }
        } else {
            userEmailSpan.textContent = "غير مسجل";
            signOutBtn.style.display = 'none';
            loginSection.style.display = 'block';
            adminPanel.style.display = 'none';
            publicDisplay.style.display = 'block';
            authStatus.textContent = "سجل الدخول بحساب Google لإدارة التطبيق (للمسؤول فقط).";
            loadAppData(); // تبقى البيانات العامة ظاهرة
        }
    });

    googleBtn.addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));
    signOutBtn.addEventListener('click', () => signOut(auth));
    saveInfoBtn.addEventListener('click', saveAppInfo);
    uploadImageBtn.addEventListener('click', uploadNewImage);
</script>
</body>
</html>
