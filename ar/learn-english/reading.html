<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تعلم الإنجليزية - القراءة المركزة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        :root {
            --bg-start:#f3f4f6; --bg-end:#e0e7ff; --card:#fff; --text:#1f2937;
            --text-sec:#4b5563; --border:#e2e8f0; --primary:#1e40af; --primary-hover:#1e3a8a;
            --completed:#10b981; --current:#f59e0b; --locked:#6b7280;
            --shadow:0 10px 15px -3px rgba(0,0,0,0.1); --toast-bg:#1f2937; --toast-text:#f9fafb;
            --modal-overlay:rgba(0,0,0,0.5); --progress-bg:#e5e7eb;
        }
        [data-theme="dark"] {
            --bg-start:#0f172a; --bg-end:#1e1b4b; --card:#1f2937; --text:#f1f5f9;
            --text-sec:#cbd5e1; --border:#374151; --primary:#3b82f6; --primary-hover:#2563eb;
            --completed:#34d399; --current:#fbbf24; --locked:#9ca3af;
            --shadow:0 10px 15px -3px rgba(0,0,0,0.3); --toast-bg:#111827; --toast-text:#f3f4f6;
            --modal-overlay:rgba(0,0,0,0.7); --progress-bg:#374151;
        }
        body { background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); color: var(--text); min-height:100vh; padding:1.5rem; transition:0.3s; }
        .container { max-width:1280px; margin:0 auto; }
        .header { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:2rem; background:var(--card); padding:1rem 1.5rem; border-radius:40px; box-shadow:var(--shadow); border:1px solid var(--border); }
        .logo h1 { font-size:1.8rem; font-weight:800; background:linear-gradient(135deg,var(--primary),#8b5cf6); background-clip:text; -webkit-background-clip:text; color:transparent; }
        .logo p { font-size:0.8rem; color:var(--text-sec); }
        .user-info { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
        .global-level { background:var(--current); color:#1f2937; padding:0.4rem 1rem; border-radius:40px; font-weight:bold; font-size:0.9rem; }
        .btn-icon { background:transparent; border:1px solid var(--border); padding:0.5rem 1rem; border-radius:40px; cursor:pointer; font-weight:500; color:var(--text); transition:0.2s; font-size:0.9rem; }
        .btn-icon i { margin-left:0.5rem; }
        .btn-icon:hover { background:var(--primary); color:white; border-color:var(--primary); }
        .progress-card { background:var(--card); border-radius:32px; padding:1.5rem; margin-bottom:2rem; box-shadow:var(--shadow); border:1px solid var(--border); }
        .progress-title { display:flex; justify-content:space-between; margin-bottom:0.8rem; font-weight:600; }
        .progress-bar { height:12px; background:var(--progress-bg); border-radius:20px; overflow:hidden; }
        .progress-fill { height:100%; width:0%; background:var(--primary); border-radius:20px; transition:width 0.4s; }
        .current-level-text { margin-top:0.8rem; text-align:center; font-size:0.9rem; color:var(--text-sec); }
        .groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.5rem; margin-top:1rem; }
        .group-card { background:var(--card); border-radius:28px; padding:1.5rem; border:1px solid var(--border); transition:0.2s; box-shadow:var(--shadow); position:relative; overflow:hidden; }
        .group-card:hover { transform:translateY(-5px); }
        .group-cover { width:100%; height:120px; object-fit:cover; border-radius:20px; margin-bottom:1rem; background:#f0e5d8; }
        .group-number { font-size:2rem; font-weight:800; display:inline-block; background:var(--primary); color:white; width:50px; height:50px; line-height:50px; text-align:center; border-radius:30px; margin-bottom:0.5rem; }
        .group-status { display:inline-block; padding:0.2rem 0.8rem; border-radius:30px; font-size:0.7rem; font-weight:bold; margin-right:0.5rem; }
        .status-completed { background:var(--completed); color:white; }
        .status-current { background:var(--current); color:#1f2937; }
        .status-locked { background:var(--locked); color:white; }
        .group-title { font-size:1.2rem; font-weight:700; margin:0.5rem 0; }
        .btn-group { width:100%; padding:0.7rem; margin-top:0.5rem; border:none; border-radius:40px; background:var(--primary); color:white; font-weight:bold; cursor:pointer; transition:0.2s; }
        .btn-group:disabled { background:var(--locked); cursor:not-allowed; opacity:0.6; }
        .btn-group:not(:disabled):hover { background:var(--primary-hover); transform:scale(0.98); }
        .word-list { display:flex; flex-direction:column; gap:1rem; }
        .word-item { display:flex; gap:1rem; padding:1rem; background:var(--progress-bg); border-radius:20px; border:1px solid var(--border); flex-wrap:wrap; align-items:flex-start; }
        .word-info { flex:2; min-width:180px; }
        .word-en { font-size:1.3rem; font-weight:700; color:var(--primary); }
        .word-ar { font-size:1rem; color:var(--text-sec); }
        .word-sentence { font-size:0.9rem; margin-top:0.5rem; padding-top:0.5rem; border-top:1px dashed var(--border); color:var(--text-sec); }
        .word-sentence .en-sentence { font-weight:500; direction:ltr; text-align:left; }
        .word-sentence .ar-sentence { margin-top:0.3rem; }
        .image-gallery { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }
        .gallery-img { width:60px; height:60px; object-fit:cover; border-radius:12px; border:1px solid var(--border); background:var(--card); }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--modal-overlay); display:none; justify-content:center; align-items:center; z-index:1000; backdrop-filter:blur(4px); }
        .modal.active { display:flex; }
        .modal-content { background:var(--card); width:90%; max-width:800px; max-height:90vh; border-radius:32px; padding:1.5rem; overflow-y:auto; border:1px solid var(--border); }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border); }
        .close-modal { background:none; border:none; font-size:1.8rem; cursor:pointer; color:var(--text-sec); }
        .admin-panel { margin-top:2rem; background:var(--card); border-radius:32px; padding:1rem; border:1px solid var(--border); }
        .admin-toggle { text-align:center; cursor:pointer; color:var(--primary); font-weight:bold; padding:0.5rem; }
        .admin-content { display:none; padding:1rem; border-top:1px solid var(--border); margin-top:0.5rem; }
        .admin-content.active { display:block; }
        .admin-form { display:flex; flex-direction:column; gap:1rem; }
        .admin-form select, .admin-form input, .admin-form textarea, .admin-form button { padding:0.8rem; border-radius:40px; border:1px solid var(--border); background:var(--card); color:var(--text); font-family:inherit; }
        .admin-form textarea { border-radius:20px; resize:vertical; }
        .admin-form button { background:var(--primary); color:white; cursor:pointer; }
        .image-list { display:flex; gap:0.8rem; flex-wrap:wrap; margin:0.5rem 0; align-items:center; }
        .image-list img { width:60px; height:60px; object-fit:cover; border-radius:12px; }
        .quiz-buttons { display:flex; gap:1rem; margin-top:1rem; }
        .btn-evaluate, .btn-hint { flex:1; padding:0.8rem; border:none; border-radius:40px; font-weight:bold; cursor:pointer; }
        .btn-evaluate { background:var(--completed); color:#1f2937; }
        .btn-hint { background:var(--primary); color:white; }
        .toast { position:fixed; bottom:20px; right:20px; background:var(--toast-bg); color:var(--toast-text); padding:0.8rem 1.5rem; border-radius:50px; z-index:1100; transform:translateX(120%); transition:0.3s; }
        .toast.show { transform:translateX(0); }
        @media (max-width:640px){ body{padding:1rem;} .header{flex-direction:column;text-align:center;} .user-info{justify-content:center;} .word-item{flex-direction:column;align-items:stretch;} .quiz-buttons{flex-direction:column;} }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1>تعلم الإنجليزية</h1><p>القراءة المركزة - كلمات مع صور وجمل</p></div>
        <div class="user-info">
            <span class="global-level" id="globalLevel">المستوى: --</span>
            <button class="btn-icon" id="darkModeToggle"><i class="fas fa-moon"></i> ليلي</button>
            <button class="btn-icon" id="resetBtn"><i class="fas fa-undo"></i> إعادة تعيين</button>
            <button class="btn-icon" id="logoutBtn" style="display: none;"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
        </div>
    </div>
    <div class="progress-card">
        <div class="progress-title"><span><i class="fas fa-layer-group"></i> تقدم المجموعات</span><span id="progressPercent">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="current-level-text" id="currentLevelText">المجموعة الحالية: 1 من 5</div>
    </div>
    <div class="groups-grid" id="groupsGrid"></div>
    <div class="admin-panel" id="adminPanel" style="display: none;">
        <div class="admin-toggle" id="adminToggle">🔧 لوحة الإدارة</div>
        <div id="adminContent" class="admin-content">
            <div class="admin-form">
                <h4>صورة الغلاف للمجموعة</h4>
                <select id="groupCoverSelect"></select>
                <input type="file" id="groupCoverUpload" accept="image/*">
                <button id="uploadGroupCoverBtn">رفع صورة الغلاف</button>
                <hr>
                <h4>إدارة الكلمات</h4>
                <select id="groupSelect"></select>
                <select id="wordSelect"></select>
                <div id="sentenceSection">
                    <textarea id="sentenceEn" placeholder="الجملة الإنجليزية (مثال)"></textarea>
                    <textarea id="sentenceAr" placeholder="ترجمة الجملة إلى العربية"></textarea>
                    <button id="saveSentenceBtn">حفظ الجملة</button>
                </div>
                <input type="file" id="imageUpload" accept="image/*">
                <button id="uploadImageBtn">رفع صورة جديدة للكلمة</button>
                <div id="existingImages" class="image-list"></div>
            </div>
        </div>
    </div>
</div>

<div id="wordModal" class="modal"><div class="modal-content"><div class="modal-header"><h3 id="wordModalTitle"></h3><button class="close-modal" id="closeWordModal">&times;</button></div><div id="wordModalBody"></div><button class="btn-group" id="startTestFromModal">بدء الاختبار</button></div></div>
<div id="testModal" class="modal"><div class="modal-content"><div class="modal-header"><h3 id="testModalTitle"></h3><button class="close-modal" id="closeTestModal">&times;</button></div><div id="testModalBody"></div></div></div>
<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAG4EKrB3iLEV2hsB8b08ShpSO6PXDnGjg",
        authDomain: "zio3-8ffdd.firebaseapp.com",
        databaseURL: "https://zio3-8ffdd-default-rtdb.firebaseio.com",
        projectId: "zio3-8ffdd",
        storageBucket: "zio3-8ffdd.firebasestorage.app",
        messagingSenderId: "560939348415",
        appId: "1:560939348415:web:c854e9e214e498ad2d310a",
        measurementId: "G-CVN2B2D0RD"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), storage = firebase.storage(), auth = firebase.auth();
    const STORAGE_PATH = "ashlhl/images/";
    const GROUP_COVER_PATH = "ashlhl/covers/";

    const groups = [
        { name: "المجموعة 1 - الأساسيات", words: ["Apple","Cat","Dog","House","Car","Sun","Moon","Water","Book","Tree"] },
        { name: "المجموعة 2 - الحياة اليومية", words: ["Bread","Milk","School","Teacher","Friend","Family","Work","Sleep","Eat","Drink"] },
        { name: "المجموعة 3 - المشاعر والأفعال", words: ["Happy","Sad","Big","Small","Run","Walk","Love","Help","Play","Learn"] },
        { name: "المجموعة 4 - الطبيعة والبيئة", words: ["Sky","River","Mountain","Flower","Bird","Fish","Wind","Rain","Snow","Star"] },
        { name: "المجموعة 5 - المدرسة والمستقبل", words: ["Study","Exam","Success","Future","Dream","Goal","Smart","Strong","Kind","Brave"] }
    ];
    const arabicMeanings = {
        "Apple":"تفاحة","Cat":"قطة","Dog":"كلب","House":"منزل","Car":"سيارة","Sun":"شمس","Moon":"قمر","Water":"ماء","Book":"كتاب","Tree":"شجرة",
        "Bread":"خبز","Milk":"حليب","School":"مدرسة","Teacher":"معلم","Friend":"صديق","Family":"عائلة","Work":"عمل","Sleep":"نوم","Eat":"أكل","Drink":"شرب",
        "Happy":"سعيد","Sad":"حزين","Big":"كبير","Small":"صغير","Run":"يركض","Walk":"يمشي","Love":"حب","Help":"مساعدة","Play":"لعب","Learn":"تعلم",
        "Sky":"سماء","River":"نهر","Mountain":"جبل","Flower":"زهرة","Bird":"طائر","Fish":"سمكة","Wind":"ريح","Rain":"مطر","Snow":"ثلج","Star":"نجم",
        "Study":"دراسة","Exam":"امتحان","Success":"نجاح","Future":"مستقبل","Dream":"حلم","Goal":"هدف","Smart":"ذكي","Strong":"قوي","Kind":"لطيف","Brave":"شجاع"
    };
    const defaultSentences = {
        "Apple":{en:"I eat a red apple every day.",ar:"آكل تفاحة حمراء كل يوم."},"Cat":{en:"The cat sleeps on the sofa.",ar:"القطة تنام على الأريكة."},
        "Dog":{en:"My dog is very friendly.",ar:"كلبي ودود جداً."},"House":{en:"We live in a big house.",ar:"نعيش في منزل كبير."},
        "Car":{en:"His car is blue.",ar:"سيارته زرقاء."},"Sun":{en:"The sun shines brightly.",ar:"الشمس تشرق بشكل مشرق."},
        "Moon":{en:"The moon is beautiful tonight.",ar:"القمر جميل الليلة."},"Water":{en:"Drink water to stay healthy.",ar:"اشرب الماء لتبقى بصحة جيدة."},
        "Book":{en:"I am reading a new book.",ar:"أنا أقرأ كتاباً جديداً."},"Tree":{en:"The tree provides shade.",ar:"الشجرة توفر الظل."},
        "Bread":{en:"I eat bread for breakfast.",ar:"آكل الخبز على الإفطار."},"Milk":{en:"Milk is good for bones.",ar:"الحليب مفيد للعظام."},
        "School":{en:"I go to school at 8 AM.",ar:"أذهب إلى المدرسة الساعة 8 صباحاً."},"Teacher":{en:"My teacher helps me learn.",ar:"معلمي يساعدني على التعلم."},
        "Friend":{en:"She is my best friend.",ar:"هي صديقتي المفضلة."},"Family":{en:"I love my family.",ar:"أحب عائلتي."},
        "Work":{en:"I work hard every day.",ar:"أعمل بجد كل يوم."},"Sleep":{en:"I sleep for eight hours.",ar:"أنام ثماني ساعات."},
        "Eat":{en:"Let's eat dinner together.",ar:"لنتناول العشاء معاً."},"Drink":{en:"Drink water when thirsty.",ar:"اشرب الماء عندما تشعر بالعطش."},
        "Happy":{en:"She looks very happy.",ar:"تبدو سعيدة جداً."},"Sad":{en:"Why are you sad?",ar:"لماذا أنت حزين؟"},
        "Big":{en:"This house is very big.",ar:"هذا المنزل كبير جداً."},"Small":{en:"I have a small car.",ar:"لدي سيارة صغيرة."},
        "Run":{en:"He can run fast.",ar:"يستطيع الركض بسرعة."},"Walk":{en:"I walk to school every day.",ar:"أمشي إلى المدرسة كل يوم."},
        "Love":{en:"I love my country.",ar:"أحب بلدي."},"Help":{en:"Can you help me?",ar:"هل يمكنك مساعدتي؟"},
        "Play":{en:"Children play in the park.",ar:"الأطفال يلعبون في الحديقة."},"Learn":{en:"We learn new things.",ar:"نتعلم أشياء جديدة."},
        "Sky":{en:"The sky is blue.",ar:"السماء زرقاء."},"River":{en:"The river flows to the sea.",ar:"النهر يتدفق إلى البحر."},
        "Mountain":{en:"They climbed the mountain.",ar:"تسلقوا الجبل."},"Flower":{en:"This flower smells nice.",ar:"هذه الزهرة رائحتها جميلة."},
        "Bird":{en:"The bird sings sweetly.",ar:"العصفور يغني بلطف."},"Fish":{en:"Fish live in water.",ar:"السمك يعيش في الماء."},
        "Wind":{en:"The wind is strong today.",ar:"الرياح قوية اليوم."},"Rain":{en:"I like the sound of rain.",ar:"أحب صوت المطر."},
        "Snow":{en:"Snow falls in winter.",ar:"الثلج يتساقط في الشتاء."},"Star":{en:"Look at the bright star.",ar:"انظر إلى النجم الساطع."},
        "Study":{en:"I study English every day.",ar:"أدرس الإنجليزية كل يوم."},"Exam":{en:"I have an exam tomorrow.",ar:"لدي امتحان غداً."},
        "Success":{en:"Success comes with hard work.",ar:"النجاح يأتي بالعمل الجاد."},"Future":{en:"The future is bright.",ar:"المستقبل مشرق."},
        "Dream":{en:"Follow your dreams.",ar:"اتبع أحلامك."},"Goal":{en:"Set a goal and achieve it.",ar:"حدد هدفاً وحققه."},
        "Smart":{en:"She is a smart student.",ar:"هي طالبة ذكية."},"Strong":{en:"He is strong and brave.",ar:"هو قوي وشجاع."},
        "Kind":{en:"Be kind to others.",ar:"كن لطيفاً مع الآخرين."},"Brave":{en:"A brave person faces challenges.",ar:"الشخص الشجاع يواجه التحديات."}
    };

    let progress = JSON.parse(localStorage.getItem("reading_center_final")) || { unlockedGroups:1, completedGroups:[] };
    function saveProgress(){ localStorage.setItem("reading_center_final",JSON.stringify(progress)); }
    function updateUnlocked(){
        let max=0; for(let i=1;i<=groups.length;i++) if(progress.completedGroups.includes(i)) max=i;
        progress.unlockedGroups = max+1;
        if(progress.unlockedGroups>groups.length) progress.unlockedGroups=groups.length;
        saveProgress();
    }
    updateUnlocked();

    let currentUser=null, isAdmin=false;

    async function getGroupCover(groupIndex){
        try{ let snap=await db.ref(`groupCovers/${groupIndex}`).once("value"); return snap.val() || ""; }catch(e){ return ""; }
    }
    async function getSentence(w){
        try{ let snap=await db.ref(`sentences/${w}`).once("value"); let d=snap.val(); if(d&&d.en&&d.ar) return d; }catch(e){}
        return defaultSentences[w]||{en:"",ar:""};
    }
    async function getImages(w){
        try{ let snap=await db.ref(`images/${w}`).once("value"); let d=snap.val(); if(Array.isArray(d)) return d; if(typeof d==="string") return [d]; }catch(e){}
        return [];
    }

    async function renderGroups(){
        let grid=document.getElementById("groupsGrid");
        grid.innerHTML="";
        for(let i=1;i<=groups.length;i++){
            let comp=progress.completedGroups.includes(i);
            let unlock=i<=progress.unlockedGroups;
            let cls="",txt="",dis=false;
            if(comp){ cls="status-completed"; txt="مكتمل"; }
            else if(unlock){ cls="status-current"; txt="متاح"; }
            else{ cls="status-locked"; txt="مقفل"; dis=true; }
            let cover = await getGroupCover(i);
            let card=document.createElement("div"); card.className="group-card";
            card.innerHTML=`
                ${cover ? `<img class="group-cover" src="${cover}" alt="صورة المجموعة">` : '<div class="group-cover" style="background:#f0e5d8;"></div>'}
                <div><span class="group-number">${i}</span><span class="group-status ${cls}">${txt}</span></div>
                <div class="group-title">${groups[i-1].name}</div>
                <button class="btn-group" data-group="${i}" ${dis?"disabled":""}>عرض الكلمات والصور</button>
            `;
            grid.appendChild(card);
        }
        document.querySelectorAll(".btn-group:not([disabled])").forEach(btn=>btn.addEventListener("click",()=>showGroupWords(parseInt(btn.getAttribute("data-group")))));
        let compCnt=progress.completedGroups.length;
        let per=(compCnt/groups.length)*100;
        document.getElementById("progressFill").style.width=per+"%";
        document.getElementById("progressPercent").innerText=Math.floor(per)+"%";
        document.getElementById("currentLevelText").innerHTML=`المجموعة الحالية: ${progress.unlockedGroups} من ${groups.length}`;
        document.getElementById("globalLevel").innerHTML=`المستوى الإجمالي: ${Math.floor((compCnt/groups.length)*100)}`;
    }

    async function showGroupWords(num){
        let group=groups[num-1];
        document.getElementById("wordModalTitle").innerText=`كلمات ${group.name}`;
        let body=document.getElementById("wordModalBody");
        body.innerHTML='<div class="word-list"></div>';
        let list=body.querySelector(".word-list");
        for(let w of group.words){
            let imgs=await getImages(w);
            let sent=await getSentence(w);
            let div=document.createElement("div"); div.className="word-item";
            let gal='<div class="image-gallery">';
            if(imgs.length===0) gal+='<img class="gallery-img" src="https://placehold.co/80x80?text=صورة" alt="لا توجد صور">';
            else imgs.forEach(url=>gal+=`<img class="gallery-img" src="${url}" onerror="this.src='https://placehold.co/80x80?text=خطأ'">`);
            gal+='</div>';
            div.innerHTML=`<div class="word-info"><div class="word-en">${w}</div><div class="word-ar">${arabicMeanings[w]}</div><div class="word-sentence"><div class="en-sentence">${sent.en}</div><div class="ar-sentence">${sent.ar}</div></div></div>${gal}`;
            list.appendChild(div);
        }
        document.getElementById("startTestFromModal").onclick=()=>{ closeWordModal(); startTest(num); };
        document.getElementById("wordModal").classList.add("active");
    }

    // ========== TEST SYSTEM (working) ==========
    let curTestGroup=null, curAns={}, helpUsed=false;
    function startTest(num){
        let group=groups[num-1];
        curTestGroup=num; curAns={}; helpUsed=false;
        let qs=group.words.map(w=>{
            let cor=arabicMeanings[w];
            let others=group.words.filter(x=>x!==w).map(x=>arabicMeanings[x]);
            while(others.length<3) others.push("???");
            let shuffled=[...others];
            for(let i=shuffled.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
            let opts=[cor,...shuffled.slice(0,3)];
            for(let i=opts.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
            let correct=opts.indexOf(cor);
            return {text:`ما معنى كلمة "${w}"؟`,options:opts,correct};
        });
        showTest(qs);
    }
    function showTest(qs){
        document.getElementById("testModalTitle").innerHTML=`اختبار ${groups[curTestGroup-1].name}`;
        let body=document.getElementById("testModalBody");
        let html="";
        qs.forEach((q,i)=>{
            html+=`<div class="question-item" data-qidx="${i}"><div class="question-text">${i+1}. ${q.text}</div><div class="options">`;
            q.options.forEach((o,oi)=>html+=`<div class="option" data-q="${i}" data-opt="${oi}">${o}</div>`);
            html+=`</div></div>`;
        });
        html+=`<div class="quiz-buttons"><button class="btn-evaluate" id="evaluateBtn">تقييم الإجابات</button><button class="btn-hint" id="hintBtn">مساعدة (مرة واحدة)</button></div><div id="helpUsedMsg" style="margin-top:0.5rem;font-size:0.8rem;"></div>`;
        body.innerHTML=html;
        document.querySelectorAll(".option").forEach(opt=>opt.addEventListener("click",e=>{
            let qIdx=parseInt(opt.getAttribute("data-q")), optIdx=parseInt(opt.getAttribute("data-opt"));
            opt.closest(".question-item").querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
            opt.classList.add("selected");
            curAns[qIdx]=optIdx;
        }));
        document.getElementById("evaluateBtn").onclick=()=>evalTest(qs);
        document.getElementById("hintBtn").onclick=()=>useHint(qs);
        document.getElementById("helpUsedMsg").innerText=helpUsed?"تم استخدام المساعدة.":"يمكنك استخدام مساعدة واحدة.";
        document.getElementById("testModal").classList.add("active");
    }
    function useHint(qs){
        if(helpUsed){ showToast("لا يمكن استخدام المساعدة أكثر من مرة."); return; }
        let unanswered=[];
        for(let i=0;i<qs.length;i++) if(curAns[i]===undefined) unanswered.push(i);
        if(unanswered.length===0){ showToast("لقد أجبت على جميع الأسئلة."); return; }
        let rand=unanswered[Math.floor(Math.random()*unanswered.length)];
        let correct=qs[rand].correct;
        let qDiv=document.querySelector(`.question-item[data-qidx="${rand}"]`);
        if(!qDiv) return;
        let opts=qDiv.querySelectorAll(".option");
        if(!opts[correct]) return;
        opts[correct].click();
        helpUsed=true;
        document.getElementById("hintBtn").disabled=true;
        document.getElementById("helpUsedMsg").innerText="تم استخدام المساعدة.";
        showToast(`تم توفير الإجابة الصحيحة للسؤال ${rand+1}.`);
    }
    function evalTest(qs){
        let correct=0;
        for(let i=0;i<qs.length;i++) if(curAns[i]!==undefined && curAns[i]===qs[i].correct) correct++;
        if(correct>=9){
            if(!progress.completedGroups.includes(curTestGroup)){
                progress.completedGroups.push(curTestGroup);
                updateUnlocked();
                saveProgress();
                renderGroups();
                showToast(`🎉 نجحت! أكملت المجموعة ${curTestGroup}.`);
                closeTestModal();
            } else { showToast("هذه المجموعة مكتملة بالفعل."); closeTestModal(); }
        } else { showToast(`❌ لم تنجح: ${correct} من ${qs.length} صحيحة. تحتاج إلى 9 للإجتياز.`); }
    }

    // ========== ADMIN FUNCTIONS ==========
    async function uploadGroupCover(groupIdx, file){
        if(!isAdmin) return;
        let ref=storage.ref(`${GROUP_COVER_PATH}group_${groupIdx}`);
        try{
            await ref.put(file);
            let url=await ref.getDownloadURL();
            await db.ref(`groupCovers/${groupIdx}`).set(url);
            showToast(`تم رفع صورة الغلاف للمجموعة ${groupIdx}`);
            renderGroups();
        }catch(e){ showToast("خطأ: "+e.message); }
    }
    async function uploadWordImage(word, file){
        if(!isAdmin) return;
        let ts=Date.now(), ext=file.name.split('.').pop();
        let ref=storage.ref(`${STORAGE_PATH}${word}_${ts}.${ext}`);
        try{
            await ref.put(file);
            let url=await ref.getDownloadURL();
            let snap=await db.ref(`images/${word}`).once("value");
            let arr=snap.val();
            if(!Array.isArray(arr)) arr=arr?[arr]:[];
            arr.push(url);
            await db.ref(`images/${word}`).set(arr);
            showToast(`تم رفع صورة لكلمة ${word}`);
        }catch(e){ showToast("خطأ: "+e.message); }
    }
    async function saveSentence(word, en, ar){
        if(!isAdmin) return;
        await db.ref(`sentences/${word}`).set({en,ar});
        showToast(`تم حفظ الجملة لكلمة ${word}`);
    }
    async function loadImages(word){
        let imgs=await getImages(word);
        let cont=document.getElementById("existingImages");
        cont.innerHTML="";
        if(imgs.length===0){ cont.innerHTML="<span>لا توجد صور لهذه الكلمة</span>"; return; }
        imgs.forEach((url,i)=>{
            let wrap=document.createElement("div"); wrap.style.display="inline-flex"; wrap.style.flexDirection="column"; wrap.style.alignItems="center";
            let img=document.createElement("img"); img.src=url; img.style.width="60px"; img.style.height="60px"; img.style.objectFit="cover"; img.style.borderRadius="12px";
            let del=document.createElement("button"); del.innerText="🗑️"; del.style.margin="5px 0 0"; del.style.background="none"; del.style.border="none"; del.style.cursor="pointer";
            del.onclick=async()=>{
                if(confirm("حذف الصورة؟")){
                    let newArr=[...imgs];
                    newArr.splice(i,1);
                    await db.ref(`images/${word}`).set(newArr.length?newArr:null);
                    loadImages(word);
                    showToast("تم حذف الصورة");
                }
            };
            wrap.appendChild(img); wrap.appendChild(del); cont.appendChild(wrap);
        });
    }
    async function loadSentenceUI(word){
        let sent=await getSentence(word);
        document.getElementById("sentenceEn").value=sent.en;
        document.getElementById("sentenceAr").value=sent.ar;
    }
    function populateAdmin(){
        let gs=document.getElementById("groupSelect");
        gs.innerHTML="";
        groups.forEach((g,i)=>{ let opt=document.createElement("option"); opt.value=i; opt.textContent=g.name; gs.appendChild(opt); });
        gs.onchange=updateWordSelect;
        updateWordSelect();

        let groupCoverSelect=document.getElementById("groupCoverSelect");
        groupCoverSelect.innerHTML="";
        groups.forEach((g,i)=>{ let opt=document.createElement("option"); opt.value=i+1; opt.textContent=g.name; groupCoverSelect.appendChild(opt); });
        document.getElementById("uploadGroupCoverBtn").onclick=async()=>{
            let file=document.getElementById("groupCoverUpload").files[0];
            if(!file){ showToast("اختر صورة"); return; }
            let groupIdx=parseInt(groupCoverSelect.value);
            await uploadGroupCover(groupIdx, file);
            document.getElementById("groupCoverUpload").value="";
        };

        document.getElementById("uploadImageBtn").onclick=async()=>{
            let file=document.getElementById("imageUpload").files[0];
            if(!file){ showToast("اختر صورة"); return; }
            let gIdx=parseInt(gs.value), wIdx=parseInt(document.getElementById("wordSelect").value);
            let word=groups[gIdx].words[wIdx];
            await uploadWordImage(word,file);
            document.getElementById("imageUpload").value="";
            await loadImages(word);
        };
        document.getElementById("saveSentenceBtn").onclick=async()=>{
            let gIdx=parseInt(gs.value), wIdx=parseInt(document.getElementById("wordSelect").value);
            let word=groups[gIdx].words[wIdx];
            let en=document.getElementById("sentenceEn").value.trim();
            let ar=document.getElementById("sentenceAr").value.trim();
            if(en&&ar) await saveSentence(word,en,ar);
            else showToast("املأ الجملة باللغتين");
        };
    }
    async function updateWordSelect(){
        let gIdx=parseInt(document.getElementById("groupSelect").value);
        let words=groups[gIdx].words;
        let ws=document.getElementById("wordSelect");
        ws.innerHTML="";
        words.forEach((w,i)=>{ let opt=document.createElement("option"); opt.value=i; opt.textContent=`${w} - ${arabicMeanings[w]}`; ws.appendChild(opt); });
        let w=words[parseInt(ws.value)];
        if(w){ await loadImages(w); await loadSentenceUI(w); }
        ws.onchange=async()=>{
            let nw=words[parseInt(ws.value)];
            if(nw){ await loadImages(nw); await loadSentenceUI(nw); }
        };
    }

    // Auth
    function initAuth(){
        auth.onAuthStateChanged(async(user)=>{
            if(user && user.email==="ashlhl.iq@gmail.com"){
                currentUser=user; isAdmin=true;
                document.getElementById("adminPanel").style.display="block";
                document.getElementById("logoutBtn").style.display="block";
                populateAdmin();
                showToast("تم تسجيل الدخول كمدير");
            } else if(user){
                await auth.signOut();
                currentUser=null; isAdmin=false;
                document.getElementById("adminPanel").style.display="none";
                document.getElementById("logoutBtn").style.display="none";
                showToast("غير مسموح بالدخول. فقط المدير يمكنه تسجيل الدخول.");
            } else {
                currentUser=null; isAdmin=false;
                document.getElementById("adminPanel").style.display="none";
                document.getElementById("logoutBtn").style.display="none";
            }
        });
        document.getElementById("logoutBtn").onclick=()=>auth.signOut();
    }

    // UI helpers
    function closeWordModal(){ document.getElementById("wordModal").classList.remove("active"); }
    function closeTestModal(){ document.getElementById("testModal").classList.remove("active"); }
    function showToast(msg){ let t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3000); }
    function resetProgress(){ if(confirm("إعادة تعيين كل التقدم؟")){ progress={unlockedGroups:1,completedGroups:[]}; saveProgress(); updateUnlocked(); renderGroups(); showToast("تم إعادة التعيين"); } }
    function initDarkMode(){ if(localStorage.getItem("theme")==="dark"){ document.documentElement.setAttribute("data-theme","dark"); document.getElementById("darkModeToggle").innerHTML='<i class="fas fa-sun"></i> نهاري'; } else { document.documentElement.removeAttribute("data-theme"); document.getElementById("darkModeToggle").innerHTML='<i class="fas fa-moon"></i> ليلي'; } }
    function toggleDarkMode(){ if(document.documentElement.hasAttribute("data-theme")){ document.documentElement.removeAttribute("data-theme"); localStorage.setItem("theme","light"); document.getElementById("darkModeToggle").innerHTML='<i class="fas fa-moon"></i> ليلي'; } else { document.documentElement.setAttribute("data-theme","dark"); localStorage.setItem("theme","dark"); document.getElementById("darkModeToggle").innerHTML='<i class="fas fa-sun"></i> نهاري'; } }

    document.getElementById("darkModeToggle").onclick=toggleDarkMode;
    document.getElementById("resetBtn").onclick=resetProgress;
    document.getElementById("closeWordModal").onclick=closeWordModal;
    document.getElementById("closeTestModal").onclick=closeTestModal;
    window.onclick=e=>{ if(e.target===document.getElementById("wordModal")) closeWordModal(); if(e.target===document.getElementById("testModal")) closeTestModal(); };
    document.getElementById("adminToggle").onclick=()=>{ document.getElementById("adminContent").classList.toggle("active"); };
    initDarkMode();
    initAuth();
    renderGroups();
</script>
