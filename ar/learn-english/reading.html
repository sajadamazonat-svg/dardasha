<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اسهل حل - مهارة القراءة</title>
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        /* CSS Variables - Light Mode (default) */
        :root {
            --bg-gradient-start: #f3f4f6;
            --bg-gradient-end: #e0e7ff;
            --card-bg: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --border-color: #e2e8f0;
            --primary: #1e40af;
            --primary-hover: #1e3a8a;
            --completed: #10b981;
            --current: #f59e0b;
            --locked: #6b7280;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --toast-bg: #1f2937;
            --toast-text: #f9fafb;
            --modal-overlay: rgba(0,0,0,0.5);
            --progress-bg: #e5e7eb;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e1b4b;
            --card-bg: #1f2937;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #374151;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --completed: #34d399;
            --current: #fbbf24;
            --locked: #9ca3af;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            --toast-bg: #111827;
            --toast-text: #f3f4f6;
            --modal-overlay: rgba(0,0,0,0.7);
            --progress-bg: #374151;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1.5rem;
            transition: background 0.3s, color 0.3s;
        }

        /* Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 1rem 1.5rem;
            border-radius: 40px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-color);
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .user-name {
            font-weight: 600;
            background: var(--primary);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .global-level {
            background: var(--current);
            color: #1f2937;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .btn-icon {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-icon i {
            margin-left: 0.5rem;
        }
        .btn-icon:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Progress Card */
        .progress-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        .progress-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }
        .progress-bar {
            height: 12px;
            background: var(--progress-bg);
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 20px;
            transition: width 0.4s ease;
        }
        .current-level-text {
            margin-top: 0.8rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Lessons Grid */
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .lesson-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .lesson-card:hover {
            transform: translateY(-5px);
        }
        .lesson-number {
            font-size: 2rem;
            font-weight: 800;
            display: inline-block;
            background: var(--primary);
            color: white;
            width: 50px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            border-radius: 30px;
            margin-bottom: 1rem;
        }
        .lesson-status {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-right: 0.5rem;
        }
        .status-completed { background: var(--completed); color: white; }
        .status-current { background: var(--current); color: #1f2937; }
        .status-locked { background: var(--locked); color: white; }
        .lesson-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0.8rem 0;
        }
        .btn-study {
            width: 100%;
            padding: 0.7rem;
            margin-top: 1rem;
            border: none;
            border-radius: 40px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-study:disabled {
            background: var(--locked);
            cursor: not-allowed;
            opacity: 0.6;
        }
        .btn-study:not(:disabled):hover {
            background: var(--primary-hover);
            transform: scale(0.98);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            border-radius: 32px;
            padding: 1.5rem;
            overflow-y: auto;
            position: relative;
            border: 1px solid var(--border-color);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .passage {
            background: var(--progress-bg);
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .question-item {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--progress-bg);
            border-radius: 20px;
        }
        .question-text {
            font-weight: 700;
            margin-bottom: 0.8rem;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .option {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .btn-evaluate {
            background: var(--completed);
            color: #1f2937;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            margin-top: 1rem;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            box-shadow: var(--shadow);
            z-index: 1100;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            font-size: 0.9rem;
        }
        .toast.show {
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .user-info { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <h1>اسهل حل</h1>
                <p>تعلم الإنجليزية بسهولة</p>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName">مرحباً !</span>
                <span class="global-level" id="globalLevel">المستوى: --</span>
                <button class="btn-icon" id="backDashboardBtn"><i class="fas fa-arrow-right"></i> لوحة التحكم</button>
                <button class="btn-icon" id="darkModeToggle"><i class="fas fa-moon"></i> ليلي</button>
            </div>
        </div>

        <!-- Progress Card -->
        <div class="progress-card">
            <div class="progress-title">
                <span><i class="fas fa-book-open"></i> التقدم في القراءة</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="readingProgressFill"></div>
            </div>
            <div class="current-level-text" id="currentLevelText">المستوى الحالي: 1 من 10</div>
        </div>

        <!-- Lessons Grid -->
        <h2 style="margin-bottom: 1rem;"><i class="fas fa-layer-group"></i> الدروس المتاحة</h2>
        <div class="lessons-grid" id="lessonsGrid">
            <!-- ستتم تعبئتها بواسطة JS -->
            <div style="text-align: center; grid-column: 1/-1;">جارٍ تحميل الدروس...</div>
        </div>
    </div>

    <!-- Modal for Lesson -->
    <div id="lessonModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">عنوان الدرس</h3>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div id="modalBody">
                <!-- dynamic content -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">رسالة</div>

    <script>
        // ======================== FIREBASE CONFIG (استبدل ببيانات مشروعك) ========================
        const firebaseConfig = {
            apiKey: "AIzaSyB3xXxXxXxXxXxXxXxXxXxXxXxXxXxX", // استبدل
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ---------- Global Variables ----------
        let currentUser = null;
        let readingProgress = { level: 1, completed: [] };      // level = current unlocked level (next to study)
        let otherProgress = { writing: { level:1, completed:[] }, listening:{ level:1, completed:[] }, speaking:{ level:1, completed:[] } };
        let userName = "";

        // ---------- Lesson Data (Levels 1-3 have real content, others placeholder) ----------
        const lessonsData = {
            1: {
                title: "A New Friend",
                passage: "My name is Tom. I am from London. I have a new friend. His name is Ahmed. He is from Cairo. We study together. Tom likes football. Ahmed likes reading. They are good friends.",
                questions: [
                    { text: "Where is Tom from?", options: ["Cairo", "London", "Paris", "Dubai"], correct: 1 },
                    { text: "What does Ahmed like?", options: ["Football", "Reading", "Swimming", "Music"], correct: 1 },
                    { text: "Are Tom and Ahmed friends?", options: ["Yes", "No", "Maybe", "Not mentioned"], correct: 0 }
                ]
            },
            2: {
                title: "My Daily Routine",
                passage: "I wake up at 7 o'clock. I eat breakfast at 7:30. I go to school at 8. I have lunch at 12. I come back home at 3. I do my homework at 4. I watch TV at 7. I go to bed at 9.",
                questions: [
                    { text: "What time does he wake up?", options: ["6:00", "7:00", "8:00", "9:00"], correct: 1 },
                    { text: "When does he have lunch?", options: ["11:00", "12:00", "1:00", "2:00"], correct: 1 },
                    { text: "What does he do at 4 o'clock?", options: ["Watch TV", "Homework", "Play", "Sleep"], correct: 1 }
                ]
            },
            3: {
                title: "The Market",
                passage: "There is a market near my house. It opens at 8 AM and closes at 8 PM. You can buy fruits, vegetables, and clothes. I go there every Friday with my mother. We buy apples and oranges.",
                questions: [
                    { text: "When does the market close?", options: ["6 PM", "7 PM", "8 PM", "9 PM"], correct: 2 },
                    { text: "What do they buy?", options: ["Meat", "Apples and oranges", "Bread", "Milk"], correct: 1 },
                    { text: "Who goes to the market with the child?", options: ["Father", "Mother", "Sister", "Brother"], correct: 1 }
                ]
            },
            // Levels 4-10 (placeholder)
            4: { title: "Coming Soon", passage: "سيتم إضافة محتوى هذا المستوى قريباً.", questions: [] },
            5: { title: "Coming Soon", passage: "سيتم إضافة محتوى هذا المستوى قريباً.", questions: [] },
            6: { title: "Coming Soon", passage: "سيتم إضافة محتوى هذا المستوى قريباً.", questions: [] },
            7: { title: "Coming Soon", passage: "سيتم إضافة محتوى هذا المستوى قريباً.", questions: [] },
            8: { title: "Coming Soon", passage: "سيتم إضافة محتوى هذا المستوى قريباً.", questions: [] },
            9: { title: "Coming Soon", passage: "سيتم إضافة محتوى هذا المستوى قريباً.", questions: [] },
            10: { title: "Coming Soon", passage: "سيتم إضافة محتوى هذا المستوى قريباً.", questions: [] }
        };

        // Helper: show toast message
        function showToast(msg, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // Compute global level (1-100) based on completed levels across four skills (each 10 levels max)
        function computeGlobalLevel() {
            const readingCount = readingProgress.completed.length;
            const writingCount = otherProgress.writing.completed.length;
            const listeningCount = otherProgress.listening.completed.length;
            const speakingCount = otherProgress.speaking.completed.length;
            const totalCompleted = readingCount + writingCount + listeningCount + speakingCount; // max 40
            // Map 0-40 to 0-100
            let global = Math.floor((totalCompleted / 40) * 100);
            global = Math.min(100, Math.max(1, global));
            return global;
        }

        // Update UI: progress bar, current level text, global level in header
        function updateUI() {
            // reading progress
            const completedCount = readingProgress.completed.length;
            const percent = (completedCount / 10) * 100;
            document.getElementById('progressPercent').innerText = Math.floor(percent) + '%';
            document.getElementById('readingProgressFill').style.width = percent + '%';
            document.getElementById('currentLevelText').innerHTML = `المستوى الحالي: ${readingProgress.level} من 10`;
            // global level
            const globalLvl = computeGlobalLevel();
            document.getElementById('globalLevel').innerHTML = `المستوى الإجمالي: ${globalLvl}`;
            // user name
            if (userName) document.getElementById('userName').innerHTML = `مرحباً ${userName}`;
        }

        // Render lessons grid based on readingProgress
        function renderLessons() {
            const grid = document.getElementById('lessonsGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const isCompleted = readingProgress.completed.includes(i);
                const isCurrent = (i === readingProgress.level);
                const isLocked = (!isCompleted && !isCurrent && i > readingProgress.level);
                let statusClass = '', statusText = '', disabled = false;
                if (isCompleted) { statusClass = 'status-completed'; statusText = 'مكتمل'; }
                else if (isCurrent) { statusClass = 'status-current'; statusText = 'الحالي'; }
                else { statusClass = 'status-locked'; statusText = 'مقفل'; disabled = true; }

                const lessonTitle = lessonsData[i]?.title || `مستوى ${i}`;
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `
                    <div>
                        <span class="lesson-number">${i}</span>
                        <span class="lesson-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="lesson-title">${lessonTitle}</div>
                    <button class="btn-study" data-level="${i}" ${disabled ? 'disabled' : ''}>ادرس الآن <i class="fas fa-arrow-left"></i></button>
                `;
                grid.appendChild(card);
            }
            // attach event listeners to study buttons
            document.querySelectorAll('.btn-study:not([disabled])').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const level = parseInt(btn.getAttribute('data-level'));
                    openLesson(level);
                });
            });
        }

        // Open lesson modal
        let currentLessonLevel = null;
        let selectedAnswers = {}; // { questionIndex: selectedOptionIndex }

        function openLesson(level) {
            const lesson = lessonsData[level];
            if (!lesson) {
                showToast("الدرس غير موجود");
                return;
            }
            if (lesson.questions.length === 0 && level > 3) {
                showToast("هذا المستوى قيد الإعداد، سيتم إضافته قريباً.");
                return;
            }
            currentLessonLevel = level;
            selectedAnswers = {};
            document.getElementById('modalTitle').innerText = `المستوى ${level} - ${lesson.title}`;
            const modalBody = document.getElementById('modalBody');
            // Build content
            let html = `<div class="passage">${lesson.passage}</div>`;
            if (lesson.questions.length > 0) {
                lesson.questions.forEach((q, idx) => {
                    html += `
                        <div class="question-item" data-qidx="${idx}">
                            <div class="question-text">${idx+1}. ${q.text}</div>
                            <div class="options">
                                ${q.options.map((opt, optIdx) => `<div class="option" data-q="${idx}" data-opt="${optIdx}">${opt}</div>`).join('')}
                            </div>
                        </div>
                    `;
                });
                html += `<button class="btn-evaluate" id="evaluateBtn">تقييم الإجابات</button>`;
            } else {
                html += `<p style="text-align:center">لا توجد أسئلة بعد، سيتم إضافتها قريباً.</p>`;
            }
            modalBody.innerHTML = html;
            // attach option click handlers
            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    const qIdx = parseInt(opt.getAttribute('data-q'));
                    const optIdx = parseInt(opt.getAttribute('data-opt'));
                    // remove selected class from same question options
                    const parent = opt.closest('.question-item');
                    parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedAnswers[qIdx] = optIdx;
                });
            });
            if (lesson.questions.length > 0) {
                document.getElementById('evaluateBtn').addEventListener('click', () => evaluateLesson());
            }
            document.getElementById('lessonModal').classList.add('active');
        }

        function evaluateLesson() {
            const lesson = lessonsData[currentLessonLevel];
            if (!lesson || lesson.questions.length === 0) {
                showToast("لا توجد أسئلة لتقييمها.");
                return;
            }
            let correctCount = 0;
            lesson.questions.forEach((q, idx) => {
                if (selectedAnswers[idx] !== undefined && selectedAnswers[idx] === q.correct) {
                    correctCount++;
                }
            });
            if (correctCount === lesson.questions.length) {
                // All correct -> complete level
                completeLevel(currentLessonLevel);
                showToast(`🎉 أحسنت! أكملت المستوى ${currentLessonLevel} بنجاح.`);
                document.getElementById('lessonModal').classList.remove('active');
            } else {
                showToast(`❌ الإجابات الصحيحة: ${correctCount} من ${lesson.questions.length}. حاول مرة أخرى.`);
            }
        }

        async function completeLevel(level) {
            if (!currentUser) return;
            // Don't complete if already completed
            if (readingProgress.completed.includes(level)) return;
            // Add to completed
            readingProgress.completed.push(level);
            // Increase current level if next level not completed and <=10
            if (level + 1 <= 10 && !readingProgress.completed.includes(level+1)) {
                readingProgress.level = level + 1;
            } else {
                // find next incomplete level
                let next = readingProgress.level;
                for (let i = 1; i <= 10; i++) {
                    if (!readingProgress.completed.includes(i)) {
                        next = i;
                        break;
                    }
                }
                readingProgress.level = next;
            }
            await saveReadingProgress();
            // Also update global level after completing
            await fetchAllProgress(); // re-fetch other skills to update global level
            updateUI();
            renderLessons();
        }

        async function saveReadingProgress() {
            if (!currentUser) return;
            await db.ref(`users/${currentUser.uid}/progress/reading`).set({
                level: readingProgress.level,
                completed: readingProgress.completed
            });
        }

        async function fetchAllProgress() {
            if (!currentUser) return;
            try {
                const snapshot = await db.ref(`users/${currentUser.uid}/progress`).once('value');
                const data = snapshot.val() || {};
                // reading
                if (data.reading) {
                    readingProgress.level = data.reading.level || 1;
                    readingProgress.completed = data.reading.completed || [];
                } else {
                    readingProgress = { level: 1, completed: [] };
                    await saveReadingProgress();
                }
                // other skills (for global level)
                otherProgress.writing = data.writing || { level: 1, completed: [] };
                otherProgress.listening = data.listening || { level: 1, completed: [] };
                otherProgress.speaking = data.speaking || { level: 1, completed: [] };
            } catch (error) {
                console.error(error);
                showToast("حدث خطأ في تحميل البيانات");
            }
        }

        // Dark mode
        function initDarkMode() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-sun"></i> نهاري';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-moon"></i> ليلي';
            }
        }
        function toggleDarkMode() {
            if (document.documentElement.hasAttribute('data-theme')) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-moon"></i> ليلي';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-sun"></i> نهاري';
            }
        }

        // Fetch user name
        async function fetchUserName(uid) {
            const snap = await db.ref(`users/${uid}/name`).once('value');
            userName = snap.val() || 'مستخدم';
            document.getElementById('userName').innerHTML = `مرحباً ${userName}`;
        }

        // Authentication
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await fetchUserName(user.uid);
                await fetchAllProgress();
                updateUI();
                renderLessons();
            } else {
                // Redirect to login
                window.location.href = 'login.html';
            }
        });

        // Event Listeners
        document.getElementById('backDashboardBtn').addEventListener('click', () => {
            window.location.href = 'dashboard.html';
        });
        document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('lessonModal').classList.remove('active');
        });
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('lessonModal');
            if (e.target === modal) modal.classList.remove('active');
        });

        initDarkMode();
    </script>
</body>
</html>
