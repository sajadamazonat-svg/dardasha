<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسهل حل | القراءة A1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root {
            --primary: #1e40af; --primary-dark: #1e3a8a; --primary-light: #3b82f6;
            --secondary: #10b981; --accent: #f59e0b; --danger: #ef4444;
            --dark: #111827; --light: #f9fafb; --gray: #4b5563; --gray-light: #e5e7eb;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e0e7ff 100%);
            --card-bg: #ffffff; --border: #e2e8f0; --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            --font-base: 0.8rem;
        }
        [data-theme="dark"] {
            --primary: #3b82f6; --primary-dark: #2563eb; --primary-light: #60a5fa;
            --secondary: #34d399; --accent: #fbbf24; --danger: #f87171;
            --dark: #f3f4f6; --light: #1f2937; --gray: #9ca3af; --gray-light: #374151;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: #1f2937; --border: #374151;
        }
        body { background: var(--bg-gradient); color: var(--dark); font-size: var(--font-base); min-height: 100vh; display: flex; flex-direction: column; transition: all 0.3s ease; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; width: 100%; }
        .header { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 8px 0; position: sticky; top: 0; z-index: 20; }
        [data-theme="dark"] .header { background: rgba(31,41,55,0.9); }
        .header-content { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .logo { display: flex; align-items: baseline; gap: 6px; text-decoration: none; flex-wrap: wrap; }
        .logo-main { font-size: 1.2rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 6px; }
        .logo-main i { font-size: 1.3rem; }
        .logo-sub { font-size: 0.56rem; background: var(--primary-light); padding: 2px 8px; border-radius: 30px; color: white; font-weight: 500; }
        .user-panel { display: flex; align-items: center; gap: 12px; background: var(--gray-light); padding: 4px 12px; border-radius: 60px; }
        .user-name { color: var(--dark); font-weight: 700; font-size: 0.8rem; }
        .user-level { background: var(--accent); color: #111827; padding: 3px 10px; border-radius: 30px; font-weight: 800; font-size: 0.7rem; }
        .back-btn { background: var(--primary-light); border: none; color: white; padding: 5px 12px; border-radius: 40px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-size: 0.75rem; }
        .theme-toggle-btn { background: var(--gray-light); border: 1px solid var(--border); color: var(--dark); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .page-title { margin: 20px 0 10px; font-size: 1.44rem; font-weight: 800; color: var(--primary); }
        .progress-card { background: var(--card-bg); border-radius: 32px; padding: 12px 16px; margin: 10px 0 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: 600; font-size: 0.8rem; }
        .progress-bar-bg { background: var(--gray-light); border-radius: 20px; height: 10px; overflow: hidden; }
        .progress-fill { background: var(--secondary); width: 0%; height: 100%; border-radius: 20px; transition: width 0.3s; }
        .level-text { margin-top: 6px; font-size: 0.68rem; color: var(--gray); }
        .lessons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .lesson-card { background: var(--card-bg); border-radius: 28px; padding: 16px; transition: all 0.2s; border: 1px solid var(--border); box-shadow: var(--shadow); cursor: pointer; position: relative; }
        .lesson-card.completed { border-right: 4px solid var(--secondary); background: linear-gradient(135deg, var(--card-bg), rgba(16,185,129,0.05)); }
        .lesson-card.current { border-right: 4px solid var(--accent); background: linear-gradient(135deg, var(--card-bg), rgba(245,158,11,0.05)); }
        .lesson-card.locked { opacity: 0.6; cursor: not-allowed; filter: grayscale(0.1); }
        .lesson-number { font-size: 1rem; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
        .lesson-status { display: inline-block; font-size: 0.6rem; padding: 2px 8px; border-radius: 30px; margin-top: 8px; font-weight: 600; }
        .status-completed { background: var(--secondary); color: white; }
        .status-current { background: var(--accent); color: white; }
        .status-locked { background: var(--gray); color: white; }
        .lock-icon { position: absolute; top: 12px; left: 12px; color: var(--gray); font-size: 0.8rem; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .lesson-modal { background: var(--card-bg); border-radius: 40px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 16px; }
        .close-modal { background: var(--light); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .reading-passage { background: var(--light); padding: 16px; border-radius: 24px; margin-bottom: 16px; line-height: 1.6; font-size: 0.85rem; }
        .quiz-question { margin-bottom: 18px; }
        .quiz-options { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
        .quiz-option { background: var(--light); padding: 8px 14px; border-radius: 60px; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; font-size: 0.8rem; }
        .quiz-option.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .quiz-feedback { margin-top: 6px; font-size: 0.7rem; }
        .action-btn { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; margin-top: 12px; font-size: 0.8rem; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 6px 16px; border-radius: 40px; z-index: 2000; display: none; font-size: 0.7rem; }
        @media (max-width: 700px) { .lessons-grid { grid-template-columns: 1fr; } .header-content { flex-direction: column; } .user-panel { justify-content: space-between; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <div class="logo-main"><i class="fas fa-chalkboard-user"></i><span>اسهل حل</span></div>
                <div class="logo-sub">تعلم الإنجليزية</div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div class="user-panel">
                    <i class="fas fa-user-circle" style="color:var(--primary);"></i>
                    <span class="user-name" id="user-name">...</span>
                    <span class="user-level" id="global-level">المستوى: 1</span>
                    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة</a>
                </div>
                <div class="theme-toggle-btn" id="themeToggle"><i class="fas fa-sun" id="themeIcon"></i></div>
            </div>
        </div>
    </header>
    <div class="container">
        <h1 class="page-title"><i class="fas fa-book-open"></i> القراءة A1</h1>
        <div class="progress-card">
            <div class="progress-header"><span>التقدم في القراءة</span><span id="reading-percent">0%</span></div>
            <div class="progress-bar-bg"><div class="progress-fill" id="reading-progress-fill"></div></div>
            <div class="level-text" id="reading-level-text">المستوى الحالي: 1 من 10</div>
        </div>
        <div class="lessons-grid" id="lessons-grid"></div>
    </div>
    <div id="lesson-modal" class="modal-overlay">
        <div class="lesson-modal">
            <div class="modal-header"><h3 id="modal-title"></h3><div class="close-modal" id="close-modal-btn"><i class="fas fa-times"></i></div></div>
            <div id="modal-content"></div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAG4EKrB3iLEV2hsB8b08ShpSO6PXDnGjg",
            authDomain: "zio3-8ffdd.firebaseapp.com",
            databaseURL: "https://zio3-8ffdd-default-rtdb.firebaseio.com",
            projectId: "zio3-8ffdd",
            storageBucket: "zio3-8ffdd.firebasestorage.app",
            messagingSenderId: "560939348415",
            appId: "1:560939348415:web:c854e9e214e498ad2d310a"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const readingLessons = {
            1: { title: "My Family", passage: "I have a small family. My father is a teacher. My mother is a doctor. I have one brother. We live in a big house.", questions: [{ text: "What is father's job?", options: ["Doctor","Teacher","Engineer","Nurse"], correct:1 }, { text: "How many brothers does the speaker have?", options: ["Two","One","Three","None"], correct:1 }, { text: "Where do they live?", options: ["Small house","Big house","Apartment","Farm"], correct:1 }] },
            2: { title: "Daily Routine", passage: "I wake up at 6 AM. I eat breakfast at 7. Then I go to school. I study until 2 PM. After that, I play football.", questions: [{ text: "What time does he wake up?", options: ["7 AM","6 AM","8 AM","5 AM"], correct:1 }, { text: "What does he do after school?", options: ["Watch TV","Play football","Sleep","Study"], correct:1 }, { text: "What time does he eat breakfast?", options: ["6 AM","8 AM","7 AM","9 AM"], correct:2 }] },
            3: { title: "At the Supermarket", passage: "Yesterday, I went to the supermarket. I bought apples, milk, and bread. The apples were $2, milk $3, bread $1. I paid with my credit card.", questions: [{ text: "What did he buy?", options: ["Oranges, milk, bread","Apples, milk, bread","Apples, juice, bread","Apples, milk, cake"], correct:1 }, { text: "How much did he pay for milk?", options: ["$2","$3","$1","$5"], correct:1 }, { text: "How did he pay?", options: ["Cash","Credit card","Check","Mobile"], correct:1 }] }
        };
        for (let i=4; i<=10; i++) readingLessons[i] = { title: `المستوى ${i} (قريباً)`, passage: `نص للمستوى ${i} سيتم إضافته قريباً.`, questions: [{ text: "سؤال تجريبي", options: ["خيار 1","خيار 2","خيار 3","خيار 4"], correct:0 }] };

        let currentUser = null, readingData = { level: 1, completed: [] }, userProgress = {};
        const userNameSpan = document.getElementById('user-name'), globalLevelSpan = document.getElementById('global-level');
        const readingPercentSpan = document.getElementById('reading-percent'), readingProgressFill = document.getElementById('reading-progress-fill');
        const readingLevelText = document.getElementById('reading-level-text'), lessonsGrid = document.getElementById('lessons-grid');
        const themeToggle = document.getElementById('themeToggle'), themeIcon = document.getElementById('themeIcon'), toast = document.getElementById('toast');
        const modal = document.getElementById('lesson-modal'), modalTitle = document.getElementById('modal-title'), modalContent = document.getElementById('modal-content'), closeModalBtn = document.getElementById('close-modal-btn');

        function showToast(msg, isError=false) { toast.textContent = msg; toast.style.backgroundColor = isError ? '#ef4444' : '#10b981'; toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 3000); }
        function computeGlobalLevel() { let total = 0; for (let s in userProgress) total += (userProgress[s]?.completed?.length || 0); let lvl = Math.floor((total/40)*100)+1; return lvl>100?100:lvl<1?1:lvl; }
        async function saveProgress() { if(currentUser) await db.ref(`users/${currentUser.uid}/progress/reading`).set(readingData); updateUI(); }
        async function completeLevel(level) { if(!readingData.completed.includes(level)) { readingData.completed.push(level); readingData.level = Math.min(readingData.level+1,10); await saveProgress(); showToast(`🎉 أكملت المستوى ${level}`); } }
        function updateUI() {
            let completed = readingData.completed.length, percent = (completed/10)*100;
            readingPercentSpan.innerText = Math.round(percent)+'%'; readingProgressFill.style.width = percent+'%'; readingLevelText.innerText = `المستوى الحالي: ${readingData.level} من 10`;
            globalLevelSpan.innerText = `المستوى: ${computeGlobalLevel()}`;
            let html = '';
            for(let i=1; i<=10; i++) {
                let isCompleted = readingData.completed.includes(i), isCurrent = (i===readingData.level && !isCompleted), isLocked = (i>readingData.level && !isCompleted);
                let cls = isCompleted ? 'completed' : (isCurrent ? 'current' : (isLocked ? 'locked' : ''));
                let status = isCompleted ? '<span class="lesson-status status-completed"><i class="fas fa-check-circle"></i> مكتمل</span>' : (isCurrent ? '<span class="lesson-status status-current"><i class="fas fa-play-circle"></i> المستوى الحالي</span>' : (isLocked ? '<span class="lesson-status status-locked"><i class="fas fa-lock"></i> مقفل</span>' : ''));
                let lockIcon = isLocked ? '<i class="fas fa-lock lock-icon"></i>' : '';
                html += `<div class="lesson-card ${cls}" data-level="${i}" data-clickable="${!isLocked}">${lockIcon}<div class="lesson-number">المستوى ${i}</div><div>${status}</div></div>`;
            }
            lessonsGrid.innerHTML = html;
            document.querySelectorAll('.lesson-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    let level = parseInt(card.dataset.level);
                    let clickable = card.dataset.clickable === 'true';
                    if(!clickable) { showToast('هذا المستوى مقفل، أكمل المستويات السابقة أولاً', true); return; }
                    openLesson(level);
                });
            });
        }
        function openLesson(level) {
            let lesson = readingLessons[level];
            if(!lesson) return;
            modalTitle.innerText = `المستوى ${level} - ${lesson.title}`;
            let html = `<div class="reading-passage">${lesson.passage}</div>`;
            lesson.questions.forEach((q, idx) => {
                html += `<div class="quiz-question" data-qidx="${idx}"><strong>${idx+1}. ${q.text}</strong><div class="quiz-options">`;
                q.options.forEach((opt, optIdx) => { html += `<div class="quiz-option" data-q="${idx}" data-opt="${optIdx}">${opt}</div>`; });
                html += `</div><div class="quiz-feedback" id="fb-${idx}"></div></div>`;
            });
            html += `<button id="submit-lesson" class="action-btn">تقييم الإجابات</button>`;
            modalContent.innerHTML = html;
            modal.classList.add('active');

            let answers = {};
            function attachOptionHandlers() {
                document.querySelectorAll('#modal-content .quiz-option').forEach(opt => {
                    opt.onclick = () => {
                        let qIdx = parseInt(opt.dataset.q), optIdx = parseInt(opt.dataset.opt);
                        answers[qIdx] = optIdx;
                        opt.closest('.quiz-question').querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                    };
                });
            }
            attachOptionHandlers();
            document.getElementById('submit-lesson').onclick = async () => {
                let correct = 0;
                lesson.questions.forEach((q, idx) => {
                    let fb = document.getElementById(`fb-${idx}`);
                    let userChoice = answers[idx];
                    if(userChoice === undefined) fb.innerHTML = '<span style="color:var(--danger);">⚠️ لم تاختر إجابة</span>';
                    else if(userChoice === q.correct) { correct++; fb.innerHTML = '<span style="color:var(--secondary);">✅ صحيح</span>'; }
                    else fb.innerHTML = `<span style="color:var(--danger);">❌ خطأ. الإجابة: ${q.options[q.correct]}</span>`;
                });
                if(correct === lesson.questions.length) {
                    if(!readingData.completed.includes(level)) await completeLevel(level);
                    modal.classList.remove('active');
                } else showToast(`نتيجتك: ${correct} من ${lesson.questions.length} صحيحة`, true);
            };
        }
        function closeModal() { modal.classList.remove('active'); }
        async function loadUserData(uid) {
            let snap = await db.ref(`users/${uid}/progress`).get();
            if(snap.exists()) { userProgress = snap.val(); readingData = userProgress.reading || { level:1, completed:[] }; }
            else { userProgress = { reading:{ level:1, completed:[] }, writing:{ level:1, completed:[] }, listening:{ level:1, completed:[] }, speaking:{ level:1, completed:[] } }; readingData = userProgress.reading; await db.ref(`users/${uid}/progress`).set(userProgress); }
            updateUI();
        }
        if(localStorage.getItem('darkMode')==='true') { document.documentElement.setAttribute('data-theme','dark'); themeIcon.classList.replace('fa-sun','fa-moon'); }
        themeToggle.onclick = () => {
            let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if(isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('darkMode','false'); themeIcon.classList.replace('fa-moon','fa-sun'); }
            else { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('darkMode','true'); themeIcon.classList.replace('fa-sun','fa-moon'); }
        };
        closeModalBtn.onclick = closeModal;
        modal.onclick = (e) => { if(e.target === modal) closeModal(); };
        auth.onAuthStateChanged(async (user) => {
            if(user) { currentUser = user; let ud = await db.ref(`users/${user.uid}`).once('value'); userNameSpan.innerText = ud.val()?.name || user.displayName || user.email.split('@')[0]; await loadUserData(user.uid); }
            else window.location.href = 'login.html';
        });
    </script>
</body>
</html>
