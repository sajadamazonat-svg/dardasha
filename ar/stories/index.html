<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>كتاب صور 3D</title>
  <style>
    :root{
      --bg1:#0b0f14;
      --paper:#fbf7ef;
      --ink:#1d1d1d;
      --flip-speed: .95s;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html, body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family: Arial, Tahoma, sans-serif;
      background:
        radial-gradient(circle at top, #1c2430 0%, var(--bg1) 45%, #05070a 100%);
      color:#fff;
      overflow-x:hidden;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      min-height:100vh;
    }

    .app{
      width:min(100%, 980px);
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:center;
    }

    .topbar{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:0 6px;
    }

    .titlebox{
      text-align:right;
    }

    .titlebox h1{
      margin:0;
      font-size:clamp(20px, 3.5vw, 30px);
      line-height:1.2;
    }

    .titlebox p{
      margin:6px 0 0;
      font-size:13px;
      color:#b9c3cf;
    }

    .counter{
      min-width:86px;
      text-align:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      backdrop-filter: blur(8px);
    }

    .stage{
      width:100%;
      display:flex;
      justify-content:center;
      perspective: 2200px;
    }

    .book{
      position:relative;
      width:min(92vw, 460px);
      aspect-ratio: 3 / 4.25;
      transform-style:preserve-3d;
      filter: drop-shadow(0 30px 45px rgba(0,0,0,.55));
    }

    .book::before{
      content:"";
      position:absolute;
      inset:-10px -14px;
      border-radius:26px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), transparent 18%, transparent 82%, rgba(0,0,0,.18)),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.18));
      transform: translateZ(-40px);
      z-index:0;
      pointer-events:none;
    }

    .spine{
      position:absolute;
      top:0;
      bottom:0;
      left:50%;
      width:18px;
      transform:translateX(-50%) translateZ(1px);
      background: linear-gradient(180deg, #7c5a3a, #40291c 42%, #1f1310 100%);
      box-shadow:
        inset 0 0 12px rgba(255,255,255,.08),
        0 0 24px rgba(0,0,0,.35);
      border-radius: 12px;
      z-index:1;
      opacity:.85;
    }

    .sheet{
      position:absolute;
      inset:0;
      transform-style:preserve-3d;
      transform-origin: left center;
      transition: transform var(--flip-speed) cubic-bezier(.22,.61,.18,1);
      border-radius:24px;
      overflow:hidden;
      will-change: transform;
      z-index:1;
    }

    .sheet.flipped{
      transform: rotateY(-180deg);
    }

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      overflow:hidden;
      border-radius:24px;
      background: var(--paper);
    }

    .front{
      position:relative;
      background:#efe6d8;
    }

    .front .img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      transform: scale(1.01);
    }

    .front::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.42) 58%, rgba(0,0,0,.72)),
        radial-gradient(circle at 50% 15%, rgba(255,255,255,.18), transparent 35%);
      pointer-events:none;
    }

    .caption{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:3;
      padding:18px 18px 16px;
      text-align:right;
      color:#fff;
    }

    .caption .story-title{
      margin:0 0 6px;
      font-size:20px;
      font-weight:700;
      line-height:1.3;
      text-shadow:0 3px 10px rgba(0,0,0,.6);
    }

    .caption .story-sub{
      margin:0;
      font-size:13px;
      color:rgba(255,255,255,.9);
      line-height:1.6;
      text-shadow:0 2px 8px rgba(0,0,0,.5);
    }

    .back{
      transform: rotateY(180deg);
      background:
        linear-gradient(135deg, #fcfaf5 0%, #f3eadb 100%);
    }

    .paper-lines{
      position:absolute;
      inset:0;
      opacity:.9;
      background-image:
        linear-gradient(to bottom, rgba(70,54,34,.08) 1px, transparent 1px);
      background-size: 100% 30px;
      pointer-events:none;
    }

    .back .back-content{
      position:absolute;
      inset:0;
      padding:22px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      color:var(--ink);
      text-align:right;
    }

    .back .mini{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      color:#6f655a;
    }

    .back .note{
      margin-top:auto;
      font-size:18px;
      line-height:1.9;
      font-weight:700;
      color:#222;
    }

    .back .hint{
      font-size:13px;
      color:#7a6c5b;
      line-height:1.7;
      margin-top:10px;
    }

    .sheen{
      position:absolute;
      inset:0;
      background: linear-gradient(90deg, rgba(255,255,255,.0) 0%, rgba(255,255,255,.14) 48%, rgba(255,255,255,.0) 100%);
      transform: translateX(-120%);
      pointer-events:none;
      opacity:0;
      z-index:2;
    }

    .sheet.flipped .sheen{
      opacity:1;
      animation:sheenMove var(--flip-speed) ease;
    }

    @keyframes sheenMove{
      0%{ transform: translateX(-120%); opacity:0; }
      35%{ opacity:.65; }
      100%{ transform: translateX(120%); opacity:0; }
    }

    .controls{
      width:100%;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:2px;
    }

    .btn{
      border:0;
      border-radius:16px;
      padding:13px 18px;
      min-width:110px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      background: rgba(255,255,255,.92);
      color:#111;
      box-shadow: 0 10px 25px rgba(0,0,0,.22);
    }

    .btn:active{
      transform: scale(.98);
    }

    .btn.secondary{
      background: rgba(255,255,255,.12);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
      box-shadow:none;
    }

    .footer{
      font-size:12px;
      color:#b9c3cf;
      text-align:center;
      line-height:1.8;
      max-width:720px;
    }

    @media (max-width: 520px){
      .topbar{
        flex-direction:column;
        align-items:stretch;
      }
      .counter{
        align-self:flex-start;
      }
      .book{
        width:96vw;
      }
      .caption .story-title{
        font-size:18px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      .sheet, .sheen{
        transition:none !important;
        animation:none !important;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="titlebox">
      <h1>كتاب صور 3D</h1>
      <p>النص فوق الصورة، وكل الصفحات تستخدم page1.jpg</p>
    </div>
    <div class="counter" id="counter">1 / 1</div>
  </div>

  <div class="stage">
    <div class="book" id="book">
      <div class="spine"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn secondary" id="prevBtn">السابق</button>
    <button class="btn" id="nextBtn">التالي</button>
  </div>

  <div class="footer">
    ضع صورة واحدة فقط باسم <b>page1.jpg</b> داخل مجلد stories.
    <br>
    جميع الصفحات ستستخدم نفس الصورة مع نص مختلف فوقها.
  </div>
</div>

<script>
  const pages = [
    { image: "page1.jpg", title: "غلاف القصة", sub: "رحلة تبدأ من الغلاف", note: "في مدينةٍ هادئة، كان هناك كتاب قديم ينام على رفٍ خشبي منذ سنوات." },
    { image: "page1.jpg", title: "الصفحة الأولى", sub: "الليلة التي تغيّر فيها كل شيء", note: "في إحدى الليالي، فتحت ليلى الكتاب ووجدت بين صفحاته رسالةً مكتوبة بخطٍ صغير." },
    { image: "page1.jpg", title: "الصفحة الثانية", sub: "الرسالة الغامضة", note: "قالت الرسالة: إذا أردتِ معرفة الحقيقة، فاتّبعي الضوء الذي لا يراه أحد." },
    { image: "page1.jpg", title: "الصفحة الثالثة", sub: "البداية نحو المجهول", note: "خرجت ليلى من البيت، وسارت في الأزقة حتى وصلت إلى بوابة قديمة خلف الحديقة." },
    { image: "page1.jpg", title: "الصفحة الرابعة", sub: "الباب السري", note: "عندما دفعت الباب، انفتح على ممرٍ طويل مضاءٍ بمصابيح خافتة، وكأن المكان ينتظرها." },
    { image: "page1.jpg", title: "الصفحة الخامسة", sub: "النهاية الجميلة", note: "في نهاية الممر وجدت صندوقًا صغيرًا بداخله مفتاحًا وورقةً تقول: لقد عثرتِ على شجاعتك." }
  ];

  const book = document.getElementById("book");
  const counter = document.getElementById("counter");
  const nextBtn = document.getElementById("nextBtn");
  const prevBtn = document.getElementById("prevBtn");

  let current = 0;
  let isAnimating = false;

  function createSheets(){
    pages.forEach((page, i) => {
      const sheet = document.createElement("div");
      sheet.className = "sheet";
      sheet.dataset.index = i;
      sheet.style.zIndex = (pages.length - i) * 10;

      sheet.innerHTML = `
        <div class="face front">
          <img class="img" src="${page.image}" alt="${page.title}">
          <div class="caption">
            <p class="story-title">${page.title}</p>
            <p class="story-sub">${page.sub}</p>
          </div>
          <div class="sheen"></div>
        </div>

        <div class="face back">
          <div class="paper-lines"></div>
          <div class="back-content">
            <div class="mini">
              <span>stories</span>
              <span>${i + 1} / ${pages.length}</span>
            </div>
            <div>
              <div class="note">${page.note}</div>
              <div class="hint">اضغط أو اسحب للانتقال بين الصفحات</div>
            </div>
            <div class="mini">
              <span>صفحة متحركة</span>
              <span>3D</span>
            </div>
          </div>
        </div>
      `;

      sheet.addEventListener("click", () => {
        if (i === current) {
          nextPage();
        } else if (i === current - 1) {
          prevPage();
        }
      });

      book.appendChild(sheet);
    });

    refreshState(false);
  }

  function sheets(){
    return [...document.querySelectorAll(".sheet")];
  }

  function refreshState(animate = true){
    const all = sheets();

    all.forEach((sheet, i) => {
      sheet.style.transitionDuration = animate ? "var(--flip-speed)" : "0s";

      if (i < current) {
        sheet.classList.add("flipped");
        sheet.style.zIndex = i + 1;
      } else {
        sheet.classList.remove("flipped");
        sheet.style.zIndex = (pages.length - i) + 20;
      }
    });

    if (all[current]) {
      all[current].style.zIndex = 999;
    }

    counter.textContent = `${Math.min(current + 1, pages.length)} / ${pages.length}`;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === pages.length - 1;

    prevBtn.style.opacity = current === 0 ? .5 : 1;
    nextBtn.style.opacity = current === pages.length - 1 ? .5 : 1;
  }

  function nextPage(){
    if (isAnimating || current >= pages.length - 1) return;
    isAnimating = true;

    const all = sheets();
    const sheet = all[current];
    sheet.classList.add("flipped");
    sheet.style.zIndex = 1;

    current += 1;
    refreshState(true);

    setTimeout(() => {
      isAnimating = false;
      refreshState(true);
    }, 980);
  }

  function prevPage(){
    if (isAnimating || current <= 0) return;
    isAnimating = true;

    current -= 1;
    const all = sheets();
    const sheet = all[current];
    sheet.classList.remove("flipped");
    sheet.style.zIndex = 999;

    refreshState(true);

    setTimeout(() => {
      isAnimating = false;
      refreshState(true);
    }, 980);
  }

  nextBtn.addEventListener("click", nextPage);
  prevBtn.addEventListener("click", prevPage);

  let touchStartX = 0;
  let touchEndX = 0;

  book.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  book.addEventListener("touchend", (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;

    if (Math.abs(diff) > 40) {
      if (diff > 0) nextPage();
      else prevPage();
    }
  }, { passive: true });

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") nextPage();
    if (e.key === "ArrowLeft") prevPage();
  });

  createSheets();
</script>

</body>
</html>
