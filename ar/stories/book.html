<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>اسهل حل | كتاب ثلاثي الأبعاد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Cairo', 'Tahoma', sans-serif;
      background: linear-gradient(135deg, #1e2a3a 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .app {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    /* الشريط العلوي */
    .topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 10px 16px;
    }

    .titlebox h1 {
      font-size: 18px;
      font-weight: 700;
      color: white;
      margin: 0;
    }

    .titlebox p {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.6);
      margin: 2px 0 0;
    }

    .counter {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* المسرح ثلاثي الأبعاد */
    .stage {
      width: 100%;
      display: flex;
      justify-content: center;
      perspective: 2000px;
    }

    .book {
      position: relative;
      width: 100%;
      max-width: 360px;
      aspect-ratio: 3 / 4.2;
      transform-style: preserve-3d;
      filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.4));
    }

    .spine {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 14px;
      transform: translateX(-50%) translateZ(2px);
      background: linear-gradient(180deg, #8b5a2b, #5a3a1a, #3a2a10);
      border-radius: 8px;
      z-index: 100;
    }

    .sheet {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform 0.85s cubic-bezier(0.23, 1, 0.32, 1);
      border-radius: 16px;
      cursor: pointer;
    }

    .sheet.flipped {
      transform: rotateY(-180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 16px;
      overflow: hidden;
    }

    /* الوجه الأمامي */
    .front {
      background: #f5efe7;
    }

    .front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .front .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.75), transparent);
      padding: 20px 16px 14px;
      text-align: right;
    }

    .front .story-title {
      font-size: 18px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }

    .front .story-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.85);
    }

    /* الوجه الخلفي */
    .back {
      transform: rotateY(180deg);
      background: #fffaf0;
    }

    .back-content {
      position: absolute;
      inset: 0;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: right;
    }

    .back-header {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #8b7355;
    }

    .back-note {
      font-size: 16px;
      line-height: 1.7;
      font-weight: 600;
      color: #2d2a24;
      margin: 20px 0;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .back-footer {
      font-size: 11px;
      color: #b8a07c;
      display: flex;
      justify-content: space-between;
    }

    /* تأثير اللمعان */
    .sheen {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: translateX(-100%);
      pointer-events: none;
      z-index: 2;
    }

    .sheet.flipped .sheen {
      animation: sheenMove 0.85s ease;
    }

    @keyframes sheenMove {
      0% { transform: translateX(-100%); opacity: 0; }
      30% { opacity: 0.5; }
      100% { transform: translateX(100%); opacity: 0; }
    }

    /* أزرار التحكم */
    .controls {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 4px;
    }

    .btn {
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s;
      font-family: 'Cairo', sans-serif;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-link {
      background: rgba(0, 0, 0, 0.3);
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      margin-top: 8px;
    }

    /* تحسين للهواتف الصغيرة */
    @media (max-width: 480px) {
      body {
        padding: 8px;
      }
      .book {
        max-width: 320px;
      }
      .front .story-title {
        font-size: 16px;
      }
      .back-note {
        font-size: 14px;
      }
      .btn {
        padding: 10px 20px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="titlebox">
      <h1 id="book-title">الكتاب</h1>
      <p>اضغط على الصفحة لقلبها</p>
    </div>
    <div class="counter" id="counter">1 / 6</div>
  </div>

  <div class="stage">
    <div class="book" id="book">
      <div class="spine"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" id="prevBtn">السابق</button>
    <button class="btn btn-primary" id="nextBtn">التالي</button>
    <a href="index.html" class="btn btn-link">الرئيسية</a>
  </div>

  <div class="footer">
    اسحب يميناً أو يساراً على الكتاب لقلب الصفحات
  </div>
</div>

<script>
  // محتوى الصفحات - كل الصفحات تستخدم page1.jpg
  const pages = [
    {
      image: "page1.jpg",
      title: "غلاف القصة",
      sub: "رحلة تبدأ من هنا",
      note: "مرحباً بك في عالم القصص الملهمة. كل صفحة تحمل حكاية جديدة تنتظر من يكتشفها."
    },
    {
      image: "page1.jpg",
      title: "قصة الأمل",
      sub: "لا شيء مستحيل",
      note: "العلم نور والمثابرة مفتاح كل باب. ابدأ رحلتك اليوم واصنع مستقبلك بيديك."
    },
    {
      image: "page1.jpg",
      title: "يد العون",
      sub: "العطاء يبدأ من القلب",
      note: "شارك الخير مع غيرك فالعطاء لا ينقص المال بل يزيد البركة ويضاعف الأجر."
    },
    {
      image: "page1.jpg",
      title: "ابتسامة الحياة",
      sub: "الأمل يولد من جديد",
      note: "حتى في أصعب الظروف تبقى الكلمة طوق نجاة والابتسامة مفتاح القلوب."
    },
    {
      image: "page1.jpg",
      title: "مشوار النجاح",
      sub: "لا تنتظر الفرصة بل اصنعها",
      note: "النجاح ليس حكراً على أحد فقط عليك أن تبدأ ولا تستسلم مهما كانت الصعاب."
    },
    {
      image: "page1.jpg",
      title: "ختاماً",
      sub: "وتبقى الذكرى",
      note: "شكراً لرفقتك في هذه الرحلة. نتمنى أن تكون القصص قد ألهمتك وأضافت إلى حياتك."
    }
  ];

  const book = document.getElementById("book");
  const counter = document.getElementById("counter");
  const nextBtn = document.getElementById("nextBtn");
  const prevBtn = document.getElementById("prevBtn");
  const bookTitleSpan = document.getElementById("book-title");

  // جلب عنوان الكتاب من الصفحة السابقة
  const savedTitle = sessionStorage.getItem('bookTitle');
  if (savedTitle) {
    bookTitleSpan.textContent = savedTitle;
  }

  let current = 0;
  let isAnimating = false;

  function createSheets() {
    pages.forEach((page, i) => {
      const sheet = document.createElement("div");
      sheet.className = "sheet";
      sheet.dataset.index = i;
      sheet.style.zIndex = (pages.length - i) * 10;

      sheet.innerHTML = `
        <div class="face front">
          <img src="${page.image}" alt="${page.title}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22560%22%20viewBox%3D%220%200%20400%20560%22%3E%3Crect%20width%3D%22400%22%20height%3D%22560%22%20fill%3D%22%23e2e8f0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2216%22%20fill%3D%22%2364748b%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%3E${page.title}%3C%2Ftext%3E%3C%2Fsvg%3E'">
          <div class="caption">
            <div class="story-title">${page.title}</div>
            <div class="story-sub">${page.sub}</div>
          </div>
          <div class="sheen"></div>
        </div>
        <div class="face back">
          <div class="back-content">
            <div class="back-header">
              <span>اسهل حل</span>
              <span>${i + 1} / ${pages.length}</span>
            </div>
            <div class="back-note">${page.note}</div>
            <div class="back-footer">
              <span>قراءة ممتعة</span>
              <span>${page.title}</span>
            </div>
          </div>
        </div>
      `;

      sheet.addEventListener("click", (e) => {
        e.stopPropagation();
        const idx = parseInt(sheet.dataset.index);
        if (idx === current) {
          nextPage();
        } else if (idx === current - 1) {
          prevPage();
        }
      });

      book.appendChild(sheet);
    });

    refreshState(false);
  }

  function getAllSheets() {
    return [...document.querySelectorAll(".sheet")];
  }

  function refreshState(animate = true) {
    const all = getAllSheets();

    all.forEach((sheet, i) => {
      sheet.style.transitionDuration = animate ? "0.85s" : "0s";

      if (i < current) {
        sheet.classList.add("flipped");
        sheet.style.zIndex = i + 1;
      } else {
        sheet.classList.remove("flipped");
        sheet.style.zIndex = (pages.length - i) + 20;
      }
    });

    if (all[current]) {
      all[current].style.zIndex = 999;
    }

    counter.textContent = `${current + 1} / ${pages.length}`;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === pages.length - 1;
    prevBtn.style.opacity = current === 0 ? "0.5" : "1";
    nextBtn.style.opacity = current === pages.length - 1 ? "0.5" : "1";
  }

  function nextPage() {
    if (isAnimating || current >= pages.length - 1) return;
    isAnimating = true;

    const all = getAllSheets();
    const sheet = all[current];
    sheet.classList.add("flipped");
    sheet.style.zIndex = 1;

    current++;
    refreshState(true);

    setTimeout(() => {
      isAnimating = false;
      refreshState(true);
    }, 850);
  }

  function prevPage() {
    if (isAnimating || current <= 0) return;
    isAnimating = true;

    current--;
    const all = getAllSheets();
    const sheet = all[current];
    sheet.classList.remove("flipped");
    sheet.style.zIndex = 999;

    refreshState(true);

    setTimeout(() => {
      isAnimating = false;
      refreshState(true);
    }, 850);
  }

  nextBtn.addEventListener("click", nextPage);
  prevBtn.addEventListener("click", prevPage);

  // دعم السحب باللمس
  let touchStartX = 0;

  book.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].clientX;
  }, { passive: true });

  book.addEventListener("touchend", (e) => {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchStartX - touchEndX;

    if (Math.abs(diff) > 35) {
      if (diff > 0) {
        nextPage();
      } else {
        prevPage();
      }
    }
  }, { passive: true });

  // دعم لوحة المفاتيح
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") nextPage();
    if (e.key === "ArrowLeft") prevPage();
  });

  // إنشاء الصفحات
  createSheets();
</script>
</body>
</html>
