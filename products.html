    function normalizeProduct(raw, key) {
      // إذا كانت القيمة نصاً
      if (typeof raw === 'string') {
        return { id: String(key), name: raw, price: '', image: '', category: '', description: '', stock: '' };
      }
      // إذا كانت القيمة ليست كائنًا
      if (typeof raw !== 'object' || raw === null) {
        return null;
      }

      // استخراج الحقول بأسماء مختلفة
      const name = raw.name || raw.title || raw.productName || raw.product_name || '';
      const price = raw.price ?? raw.salePrice ?? raw.amount ?? raw.cost ?? '';
      const image = raw.image || raw.imageUrl || raw.img || raw.photo || raw.picture || '';
      const category = raw.category || raw.type || raw.group || raw.cat || '';
      const description = raw.description || raw.desc || raw.shortDescription || '';
      const stock = raw.stock ?? raw.quantity ?? raw.inventory ?? '';

      if (!name && !image && price === '') {

        // لكننا سنحاول الاحتفاظ به بالمعرف فقط
      }

      return {
        id: String(key),

        price: price,
        image: image,
        category: category || '',
        description: description || '',
        stock: stock,
        raw: raw // للرجوع إليه
      };
    }
