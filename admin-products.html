<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lidercenter - إدارة المنتجات</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f4f6fa;
      --card: #ffffff;
      --text: #0b0e14;
      --text-muted: #5e6879;
      --border: #e2e7ef;
      --primary: #0b0e14;
      --danger: #dc3545;
      --success: #28a745;
      --radius: 18px;
      --shadow: 0 10px 30px rgba(0,0,0,.06);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 18px;
    }

    h1, h2, h3 {
      margin-bottom: 12px;
    }

    .muted {
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.8;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    input, textarea, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(11,14,20,.06);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: .2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: .7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-danger {
      background: var(--danger);
    }

    .status {
      margin-top: 12px;
      font-weight: 700;
      min-height: 24px;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      vertical-align: middle;
    }

    th {
      font-size: .85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .thumb {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--bg);
      display: block;
    }

    .placeholder {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: var(--bg);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .72rem;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .full { grid-column: 1; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>إدارة المنتجات</h1>
      <p class="muted">أضف منتج جديد إلى Realtime Database، وشوف المنتجات الموجودة واحذفها من نفس الصفحة.</p>

      <form id="addProductForm" class="grid">
        <div>
          <label for="productName">اسم المنتج *</label>
          <input type="text" id="productName" placeholder="مثال: آيفون 15" required />
        </div>

        <div>
          <label for="productPrice">السعر *</label>
          <input type="number" id="productPrice" placeholder="مثال: 499" step="0.01" required />
        </div>

        <div>
          <label for="productCategory">التصنيف</label>
          <input type="text" id="productCategory" placeholder="مثال: إلكترونيات" />
        </div>

        <div>
          <label for="productStock">المخزون</label>
          <input type="number" id="productStock" placeholder="مثال: 10" step="1" />
        </div>

        <div class="full">
          <label for="productImage">رابط الصورة *</label>
          <input type="url" id="productImage" placeholder="https://example.com/image.jpg" required />
        </div>

        <div class="full">
          <label for="productDescription">الوصف</label>
          <textarea id="productDescription" placeholder="وصف المنتج"></textarea>
        </div>

        <div class="full">
          <button type="submit" id="submitBtn">إضافة المنتج</button>
          <div id="status" class="status"></div>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>المنتجات الموجودة</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>الصورة</th>
              <th>الاسم</th>
              <th>السعر</th>
              <th>التصنيف</th>
              <th>المخزون</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr>
              <td colspan="6">جاري تحميل المنتجات...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
    import { getDatabase, ref, push, set, onValue, remove } from "firebase/database";

    const firebaseConfig = {
      apiKey: "PUT_YOUR_API_KEY_HERE",
      authDomain: "PUT_YOUR_AUTH_DOMAIN_HERE",
      databaseURL: "https://YOUR-PROJECT-default-rtdb.firebaseio.com",
      projectId: "PUT_YOUR_PROJECT_ID_HERE",
      storageBucket: "PUT_YOUR_STORAGE_BUCKET_HERE",
      messagingSenderId: "PUT_YOUR_MESSAGING_SENDER_ID_HERE",
      appId: "PUT_YOUR_APP_ID_HERE"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const ADMIN_EMAIL = "ashlhl.iq@gmail.com";

    const form = document.getElementById("addProductForm");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const tableBody = document.getElementById("productsTableBody");

    const productName = document.getElementById("productName");
    const productPrice = document.getElementById("productPrice");
    const productCategory = document.getElementById("productCategory");
    const productStock = document.getElementById("productStock");
    const productImage = document.getElementById("productImage");
    const productDescription = document.getElementById("productDescription");

    function showStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderEmpty(message) {
      tableBody.innerHTML = `<tr><td colspan="6">${message}</td></tr>`;
    }

    function loadProducts() {
      const productsRef = ref(db, "products");

      onValue(productsRef, (snapshot) => {
        const data = snapshot.val();

        if (!data) {
          renderEmpty("لا توجد منتجات حتى الآن");
          return;
        }

        const rows = Object.entries(data).map(([id, p]) => {
          const name = escapeHtml(p?.name || "بدون اسم");
          const price = p?.price ?? "";
          const category = escapeHtml(p?.category || "—");
          const stock = p?.stock ?? "—";
          const image = p?.image || "";

          return `
            <tr>
              <td>
                ${
                  image
                    ? `<img class="thumb" src="${escapeHtml(image)}" alt="${name}" onerror="this.style.display='none'">`
                    : `<div class="placeholder">لا توجد</div>`
                }
              </td>
              <td><strong>${name}</strong></td>
              <td>${price !== "" ? Number(price).toLocaleString() : "—"}</td>
              <td>${category}</td>
              <td>${stock}</td>
              <td>
                <div class="actions">
                  <button class="btn-danger" data-delete="${id}" type="button">حذف</button>
                </div>
              </td>
            </tr>
          `;
        }).join("");

        tableBody.innerHTML = rows;

        document.querySelectorAll("[data-delete]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-delete");
            if (!confirm("متأكد تريد حذف هذا المنتج؟")) return;

            try {
              await remove(ref(db, `products/${id}`));
              showStatus("تم حذف المنتج بنجاح", "success");
            } catch (error) {
              console.error(error);
              showStatus("خطأ بالحذف: " + error.message, "error");
            }
          });
        });
      }, (error) => {
        console.error("loadProducts error:", error);
        renderEmpty("فشل تحميل المنتجات");
      });
    }

    onAuthStateChanged(auth, async (user) => {
      try {
        if (!user) {
          window.location.href = "login.html";
          return;
        }

        if (user.email !== ADMIN_EMAIL) {
          window.location.href = "home.html";
          return;
        }

        loadProducts();
      } catch (error) {
        console.error(error);
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = productName.value.trim();
      const price = Number(productPrice.value);
      const category = productCategory.value.trim();
      const stock = Number(productStock.value || 0);
      const image = productImage.value.trim();
      const description = productDescription.value.trim();

      if (!name) return showStatus("اكتب اسم المنتج", "error");
      if (!image) return showStatus("اكتب رابط الصورة", "error");
      if (Number.isNaN(price) || price <= 0) return showStatus("اكتب سعر صحيح", "error");

      submitBtn.disabled = true;
      submitBtn.textContent = "جاري الحفظ...";
      showStatus("جاري حفظ المنتج...", "");

      try {
        const productData = {
          name,
          price,
          category,
          stock,
          image,
          description,
          createdAt: Date.now()
        };

        console.log("Saving product:", productData);

        const newRef = push(ref(db, "products"));
        await set(newRef, productData);

        showStatus("تمت إضافة المنتج بنجاح", "success");
        form.reset();
        productName.focus();
      } catch (error) {
        console.error("save error:", error);
        showStatus("فشل الحفظ: " + error.message, "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "إضافة المنتج";
      }
    });
  </script>
</body>
</html>
