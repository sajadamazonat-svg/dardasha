<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إضافة منتج - LiderCenter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      color: #111;
    }
    .container {
      max-width: 520px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 0 12px rgba(0,0,0,.08);
    }
    h2 {
      margin-bottom: 14px;
      font-size: 22px;
    }
    input, button, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: #111;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    button {
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover {
      background: #333;
    }
    button:disabled {
      opacity: .7;
      cursor: not-allowed;
    }
    #status {
      text-align: center;
      margin-top: 10px;
      font-weight: 700;
      min-height: 22px;
    }
    .success { color: #1a8f3c; }
    .error { color: #c62828; }
    .section-title {
      margin: 18px 0 10px;
      font-size: 18px;
    }
    .product-list {
      margin-top: 10px;
      display: grid;
      gap: 10px;
    }
    .product-card {
      border: 1px solid #e7e7e7;
      border-radius: 14px;
      padding: 12px;
      background: #fafafa;
    }
    .product-card h3 {
      font-size: 16px;
      margin-bottom: 6px;
    }
    .product-card p {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
    }
    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }
    .btn-danger {
      background: #dc3545;
    }
    .btn-danger:hover {
      background: #b52a37;
    }
    .thumb {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      background: #eee;
      display: block;
    }
  </style>
</head>
<body>  <div class="container">
    <h2>إضافة منتج</h2><input id="name" placeholder="اسم المنتج" />
<input id="price" type="number" placeholder="السعر" />
<input id="quantity" type="number" placeholder="الكمية" />
<input id="barcode" placeholder="الباركود" />
<input id="category" placeholder="التصنيف (اختياري)" />
<input id="image" type="url" placeholder="رابط الصورة (اختياري)" />
<textarea id="description" placeholder="الوصف (اختياري)"></textarea>

<button id="save" type="button">حفظ المنتج</button>
<p id="status"></p>

<h3 class="section-title">المنتجات الموجودة</h3>
<div id="products" class="product-list">
  <div class="product-card">جاري تحميل المنتجات...</div>
</div>

  </div>  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      set,
      onValue,
      remove
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAgjCRON_o4MUqrLKBaTXAOVZxBXMuPOhM",
      authDomain: "studio-3203578995-1262a.firebaseapp.com",
      databaseURL: "https://studio-3203578995-1262a-default-rtdb.firebaseio.com",
      projectId: "studio-3203578995-1262a",
      storageBucket: "studio-3203578995-1262a.firebasestorage.app",
      messagingSenderId: "422562518339",
      appId: "1:422562518339:web:52bc8169b52e72446f0bf6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const nameEl = document.getElementById("name");
    const priceEl = document.getElementById("price");
    const quantityEl = document.getElementById("quantity");
    const barcodeEl = document.getElementById("barcode");
    const categoryEl = document.getElementById("category");
    const imageEl = document.getElementById("image");
    const descriptionEl = document.getElementById("description");
    const saveBtn = document.getElementById("save");
    const statusEl = document.getElementById("status");
    const productsEl = document.getElementById("products");

    function setStatus(msg, type = "") {
      statusEl.className = "";
      statusEl.textContent = msg;
      if (type) statusEl.classList.add(type);
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function clearForm() {
      nameEl.value = "";
      priceEl.value = "";
      quantityEl.value = "";
      barcodeEl.value = "";
      categoryEl.value = "";
      imageEl.value = "";
      descriptionEl.value = "";
      nameEl.focus();
    }

    function renderProducts(data) {
      if (!data) {
        productsEl.innerHTML = `<div class="product-card">لا توجد منتجات حتى الآن</div>`;
        return;
      }

      const items = Object.entries(data).map(([id, p]) => {
        const name = escapeHtml(p?.name || "بدون اسم");
        const price = p?.price ?? "";
        const quantity = p?.quantity ?? "";
        const barcode = escapeHtml(p?.barcode || "");
        const category = escapeHtml(p?.category || "");
        const image = p?.image || "";
        const description = escapeHtml(p?.description || "");

        return `
          <div class="product-card">
            <h3>${name}</h3>
            <p><strong>السعر:</strong> ${price !== "" ? price : "—"}</p>
            <p><strong>الكمية:</strong> ${quantity !== "" ? quantity : "—"}</p>
            <p><strong>الباركود:</strong> ${barcode || "—"}</p>
            <p><strong>التصنيف:</strong> ${category || "—"}</p>
            <p><strong>الوصف:</strong> ${description || "—"}</p>
            ${image ? `<img class="thumb" src="${escapeHtml(image)}" alt="${name}" onerror="this.style.display='none'">` : ""}
            <div class="actions">
              <button class="btn-danger" data-delete="${id}" type="button">حذف</button>
            </div>
          </div>
        `;
      }).join("");

      productsEl.innerHTML = items;

      document.querySelectorAll("[data-delete]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-delete");
          if (!confirm("متأكد تريد حذف المنتج؟")) return;

          try {
            await remove(ref(db, `products/${id}`));
            setStatus("تم حذف المنتج بنجاح", "success");
          } catch (error) {
            console.error("Delete error:", error);
            setStatus("خطأ بالحذف: " + error.message, "error");
          }
        });
      });
    }

    onValue(ref(db, "products"), (snapshot) => {
      renderProducts(snapshot.val());
    }, (error) => {
      console.error("Load error:", error);
      productsEl.innerHTML = `<div class="product-card">فشل تحميل المنتجات</div>`;
    });

    saveBtn.addEventListener("click", async () => {
      const name = nameEl.value.trim();
      const price = Number(priceEl.value);
      const quantity = Number(quantityEl.value);
      const barcode = barcodeEl.value.trim();
      const category = categoryEl.value.trim();
      const image = imageEl.value.trim();
      const description = descriptionEl.value.trim();

      if (!name) {
        setStatus("اكتب اسم المنتج", "error");
        return;
      }

      if (Number.isNaN(price) || price <= 0) {
        setStatus("اكتب سعر صحيح", "error");
        return;
      }

      if (Number.isNaN(quantity) || quantity < 0) {
        setStatus("اكتب كمية صحيحة", "error");
        return;
      }

      try {
        saveBtn.disabled = true;
        saveBtn.textContent = "جاري الحفظ...";
        setStatus("جاري حفظ المنتج...", "");

        const productRef = push(ref(db, "products"));
        await set(productRef, {
          name,
          price,
          quantity,
          barcode,
          category,
          image,
          description,
          createdAt: new Date().toISOString()
        });

        setStatus("تم حفظ المنتج بنجاح", "success");
        clearForm();
      } catch (error) {
        console.error("Save error:", error);
        setStatus("خطأ: " + error.message, "error");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "حفظ المنتج";
      }
    });
  </script></body>
</html>
