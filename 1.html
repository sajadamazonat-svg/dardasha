<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Builder</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f2f4f8;
      color: #222;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
      color: #1f3c88;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    button {
      margin-top: 16px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .btn-pdf {
      background: #1f3c88;
      color: white;
    }

    .btn-clear {
      background: #e0e0e0;
      color: #222;
      margin-right: 8px;
    }

    #cvPreview {
      background: white;
      border: 2px solid #1f3c88;
      border-radius: 16px;
      padding: 28px;
      min-height: 900px;
    }

    .name {
      font-size: 30px;
      font-weight: bold;
      color: #1f3c88;
      margin-bottom: 6px;
    }

    .title {
      font-size: 18px;
      color: #555;
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section h3 {
      margin-bottom: 8px;
      color: #1f3c88;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .info {
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .footer-note {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="panel">
      <h1>إدخال معلومات السيفي</h1>

      <label>الاسم الكامل</label>
      <input type="text" id="fullName" placeholder="مثال: سجاد أحمد" />

      <label>المسمى الوظيفي</label>
      <input type="text" id="jobTitle" placeholder="مثال: مطور مواقع" />

      <label>رقم الهاتف</label>
      <input type="text" id="phone" placeholder="مثال: 0770xxxxxxx" />

      <label>البريد الإلكتروني</label>
      <input type="text" id="email" placeholder="example@gmail.com" />

      <label>العنوان</label>
      <input type="text" id="address" placeholder="مثال: بغداد، العراق" />

      <label>نبذة شخصية</label>
      <textarea id="about" placeholder="اكتب نبذة قصيرة عن نفسك..."></textarea>

      <label>المهارات</label>
      <textarea id="skills" placeholder="مثال:
HTML
CSS
JavaScript
Java"></textarea>

      <label>الخبرات</label>
      <textarea id="experience" placeholder="مثال:
شركة X - مطور واجهات - 2024 إلى 2025"></textarea>

      <label>التعليم</label>
      <textarea id="education" placeholder="مثال:
بكالوريوس هندسة حاسوب - جامعة بغداد - 2025"></textarea>

      <label>اللغات</label>
      <textarea id="languages" placeholder="مثال:
العربية
الإنجليزية"></textarea>

      <button class="btn-clear" onclick="clearForm()">مسح</button>
      <button class="btn-pdf" onclick="downloadPDF()">تحميل PDF</button>
    </div>

    <div class="panel">
      <h2>معاينة السيفي</h2>
      <div id="cvPreview">
        <div class="name" id="pName">اسمك الكامل</div>
        <div class="title" id="pTitle">المسمى الوظيفي</div>

        <div class="section">
          <h3>معلومات التواصل</h3>
          <div class="info" id="pContact">
            الهاتف: -
            البريد: -
            العنوان: -
          </div>
        </div>

        <div class="section">
          <h3>نبذة شخصية</h3>
          <div class="info" id="pAbout">-</div>
        </div>

        <div class="section">
          <h3>المهارات</h3>
          <div class="info" id="pSkills">-</div>
        </div>

        <div class="section">
          <h3>الخبرات</h3>
          <div class="info" id="pExperience">-</div>
        </div>

        <div class="section">
          <h3>التعليم</h3>
          <div class="info" id="pEducation">-</div>
        </div>

        <div class="section">
          <h3>اللغات</h3>
          <div class="info" id="pLanguages">-</div>
        </div>

        <div class="footer-note">تم إنشاء هذا السيفي من خلال الصفحة.</div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    const fields = [
      "fullName", "jobTitle", "phone", "email", "address",
      "about", "skills", "experience", "education", "languages"
    ];

    fields.forEach(id => {
      document.getElementById(id).addEventListener("input", updatePreview);
    });

    function formatText(value) {
      return value.trim() === "" ? "-" : value;
    }

    function updatePreview() {
      document.getElementById("pName").textContent =
        formatText(document.getElementById("fullName").value);

      document.getElementById("pTitle").textContent =
        formatText(document.getElementById("jobTitle").value);

      const phone = formatText(document.getElementById("phone").value);
      const email = formatText(document.getElementById("email").value);
      const address = formatText(document.getElementById("address").value);

      document.getElementById("pContact").textContent =
        "الهاتف: " + phone + "\n" +
        "البريد: " + email + "\n" +
        "العنوان: " + address;

      document.getElementById("pAbout").textContent =
        formatText(document.getElementById("about").value);

      document.getElementById("pSkills").textContent =
        formatText(document.getElementById("skills").value);

      document.getElementById("pExperience").textContent =
        formatText(document.getElementById("experience").value);

      document.getElementById("pEducation").textContent =
        formatText(document.getElementById("education").value);

      document.getElementById("pLanguages").textContent =
        formatText(document.getElementById("languages").value);
    }

    function clearForm() {
      fields.forEach(id => document.getElementById(id).value = "");
      updatePreview();
    }

    async function downloadPDF() {
      const element = document.getElementById("cvPreview");

      const canvas = await html2canvas(element, {
        scale: 2,
        useCORS: true,
        backgroundColor: "#ffffff"
      });

      const imgData = canvas.toDataURL("image/png");
      const { jsPDF } = window.jspdf;

      const pdf = new jsPDF("p", "mm", "a4");
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();

      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      let heightLeft = imgHeight;
      let position = 10;

      pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;

      while (heightLeft > 0) {
        position = heightLeft - imgHeight + 10;
        pdf.addPage();
        pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
      }

      pdf.save("CV.pdf");
    }

    updatePreview();
  </script>
</body>
</html>
