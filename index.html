<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>متجر ليدر - الغسالات</title>
    <style>
        /* ===== إعادة ضبط ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', system-ui, -apple-system, sans-serif;
            background: #1a3d2a;
            /* أخضر داكن */;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* ===== البطاقة ===== */
        .card {
            max-width: 840px;
            width: 100%;
            background: #edf5ef;
            border-radius: 2rem 0.5rem 2rem 0.5rem;
            padding: 3.5rem 2.8rem;
            border: none;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: box-shadow 0.4s ease, transform 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 60%;
            height: 80%;
            background: radial-gradient(circle, rgba(45, 122, 74, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 60%;
            height: 80%;
            background: radial-gradient(circle, rgba(45, 122, 74, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .card:hover {
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.30);
            transform: translateY(-3px);
        }

        .card>* {
            position: relative;
            z-index: 1;
        }

        /* ===== الرأس ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        /* ===== شعار (رمز) ===== */
        .logo-icon {
            font-size: 3.8rem;
            line-height: 1;
            color: #ffffff;
            background: #1a4a2a;
            padding: 0.4rem 0.9rem;
            border-radius: 1.2rem 0.4rem 1.2rem 0.4rem;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(26, 74, 42, 0.2);
            transform: scale(1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: 300;
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
            letter-spacing: 2px;
        }

        .logo-icon:hover {
            transform: scale(1.06) rotate(2deg);
            box-shadow: 0 10px 30px rgba(26, 74, 42, 0.3);
        }

        /* ===== العنوان ===== */
        .title h1 {
            font-size: clamp(2.6rem, 6vw, 4rem);
            font-weight: 700;
            color: #1a4a2a;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .title h1 .highlight {
            color: #ffffff;
            background: #2d7a4a;
            padding: 0.1rem 1rem;
            border-radius: 2rem 0.4rem 2rem 0.4rem;
            display: inline-block;
            font-weight: 800;
            box-shadow: 0 4px 12px rgba(45, 122, 74, 0.2);
        }

        /* ===== النص التعريفي ===== */
        .description {
            margin: 2rem 0 1.8rem;
        }

        .description p {
            font-size: clamp(1.15rem, 1.5vw, 1.4rem);
            line-height: 2.2;
            color: #1a3a2a;
            max-width: 620px;
            margin: 0 auto 0.8rem;
            font-weight: 400;
        }

        .description .divider {
            display: block;
            width: 70px;
            height: 4px;
            background: #2d7a4a;
            margin: 1.2rem auto 1.2rem;
            border-radius: 6px;
            opacity: 0.5;
        }

        /* ===== الخدمات ===== */
        .services {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem 1.6rem;
            margin: 1.5rem 0 2.4rem;
            padding: 0.8rem 0;
            border-top: 2px solid rgba(26, 74, 42, 0.1);
            border-bottom: 2px solid rgba(26, 74, 42, 0.1);
        }

        .services-item {
            font-size: 1.1rem;
            font-weight: 500;
            color: #1a4a2a;
            background: #ffffff;
            padding: 0.4rem 1.4rem;
            border-radius: 3rem;
            letter-spacing: 0.3px;
            border: 1px solid rgba(26, 74, 42, 0.08);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: background 0.2s ease;
        }

        .services-item:hover {
            background: #dcebe2;
        }

        .services-item::before {
            content: "◆ ";
            color: #2d7a4a;
            font-weight: 700;
        }

        /* ===== الزر ===== */
        .btn {
            display: inline-block;
            padding: 1.2rem 4rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            background: #1a4a2a;
            border: none;
            border-radius: 3rem 0.8rem 3rem 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            font-family: inherit;
            box-shadow: 0 8px 0 #2d7a4a;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: #2d7a4a;
            color: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 12px 0 #1a4a2a;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #2d7a4a;
        }

        .btn span {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== تذييل ===== */
        .footer {
            margin-top: 2.8rem;
            font-size: 0.95rem;
            color: #2a5a3a;
            letter-spacing: 1px;
            font-weight: 400;
            border-top: 1px solid rgba(26, 74, 42, 0.08);
            padding-top: 1.5rem;
        }

        .footer .brand {
            color: #2d7a4a;
            font-weight: 700;
        }

        /* ===== استجابة ===== */
        @media (max-width: 640px) {
            .card {
                padding: 2.2rem 1.5rem;
                border-radius: 1.5rem 0.3rem 1.5rem 0.3rem;
            }
            .header {
                gap: 0.6rem;
            }
            .logo-icon {
                font-size: 3rem;
                padding: 0.2rem 0.7rem;
            }
            .title h1 {
                font-size: 2.2rem;
            }
            .description p {
                font-size: 1.05rem;
            }
            .services {
                gap: 0.6rem 1rem;
            }
            .services-item {
                font-size: 0.95rem;
                padding: 0.3rem 1rem;
            }
            .btn {
                padding: 1rem 2.5rem;
                font-size: 1.2rem;
            }
            .footer {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 1.5rem 1rem;
                border-radius: 1rem 0.2rem 1rem 0.2rem;
            }
            .logo-icon {
                font-size: 2.4rem;
                padding: 0.1rem 0.5rem;
            }
            .title h1 {
                font-size: 1.8rem;
            }
            .description p {
                font-size: 0.95rem;
            }
            .btn {
                padding: 0.8rem 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <main class="card">

        <!-- رأس البطاقة -->
        <div class="header">
            <div class="logo-icon" role="img" aria-label="رمز المتجر">◈</div>
            <div class="title">
                <h1>مرحباً في <span class="highlight">متجر ليدر</span></h1>
            </div>
        </div>

        <!-- النص التعريفي -->
        <div class="description">
            <p>
                نوفر تشكيلة واسعة من الغسالات وأجهزة الغسيل بأفضل المواصفات،
                وأسعار تنافسية، وخدمات دعم فني متكاملة تضمن لك تجربة شراء موثوقة.
            </p>
            <span class="divider"></span>
        </div>

        <!-- قائمة الخدمات -->
        <div class="services">
            <span class="services-item">غسالات أوتوماتيك</span>
            <span class="services-item">نشافات</span>
            <span class="services-item">مجففات</span>
            <span class="services-item">قطع غيار أصلية</span>
        </div>

        <!-- زر الدعوة -->
        <button class="btn" id="mainCta">
            <span>اطلب الآن &nbsp;←</span>
        </button>

        <!-- تذييل -->
        <div class="footer">
            <span>◆</span> <span class="brand">متجر ليدر</span> &bull; ٢٠٢٦ <span>◆</span>
        </div>

    </main>

    <script>
        (function() {
            'use strict';

            const ctaBtn = document.getElementById('mainCta');

            if (ctaBtn) {
                ctaBtn.addEventListener('click', function(e) {
                    window.location.href = '/';
                });
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    const target = e.target;
                    if (target && target.classList && target.classList.contains('btn')) {
                        e.preventDefault();
                        target.click();
                    }
                }
            });

        })();
    </script>

</body>
</html>
