<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lidercenter - مرحباً</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    direction:rtl;
}

.welcome-card{
    width:420px;
    max-width:92%;
    background:#fff;
    border:1px solid #e5e5e5;
    border-radius:22px;
    padding:45px 35px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,.05);
    animation:fade .7s ease;
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border:2px solid #000;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:900;
    color:#000;
    margin-bottom:25px;
}

.store-name{
    font-size:2.7rem;
    font-weight:900;
    color:#000;
    margin-bottom:10px;
}

.sub-title{
    color:#888;
    font-size:.95rem;
    margin-bottom:30px;
    border-bottom:1px solid #efefef;
    padding-bottom:18px;
}

.welcome-title{
    font-size:1.5rem;
    color:#000;
    font-weight:700;
    margin-bottom:12px;
}

.description{
    color:#666;
    line-height:1.9;
    font-size:.95rem;
    margin-bottom:35px;
}

.btn{
    display:block;
    width:100%;
    padding:14px;
    border:none;
    border-radius:50px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
    text-decoration:none;
}

.btn-primary{
    background:#000;
    color:#fff;
    margin-bottom:12px;
}

.btn-primary:hover{
    background:#222;
    transform:translateY(-2px);
}

.btn-secondary{
    background:#fff;
    color:#000;
    border:2px solid #000;
}

.btn-secondary:hover{
    background:#000;
    color:#fff;
}

.footer{
    margin-top:28px;
    color:#999;
    font-size:.8rem;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="welcome-card">

    <div class="logo">L</div>

    <div class="store-name">lidercenter</div>

    <div class="sub-title">
        منصة حديثة لإدارة المنتجات والمتاجر
    </div>

    <div class="welcome-title">
        👋 أهلاً وسهلاً بك
    </div>

    <div class="description">
        يسعدنا انضمامك إلى <b>lidercenter</b>.<br>
        يمكنك إدارة منتجاتك ومتابعة أعمالك بسهولة من خلال لوحة تحكم سريعة وآمنة.
    </div>

    <a href="login.html" class="btn btn-primary">
        تسجيل الدخول
    </a>

    <a href="register.html" class="btn btn-secondary">
        إنشاء حساب جديد
    </a>

    <div class="footer">
        © 2026 lidercenter. جميع الحقوق محفوظة.
    </div>

</div>

</body>
</html>
